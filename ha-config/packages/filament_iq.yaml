          {% endif %}
      # Spool list for dropdown: extract spool ID from entity_id (sensor.spoolman_spool_<digits>).
      # Filter by split('_') length to get only main spool entities, not children. No .append() (unsafe).
      - name: "AMS Spool list – options"
        unique_id: ams_spool_list_options
        state: >
          {% set ns = namespace(seen=[]) %}
          {% for st in (states.sensor | list) %}
            {% if st and st.entity_id %}
              {% set eid = st.entity_id | string %}
              {% if eid is match('sensor\\.spoolman_spool_\\d+$') %}
                {% set sid = eid | regex_replace('sensor\\.spoolman_spool_', '') %}
                {% if sid and sid not in ns.seen %}
                  {% set loc = (state_attr(eid, 'location') or '') | string | trim | lower %}
                  {% if loc not in ['empty', 'new', ''] %}
                    {% set ns.seen = ns.seen + [sid] %}
                  {% endif %}
                {% endif %}
              {% endif %}
            {% endif %}
          {% endfor %}
          {{ ns.seen | length }}
        attributes:
          options: >
            {% set ns = namespace(opts=[], seen=[]) %}
            {% for st in (states.sensor | list) %}
              {% if st and st.entity_id %}
                {% set eid = st.entity_id | string %}
                {% if eid is match('sensor\\.spoolman_spool_\\d+$') %}
                  {% set sid = eid | regex_replace('sensor\\.spoolman_spool_', '') %}
                  {% if sid and sid not in ns.seen %}
                    {% set loc = (state_attr(eid, 'location') or '') | string | trim | lower %}
                    {% if loc not in ['empty', 'new', ''] %}
                      {% set vendor_attr = state_attr(eid, 'vendor') %}
                      {% set v = (state_attr(eid, 'filament_vendor_name') or state_attr(eid, 'vendor_name') or state_attr(eid, 'manufacturer') or (vendor_attr.name | default('') if vendor_attr is mapping else (vendor_attr | string if vendor_attr is string else '')) or '') | string | trim %}
                      {% set n = (state_attr(eid, 'filament_name') or state_attr(eid, 'name') or '') | string | trim %}
                      {% set m = (state_attr(eid, 'filament_material') or state_attr(eid, 'material') or '') | string | trim %}
                      {% set label = ((v + ' – ' if v else '') + (n + ' – ' if n else '') + (m if m else '')) | trim | regex_replace(' – $', '') | trim %}
                      {% set label = label if label else ('Spool ' ~ sid) %}
                      {% set ns.seen = ns.seen + [sid] %}
                      {% set ns.opts = ns.opts + [label ~ ' (' ~ sid ~ ')'] %}
                    {% endif %}
                  {% endif %}
                {% endif %}
              {% endif %}
            {% endfor %}
            {{ ns.opts | sort }}
      # Process Spoolman filaments API raw data into formatted list (stored in attributes to avoid 255 char limit)
      - name: "Spoolman filaments processed"
        unique_id: spoolman_filaments_processed
        state: >
          {% set api_data = state_attr('sensor.spoolman_filament_list_data', 'items') %}
          {% if api_data is iterable and api_data is not string %}
            {{ api_data | length }}
          {% else %}
            {{ this.state if this.state is defined else 0 }}
          {% endif %}
        attributes:
          filament_list: >
            {% set api_data = state_attr('sensor.spoolman_filament_list_data', 'items') %}
            {% if api_data is iterable and api_data is not string %}
              {% set ns = namespace(parts=[]) %}
              {% for f in api_data %}
                {% set v = (f.vendor.name | default('')) if (f.vendor is defined and f.vendor is mapping) else '' %}
                {% set mat = (f.material | default('')) | string | trim %}
                {% set n = (f.name | default('')) | replace('|', ' ') | trim %}
                {% set bits = [v, mat, n] | reject('eq', '') | list %}
                {% set label = (bits | join(' – ')) or ('Filament ' ~ (f.id | string)) %}
                {% set ns.parts = ns.parts + [(f.id | string) ~ ' - ' ~ label] %}
              {% endfor %}
              {{ ns.parts }}
            {% else %}
              {{ state_attr('sensor.spoolman_filaments_processed', 'filament_list') or [] }}
            {% endif %}
      # Filament list for "Add spool" dropdown: all filaments from Spoolman (unfiltered)
      - name: "AMS Filament list – options"
        unique_id: ams_filament_list_options
        state: >
          {% set all_parts = state_attr('sensor.spoolman_filaments_processed', 'filament_list') or [] %}
          {{ all_parts | length }}
        attributes:
          options: >
            {% set all_parts = state_attr('sensor.spoolman_filaments_processed', 'filament_list') or [] %}
            {{ all_parts | sort if all_parts | length > 0 else [] }}
      # Vendor list for "Add filament" dropdown: from Spoolman API
      - name: "AMS Vendor list – options"
        unique_id: ams_vendor_list_options
        state: >
          {% set raw = states('sensor.spoolman_vendors_api') | default('') %}
          {% if raw is string and raw not in ['unknown', 'unavailable', ''] %}
