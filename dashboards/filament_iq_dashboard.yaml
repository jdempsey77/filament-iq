# ─── Filament IQ Reference Dashboard ─────────────────────────────────
# Ready-to-import Lovelace dashboard for Filament IQ.
# Prerequisites: mushroom cards, card-mod, mod-card, button-card
#
# To customize for your printer:
#   ./dashboards/scripts/configure_filament_iq.sh PRINTER_SERIAL
#
# Placeholder: PRINTER_SERIAL (replaced by configure script)
# ─────────────────────────────────────────────────────────────────────
views:
  - title: Filament IQ
    icon: mdi:printer-3d-nozzle
    type: sections
    badges: []
    sections:
      # ═══════════════════════════════════════════════════════════════
      # SECTION 1: AMS Slot Grid (6 cards — 2 rows of 3)
      # ═══════════════════════════════════════════════════════════════
      - type: grid
        cards:
          - type: grid
            columns: 3
            square: false
            cards:
              # ── Slot 1 (AMS Pro Tray 1) ──
              - type: custom:mushroom-template-card
                entity: sensor.ams_slot_1_name
                primary: >-
                  {% set status = states('sensor.ams_slot_1_status') %}
                  {% if status == 'empty' %}Slot 1 · Empty
                  {% elif status == 'needs_bind' %}Slot 1 · Needs Binding
                  {% else %}{{ states('sensor.ams_slot_1_name') }}
                  {% endif %}
                secondary: >-
                  {% set status = states('sensor.ams_slot_1_status') %}
                  {% if status == 'ok' %}{{ states('sensor.ams_slot_1_material') }} · {{ states('sensor.ams_slot_1_remaining_g') }}g
                  {% elif status == 'needs_bind' %}
                    {% set r = states('input_text.ams_slot_1_unbound_reason') %}
                    {% if 'RFID_NOT_REFRESHED' in r %}Unload & reload for RFID read
                    {% elif 'NONRFID_NO_MATCH' in r %}No match — select spool below
                    {% elif 'AMBIGUOUS' in r %}Multiple matches — select spool
                    {% elif 'GENERIC' in r or 'LOW_CONFIDENCE' in r %}Too generic to auto-match
                    {% elif 'NOT_FOUND' in r %}Spool missing — reassign below
                    {% elif 'UID_NO_MATCH' in r %}RFID tag not recognized
                    {% else %}Manual binding required
                    {% endif %}
                  {% elif status == 'empty' %}No spool loaded
                  {% else %}Unknown
                  {% endif %}
                icon: >-
                  {% set status = states('sensor.ams_slot_1_status') %}
                  {% if status == 'empty' %}mdi:tray-remove
                  {% elif status == 'needs_bind' %}mdi:alert-circle
                  {% else %}mdi:printer-3d-nozzle
                  {% endif %}
                icon_color: >-
                  {% set status = states('sensor.ams_slot_1_status') %}
                  {% if status == 'empty' %}disabled
                  {% elif status == 'needs_bind' %}red
                  {% else %}
                    {% set hex = states('sensor.ams_slot_1_color_hex') %}
                    {{ '#' ~ hex if hex not in ['000000', 'Unknown'] else 'green' }}
                  {% endif %}
                badge_icon: >-
                  {% if states('sensor.ams_slot_1_status') == 'needs_bind' %}mdi:alert{% endif %}
                badge_color: >-
                  {% if states('sensor.ams_slot_1_status') == 'needs_bind' %}red{% endif %}
                tap_action:
                  action: more-info
                card_mod:
                  style: |
                    ha-card {
                      {% set status = states('sensor.ams_slot_1_status') %}
                      {% set hex = states('sensor.ams_slot_1_color_hex') %}
                      {% if status == 'ok' and hex not in ['000000', 'Unknown'] %}
                      border-left: 3px solid #{{ hex }};
                      --ha-card-background: #{{ hex }}15;
                      {% elif status == 'needs_bind' %}
                      border-left: 3px solid var(--error-color);
                      {% elif status == 'empty' %}
                      opacity: 0.5;
                      {% endif %}
                    }
