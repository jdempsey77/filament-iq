              {% endif %}
            {% endfor %}
            {{ ns.filtered }}


# AMS Slot Manager: Spoolman REST API. Set input_text.spoolman_base_url (e.g. http://192.168.x.x:8080).
rest_command:
  ams_spoolman_get_spool:
    url: "http://YOUR_SPOOLMAN_IP:7912/api/v1/spool/{{ spool_id }}"
    method: GET
  ams_spoolman_create_placeholder:
    url: "http://YOUR_SPOOLMAN_IP:7912/api/v1/spool"
    method: POST
    content_type: "application/json"
    payload: >
      {
        "filament_id": {{ placeholder_filament_id | int }},
        "location": "HA_AMS_SLOT_{{ slot }}",
        "comment": "HA_AMS_SLOT={{ slot }}",
        "remaining_weight": 0,
        "archived": false
      }
  # Add filament to Spoolman (from dashboard form). Uses input_text/input_number/input_select spoolman_new_filament_*.
  ams_spoolman_create_filament:
    url: "http://YOUR_SPOOLMAN_IP:7912/api/v1/filament"
    method: POST
    content_type: "application/json"
    payload: >
      {% set vendor_sel = states('input_select.spoolman_new_filament_vendor') | default('— No vendor —') %}
      {% set vendor_id = none %}
      {% if vendor_sel != '— No vendor —' and ' - ' in vendor_sel %}
        {% set vendor_id = vendor_sel.split(' - ')[0] | trim | int(0) or none %}
      {% endif %}
      {{ {'name': (states('input_text.spoolman_new_filament_name') | default('') | trim) or 'Unnamed', 'density': states('input_number.spoolman_new_filament_density') | float(1.24), 'diameter': states('input_number.spoolman_new_filament_diameter') | float(1.75), 'weight': states('input_number.spoolman_new_filament_weight') | float(1000), 'material': (states('input_text.spoolman_new_filament_material') | default('') | trim) or none, 'color_hex': (states('input_text.spoolman_new_filament_color_hex') | default('') | trim) | replace('#', '') or none, 'comment': 'added by Home Assistant', 'vendor_id': vendor_id} | tojson }}
  # Add spool to Spoolman (from dashboard). Filament ID from dropdown (id - name).
  ams_spoolman_create_spool:
    url: "http://YOUR_SPOOLMAN_IP:7912/api/v1/spool"
    method: POST
    content_type: "application/json"
    payload: >-
      {{ {'filament_id': ((states('input_select.spoolman_new_spool_filament') or '').split(' - ')[0] | trim | int(1)) if ' - ' in (states('input_select.spoolman_new_spool_filament') or '') else (states('input_number.spoolman_new_spool_filament_id') | int(1)), 'location': (states('input_text.spoolman_new_spool_location') | default('') | trim) or 'New', 'remaining_weight': states('input_number.spoolman_new_spool_remaining_weight') | float(0), 'archived': false} | tojson }}
  # PATCH spool remaining_weight and/or location in Spoolman (from edit popup)
    method: PATCH
    content_type: "application/json"
    payload: "{{ payload }}"
# Load frontend themes from the themes folder
frontend:

automation:
  - id: printer_air_purifier_lan
    alias: Printer Air Purifier (LAN-proof)
    description: Turn office air purifier + outlet on when printing/paused, off when idle/finished/failed. Logs unknown states.
    trigger:
      - platform: state
        entity_id: sensor.p1s_YOUR_PRINTER_SERIAL_print_status
      - platform: homeassistant
        event: start
  
    condition: []
  
    action:
      - variables:
          current_state: "{{ states('sensor.p1s_YOUR_PRINTER_SERIAL_print_status') | lower }}"
  
      - choose:
  
          # PRINTING / PAUSED → ON
          - conditions:
              - condition: template
                value_template: "{{ current_state in ['running','printing','pause','paused'] }}"
            sequence:
              - service: fan.turn_on
                target:
                  entity_id: fan.office_air_purifier
                data:
                  percentage: 75
              - service: switch.turn_on
                target:
                  entity_id: switch.officeoutlet_02
  
          # IDLE / FINISHED / FAILED → OFF
          - conditions:
              - condition: template
                value_template: "{{ current_state in ['idle','standby','finish','finished','completed','failed','error'] }}"
            sequence:
              - service: fan.turn_off
                target:
                  entity_id: fan.office_air_purifier
              - service: switch.turn_off
                target:
                  entity_id: switch.officeoutlet_02
  
        default:
          - service: logbook.log
            data:
              name: Printer Air Purifier
              message: "Unknown print_status '{{ current_state }}' - no action taken"
  
    mode: single
  - id: p1s_persist_print_times
    alias: P1S – persist print start/end times
    description: Capture start_time and end_time sensors to persistent helpers so they survive HA restart
    trigger:
    - platform: state
      entity_id: sensor.p1s_YOUR_PRINTER_SERIAL_start_time
    - platform: state
      entity_id: sensor.p1s_YOUR_PRINTER_SERIAL_end_time
    - platform: state
      entity_id: sensor.filament_iq_operator_status
      to:
      - printing_normally
      - printing_attention_needed
    condition: []
    action:
    - choose:
      - conditions:
        - condition: template
          value_template: "{{ trigger.entity_id == 'sensor.p1s_YOUR_PRINTER_SERIAL_start_time' and trigger.to_state.state not in ['unknown', 'unavailable', ''] }}"
        sequence:
        - action: input_datetime.set_datetime
          target:
            entity_id: input_datetime.filament_iq_print_start_time
          data:
            datetime: "{{ trigger.to_state.state }}"
      - conditions:
        - condition: template
          value_template: "{{ trigger.entity_id == 'sensor.p1s_YOUR_PRINTER_SERIAL_end_time' and trigger.to_state.state not in ['unknown', 'unavailable', ''] }}"
        sequence:
        - action: input_datetime.set_datetime
          target:
            entity_id: input_datetime.filament_iq_print_end_time
          data:
            datetime: "{{ trigger.to_state.state }}"
      - conditions:
        - condition: state
          entity_id: sensor.filament_iq_operator_status
          state:
          - printing_normally
          - printing_attention_needed
        - condition: template
          value_template: "{{ states('sensor.p1s_YOUR_PRINTER_SERIAL_start_time') not in ['unknown', 'unavailable', ''] }}"
        sequence:
        - action: input_datetime.set_datetime
          target:
            entity_id: input_datetime.filament_iq_print_start_time
          data:
            datetime: "{{ states('sensor.p1s_YOUR_PRINTER_SERIAL_start_time') }}"
        - condition: template
          value_template: "{{ states('sensor.p1s_YOUR_PRINTER_SERIAL_end_time') not in ['unknown', 'unavailable', ''] }}"
        - action: input_datetime.set_datetime
          target:
            entity_id: input_datetime.filament_iq_print_end_time
          data:
            datetime: "{{ states('sensor.p1s_YOUR_PRINTER_SERIAL_end_time') }}"
    mode: restart
  
  # -----------------------------------------------------------------------------
  # Spoolman filament tracking (Bambu P1S): low filament + subtract after print
  # -----------------------------------------------------------------------------
  # Which spool: printer active_tray when available, else input_select.active_filament_spool.
  # Spoolman reserved IDs 1–6 for AMS slots: slot 1 = spool 1, … slot 6 = spool 6.
  # Map printer tray display name → slot 1–6; spool_id comes from input_text.ams_slot_N_spool_id (persisted).
  # -----------------------------------------------------------------------------
  
  - id: spoolman_low_filament_warning
    alias: Spoolman low filament warning
    description: Notify when any AMS slot (1–6) has remaining weight below 50g (critical) or 100g (warning). Uses reconciler helpers (spool_id, remaining_g, name) per slot.
    trigger:
    - platform: state
      entity_id:
        - input_select.active_filament_spool
        - sensor.p1s_YOUR_PRINTER_SERIAL_active_tray
    - platform: time
      at: "09:00:00"
    condition:
    - condition: template
      value_template: >-
        {% set ns = namespace(found=false) %}
        {% for i in range(1, 7) %}
          {% set remaining = states('sensor.ams_slot_' ~ i ~ '_remaining_g') | float(0) %}
          {% set spool_id = states('input_text.ams_slot_' ~ i ~ '_spool_id') %}
          {% if remaining > 0 and remaining < 100 and spool_id not in ['0', '', 'unknown', 'unavailable'] %}
            {% set ns.found = true %}
          {% endif %}
        {% endfor %}
        {{ ns.found }}
    action:
    - variables:
        critical_msg: >-
          {% set lines = [] %}
          {% for i in range(1, 7) %}
          {% set remaining = states('sensor.ams_slot_' ~ i ~ '_remaining_g') | float(0) %}
          {% set spool_id = states('input_text.ams_slot_' ~ i ~ '_spool_id') %}
          {% set name = states('sensor.ams_slot_' ~ i ~ '_name') | default('Slot ' ~ i) %}
          {% if remaining > 0 and remaining < 50 and spool_id not in ['0', '', 'unknown', 'unavailable'] %}
          {{ lines.append('Slot ' ~ i ~ ': ' ~ name ~ ', ' ~ (remaining | round(1)) ~ ' g') or '' }}
          {% endif %}
          {% endfor %}
          {{ lines | join('\n') }}
        warning_msg: >-
          {% set lines = [] %}
          {% for i in range(1, 7) %}
          {% set remaining = states('sensor.ams_slot_' ~ i ~ '_remaining_g') | float(0) %}
          {% set spool_id = states('input_text.ams_slot_' ~ i ~ '_spool_id') %}
          {% set name = states('sensor.ams_slot_' ~ i ~ '_name') | default('Slot ' ~ i) %}
          {% if remaining >= 50 and remaining < 100 and spool_id not in ['0', '', 'unknown', 'unavailable'] %}
          {{ lines.append('Slot ' ~ i ~ ': ' ~ name ~ ', ' ~ (remaining | round(1)) ~ ' g') or '' }}
          {% endif %}
          {% endfor %}
          {{ lines | join('\n') }}
    - choose:
      - conditions:
        - condition: template
          value_template: >-
            {% set ns = namespace(found=false) %}
            {% for i in range(1, 7) %}
              {% set remaining = states('sensor.ams_slot_' ~ i ~ '_remaining_g') | float(0) %}
              {% set spool_id = states('input_text.ams_slot_' ~ i ~ '_spool_id') %}
              {% if remaining > 0 and remaining < 50 and spool_id not in ['0', '', 'unknown', 'unavailable'] %}
                {% set ns.found = true %}
              {% endif %}
            {% endfor %}
            {{ ns.found }}
        sequence:
        - action: notify.persistent_notification
          data:
            title: "Spoolman – critical low filament (< 50 g)"
            message: "{{ critical_msg }}"
      - conditions:
        - condition: template
          value_template: >-
            {% set ns = namespace(found=false) %}
            {% for i in range(1, 7) %}
              {% set remaining = states('sensor.ams_slot_' ~ i ~ '_remaining_g') | float(0) %}
              {% set spool_id = states('input_text.ams_slot_' ~ i ~ '_spool_id') %}
              {% if remaining >= 50 and remaining < 100 and spool_id not in ['0', '', 'unknown', 'unavailable'] %}
                {% set ns.found = true %}
              {% endif %}
            {% endfor %}
            {{ ns.found }}
        sequence:
        - action: notify.persistent_notification
          data:
            title: "Spoolman – low filament (< 100 g)"
            message: "{{ warning_msg }}"
    mode: single
  
  - id: p1s_capture_active_tray_entity
    alias: P1S – capture active tray entity during print
    description: When print starts, clear trays-used list, wait until any tray reports active=true then store that tray entity for subtract-after-print.
    trigger:
      - platform: state
        entity_id: sensor.p1s_YOUR_PRINTER_SERIAL_print_status
        to:
          - running
          - printing
    action:
      - action: input_text.set_value
        target:
          entity_id: input_text.filament_iq_trays_used_this_print
        data:
          value: ""
      - wait_template: >
          {{ state_attr('sensor.p1s_YOUR_PRINTER_SERIAL_ams_1_tray_1','active') == true or
             state_attr('sensor.p1s_YOUR_PRINTER_SERIAL_ams_1_tray_2','active') == true or
             state_attr('sensor.p1s_YOUR_PRINTER_SERIAL_ams_1_tray_3','active') == true or
             state_attr('sensor.p1s_YOUR_PRINTER_SERIAL_ams_1_tray_4','active') == true or
             state_attr('sensor.p1s_YOUR_PRINTER_SERIAL_ams_128_tray_1','active') == true or
             state_attr('sensor.p1s_YOUR_PRINTER_SERIAL_ams_129_tray_1','active') == true }}
        timeout: "00:01:00"
        continue_on_timeout: true
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ state_attr('sensor.p1s_YOUR_PRINTER_SERIAL_ams_1_tray_1','active') == true }}"
            sequence:
              - action: input_text.set_value
                target:
                  entity_id: input_text.p1s_last_tray_entity
                data:
                  value: "sensor.p1s_YOUR_PRINTER_SERIAL_ams_1_tray_1"
              - service: logbook.log
                data:
                  name: P1S Tray Capture
                  message: "Captured tray entity: sensor.p1s_YOUR_PRINTER_SERIAL_ams_1_tray_1"
          - conditions:
              - condition: template
                value_template: "{{ state_attr('sensor.p1s_YOUR_PRINTER_SERIAL_ams_1_tray_2','active') == true }}"
            sequence:
              - action: input_text.set_value
                target:
                  entity_id: input_text.p1s_last_tray_entity
                data:
                  value: "sensor.p1s_YOUR_PRINTER_SERIAL_ams_1_tray_2"
              - service: logbook.log
                data:
                  name: P1S Tray Capture
                  message: "Captured tray entity: sensor.p1s_YOUR_PRINTER_SERIAL_ams_1_tray_2"
          - conditions:
              - condition: template
                value_template: "{{ state_attr('sensor.p1s_YOUR_PRINTER_SERIAL_ams_1_tray_3','active') == true }}"
            sequence:
              - action: input_text.set_value
                target:
                  entity_id: input_text.p1s_last_tray_entity
                data:
                  value: "sensor.p1s_YOUR_PRINTER_SERIAL_ams_1_tray_3"
              - service: logbook.log
                data:
                  name: P1S Tray Capture
                  message: "Captured tray entity: sensor.p1s_YOUR_PRINTER_SERIAL_ams_1_tray_3"
          - conditions:
              - condition: template
                value_template: "{{ state_attr('sensor.p1s_YOUR_PRINTER_SERIAL_ams_1_tray_4','active') == true }}"
            sequence:
              - action: input_text.set_value
                target:
                  entity_id: input_text.p1s_last_tray_entity
                data:
                  value: "sensor.p1s_YOUR_PRINTER_SERIAL_ams_1_tray_4"
              - service: logbook.log
                data:
                  name: P1S Tray Capture
                  message: "Captured tray entity: sensor.p1s_YOUR_PRINTER_SERIAL_ams_1_tray_4"
          - conditions:
              - condition: template
                value_template: "{{ state_attr('sensor.p1s_YOUR_PRINTER_SERIAL_ams_128_tray_1','active') == true }}"
            sequence:
              - action: input_text.set_value
                target:
                  entity_id: input_text.p1s_last_tray_entity
                data:
                  value: "sensor.p1s_YOUR_PRINTER_SERIAL_ams_128_tray_1"
              - service: logbook.log
                data:
                  name: P1S Tray Capture
                  message: "Captured tray entity: sensor.p1s_YOUR_PRINTER_SERIAL_ams_128_tray_1"
          - conditions:
              - condition: template
                value_template: "{{ state_attr('sensor.p1s_YOUR_PRINTER_SERIAL_ams_129_tray_1','active') == true }}"
            sequence:
              - action: input_text.set_value
                target:
                  entity_id: input_text.p1s_last_tray_entity
                data:
                  value: "sensor.p1s_YOUR_PRINTER_SERIAL_ams_129_tray_1"
              - service: logbook.log
                data:
                  name: P1S Tray Capture
                  message: "Captured tray entity: sensor.p1s_YOUR_PRINTER_SERIAL_ams_129_tray_1"
        default:
          - service: logbook.log
            data:
              name: P1S Tray Capture
              message: "FAILED to capture tray entity (no tray active=true within 60s)."
    mode: single
  
  # While print is running, append any tray that becomes active to the "trays used" list (for multi-color subtract).
  - id: p1s_remaining_snapshot_init
    alias: P1S – init remaining filament snapshots
    description: Clear snapshot JSON helpers when print starts, then seed with currently-active trays
    trigger:
      - platform: state
        entity_id: sensor.p1s_YOUR_PRINTER_SERIAL_print_status
        to:
          - running
          - printing
    action:
      # Mutex: Set print active + job key
      - service: input_boolean.turn_on
        target:
          entity_id: input_boolean.filament_iq_print_active
      - action: input_text.set_value
        target:
          entity_id: input_text.p1s_print_job_key
        data:
          value: "{{ now().timestamp() | string }}_{{ states('sensor.p1s_YOUR_PRINTER_SERIAL_task_name') | replace(' ', '_') }}"
      - service: input_boolean.turn_off
        target:
          entity_id: input_boolean.filament_iq_needs_reconcile
      - variables:
          debug_info: "print_status={{ states('sensor.p1s_YOUR_PRINTER_SERIAL_print_status') }} | reset_start_end_json=1"
      - action: input_text.set_value
        target:
          entity_id: input_text.p1s_init_seed_debug
        data:
          value: "{{ debug_info }}"
      # Clear JSON helpers (legacy)
      - action: input_text.set_value
        target:
          entity_id: input_text.p1s_tray_remaining_start_json
        data:
          value: "{}"
      - action: input_text.set_value
        target:
          entity_id: input_text.p1s_tray_remaining_end_json
        data:
          value: "{}"
      # Clear input_number helpers (ALL slots to 0)
      - repeat:
          count: 6
          sequence:
            - service: input_number.set_value
              target:
                entity_id: "input_number.p1s_start_slot_{{ repeat.index }}_g"
              data:
                value: 0
            - service: input_number.set_value
              target:
                entity_id: "input_number.p1s_end_slot_{{ repeat.index }}_g"
              data:
                value: 0
      # Wait for printer to report which tray is in use (tray active or active_tray state), not Spoolman slot remaining
      - wait_template: >
          {{ state_attr('sensor.p1s_YOUR_PRINTER_SERIAL_ams_1_tray_1', 'active') == true
             or state_attr('sensor.p1s_YOUR_PRINTER_SERIAL_ams_1_tray_2', 'active') == true
             or state_attr('sensor.p1s_YOUR_PRINTER_SERIAL_ams_1_tray_3', 'active') == true
             or state_attr('sensor.p1s_YOUR_PRINTER_SERIAL_ams_1_tray_4', 'active') == true
             or state_attr('sensor.p1s_YOUR_PRINTER_SERIAL_ams_128_tray_1', 'active') == true
             or state_attr('sensor.p1s_YOUR_PRINTER_SERIAL_ams_129_tray_1', 'active') == true
             or ((states('sensor.p1s_YOUR_PRINTER_SERIAL_active_tray') | default('') | trim) not in ['', 'unknown', 'unavailable', 'None']) }}
        timeout: "00:02:00"
        continue_on_timeout: true
      - variables:
          tray_entities:
            - sensor.p1s_YOUR_PRINTER_SERIAL_ams_1_tray_1
            - sensor.p1s_YOUR_PRINTER_SERIAL_ams_1_tray_2
            - sensor.p1s_YOUR_PRINTER_SERIAL_ams_1_tray_3
            - sensor.p1s_YOUR_PRINTER_SERIAL_ams_1_tray_4
            - sensor.p1s_YOUR_PRINTER_SERIAL_ams_128_tray_1
            - sensor.p1s_YOUR_PRINTER_SERIAL_ams_129_tray_1
          slot_map: [1, 2, 3, 4, 5, 6]
          seeded_dict: >
            {% set active_name = states('sensor.p1s_YOUR_PRINTER_SERIAL_active_tray') | lower | trim %}
            {% set ns = namespace(result={}) %}
            {% for i in range(6) %}
              {% set tray = tray_entities[i] %}
              {% set slot = slot_map[i] | string %}
              {% set is_active_attr = state_attr(tray, 'active') == true %}
              {% set tray_name = states(tray) | lower | trim %}
              {% set is_active_by_name = active_name and tray_name and active_name == tray_name %}
              {% if is_active_attr or is_active_by_name %}
                {% set fg = states('sensor.p1s_tray_' ~ slot ~ '_fuel_gauge_remaining') | float(-1) %}
                {% set ams = states('sensor.ams_slot_' ~ slot ~ '_remaining_g') | float(-1) %}
                {% set effective = fg if fg > 0 else (ams if ams > 0 else -1) %}
                {% set grams = (effective if effective >= 0 else 0) | round(0) | int %}
                {# SAFETY: Clamp to >= 0 (replaces old comment) #}
                {% set ns.result = dict(ns.result, **{slot: grams}) %}
              {% endif %}
            {% endfor %}
            {{ ns.result }}
          # Fallback when no tray reports active: seed all slots with valid remaining so we still get start/end snapshots.
          fallback_dict: >
            {% set ns = namespace(result={}) %}
            {% for i in range(6) %}
              {% set slot = slot_map[i] | string %}
              {% set fg = states('sensor.p1s_tray_' ~ slot ~ '_fuel_gauge_remaining') | float(-1) %}
              {% set ams = states('sensor.ams_slot_' ~ slot ~ '_remaining_g') | float(-1) %}
              {% set effective = fg if fg > 0 else (ams if ams > 0 else -1) %}
              {% if effective >= 0 %}
                {# SAFETY: Clamp to >= 0 #}
                {% set grams = [0, effective] | max | round(0) | int %}
                {% set ns.result = dict(ns.result, **{slot: grams}) %}
              {% endif %}
            {% endfor %}
            {{ ns.result }}
          dict_to_seed: "{{ seeded_dict if seeded_dict | length > 0 else fallback_dict }}"
          active_slots: >
            {% set active_name = states('sensor.p1s_YOUR_PRINTER_SERIAL_active_tray') | lower | trim %}
            {% set ns = namespace(slots=[]) %}
            {% for i in range(6) %}
              {% set t = tray_entities[i] %}
              {% set by_attr = state_attr(t, 'active') == true %}
              {% set by_name = active_name and (states(t) | lower | trim) == active_name %}
              {% if by_attr or by_name %}
                {% set ns.slots = ns.slots + [slot_map[i]] %}
              {% endif %}
            {% endfor %}
            {{ ns.slots | join(',') }}
          debug_detail: >
            {% set active_name = states('sensor.p1s_YOUR_PRINTER_SERIAL_active_tray') | lower | trim %}
            {% set ns = namespace(lines=[]) %}
            {% for i in range(6) %}
              {% set slot = slot_map[i] | string %}
              {% set t = tray_entities[i] %}
              {% set by_attr = state_attr(t, 'active') == true %}
              {% set by_name = active_name and (states(t) | lower | trim) == active_name %}
              {% if by_attr or by_name %}
                {% set fg = states('sensor.p1s_tray_' ~ slot ~ '_fuel_gauge_remaining') | float(-1) %}
                {% set ams = states('sensor.ams_slot_' ~ slot ~ '_remaining_g') | float(-1) %}
                {% set effective = fg if fg > 0 else (ams if ams > 0 else -1) %}
                {% set fg_int = fg | round(0) | int %}
                {% set ams_int = ams | round(0) | int %}
                {% set eff_int = effective | round(0) | int %}
                {% set src = 'attr' if by_attr else 'name' %}
                {% set ns.lines = ns.lines + ['s' ~ slot ~ '(' ~ src ~ ') fg=' ~ fg_int ~ ' ams=' ~ ams_int ~ ' eff=' ~ eff_int] %}
              {% endif %}
            {% endfor %}
            {{ ns.lines | join(' | ') }}
      - action: input_text.set_value
        target:
          entity_id: input_text.p1s_init_seed_debug
        data:
          value: "print_status={{ states('sensor.p1s_YOUR_PRINTER_SERIAL_print_status') }} | active_slots={{ active_slots }} | {{ debug_detail }} | seeded={{ seeded_dict | tojson }}{% if seeded_dict | length == 0 and fallback_dict | length > 0 %} | fallback={{ fallback_dict | tojson }}{% endif %}"
      - if:
          - condition: template
            value_template: "{{ dict_to_seed | length > 0 }}"
        then:
          - action: input_text.set_value
            target:
              entity_id: input_text.p1s_tray_remaining_start_json
            data:
              value: "{{ dict_to_seed | tojson }}"
          # ALSO seed input_number helpers (JSON-free path)
          - repeat:
              count: 6
              sequence:
                - variables:
                    slot_str: "{{ repeat.index | string }}"
                    grams: "{{ dict_to_seed.get(slot_str, 0) | int }}"
                - service: input_number.set_value
                  target:
                    entity_id: "input_number.p1s_start_slot_{{ repeat.index }}_g"
                  data:
                    value: "{{ grams }}"
      - service: logbook.log
        data:
          name: P1S Filament Tracking
          message: "Init: reset helpers, seeded {{ dict_to_seed | length }} slot(s){% if seeded_dict | length == 0 and fallback_dict | length > 0 %} (fallback: no tray active){% endif %}"
    mode: single
  
  - id: p1s_remaining_snapshot_on_tray_first_active
    alias: P1S – seed start grams on tray first active
    description: Record start grams when tray becomes active during print (merge-only, write-once per slot)
    trigger:
      - platform: state
        entity_id:
          - sensor.p1s_YOUR_PRINTER_SERIAL_ams_1_tray_1
          - sensor.p1s_YOUR_PRINTER_SERIAL_ams_1_tray_2
          - sensor.p1s_YOUR_PRINTER_SERIAL_ams_1_tray_3
          - sensor.p1s_YOUR_PRINTER_SERIAL_ams_1_tray_4
          - sensor.p1s_YOUR_PRINTER_SERIAL_ams_128_tray_1
          - sensor.p1s_YOUR_PRINTER_SERIAL_ams_129_tray_1
        attribute: active
        to: true
    condition:
      - condition: template
        value_template: "{{ states('sensor.p1s_YOUR_PRINTER_SERIAL_print_status') in ['running', 'printing'] }}"
    variables:
      slot_map:
        sensor.p1s_YOUR_PRINTER_SERIAL_ams_1_tray_1: 1
        sensor.p1s_YOUR_PRINTER_SERIAL_ams_1_tray_2: 2
        sensor.p1s_YOUR_PRINTER_SERIAL_ams_1_tray_3: 3
        sensor.p1s_YOUR_PRINTER_SERIAL_ams_1_tray_4: 4
        sensor.p1s_YOUR_PRINTER_SERIAL_ams_128_tray_1: 5
        sensor.p1s_YOUR_PRINTER_SERIAL_ams_129_tray_1: 6
      slot_int: "{{ slot_map[trigger.entity_id] }}"
      fg: "{{ states('sensor.p1s_tray_' ~ slot_int ~ '_fuel_gauge_remaining') | float(-1) }}"
      ams: "{{ states('sensor.ams_slot_' ~ slot_int ~ '_remaining_g') | float(-1) }}"
      eff: "{{ fg if fg > 0 else (ams if ams > 0 else -1) }}"
      grams: "{{ [0, eff] | max | round(0) | int }}"
      already_set: "{{ states('input_number.p1s_start_slot_' ~ slot_int ~ '_g') | int(0) > 0 }}"
    action:
      - if:
          - condition: template
            value_template: "{{ eff >= 0 and not already_set }}"
        then:
          - service: input_number.set_value
            target:
              entity_id: "input_number.p1s_start_slot_{{ slot_int }}_g"
            data:
              value: "{{ grams }}"
          - action: input_text.set_value
            target:
              entity_id: input_text.p1s_init_seed_debug
            data:
              value: "tray={{ trigger.entity_id }} | slot={{ slot_int }} | fg={{ fg | round(0) | int }} | ams={{ ams | round(0) | int }} | eff={{ eff | round(0) | int }} | grams={{ grams }} | written"
        else:
          - variables:
              skip_reason: >
                {% if eff < 0 %}eff<0
                {% elif already_set %}already_set
                {% else %}unknown{% endif %}
          - action: input_text.set_value
            target:
              entity_id: input_text.p1s_init_seed_debug
            data:
              value: "tray={{ trigger.entity_id }} | slot={{ slot_int }} | skip={{ skip_reason }}"
    mode: queued
    max: 10
  
  # DEBUG: Record every print_status change to helper (when filament_debug_mode ON)
  - id: p1s_debug_print_status_transition
    alias: P1S – DEBUG record print_status transitions
    description: "When filament_debug_mode ON: record print_status from→to to p1s_last_print_status_transition."
    trigger:
      - platform: state
        entity_id: sensor.p1s_YOUR_PRINTER_SERIAL_print_status
    condition:
      - condition: state
        entity_id: input_boolean.filament_iq_debug_mode
        state: "on"
    action:
      - action: input_text.set_value
        target:
          entity_id: input_text.filament_iq_last_print_status_transition
        data:
          value: "{{ (now().isoformat() ~ ' | from=' ~ (trigger.from_state.state | default('(none)')) ~ ' | to=' ~ (trigger.to_state.state | default('(none)')))[:255] }}"
    mode: single
  
  - id: p1s_remaining_snapshot_on_finish
    alias: P1S – snapshot remaining on print finish
    description: Record tray remaining_filament at print finish and notify with start→end delta (NO JSON PARSING)
    trigger:
      - platform: state
        entity_id: sensor.p1s_YOUR_PRINTER_SERIAL_print_status
        from:
          - running
          - printing
          - pause
          - paused
      - platform: state
        entity_id: input_boolean.filament_iq_debug_finish_trigger
        to: "on"
    condition: []
    variables:
      trigger_state: "{{ 'debug' if trigger.entity_id == 'input_boolean.filament_iq_debug_finish_trigger' else (trigger.to_state.state | default('finish')) }}"
      task_name: "{{ states('sensor.p1s_YOUR_PRINTER_SERIAL_task_name') }}"
      is_failed: "{{ trigger_state in ['failed', 'error', 'canceled'] }}"
      should_decrement: "{{ not is_failed or states('input_boolean.filament_iq_decrement_on_failed') == 'on' }}"
    action:
      # 0. Guard: skip if we already processed this job (duplicate finish+offline trigger)
      - choose:
          - conditions:
              - condition: template
                value_template: >
                  {{ states('input_text.filament_iq_finish_automation_checkpoint') == 'complete'
                     and (as_timestamp(now()) - as_timestamp(states.input_text.filament_iq_finish_automation_checkpoint.last_changed | default(now()))) < 120 }}
            sequence:
              - stop: "Already processed this print (duplicate trigger)"
  
      # 1. Checkpoint
      - service: input_text.set_value
        target:
          entity_id: input_text.filament_iq_finish_automation_checkpoint
        data:
          value: "entered"
  
      # 2. Reset debug trigger if applicable
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ trigger.entity_id == 'input_boolean.filament_iq_debug_finish_trigger' }}"
            sequence:
              - service: input_boolean.turn_off
                target:
                  entity_id: input_boolean.filament_iq_debug_finish_trigger
  
      # 3. Guard: skip if no start snapshot
      - if:
          - condition: template
            value_template: >
              {{ states('input_text.p1s_tray_remaining_start_json') in ['', '{}', 'unavailable', 'unknown'] }}
        then:
          - service: input_text.set_value
            target:
              entity_id: input_text.filament_iq_finish_automation_checkpoint
            data:
              value: "skipped: no_start_snapshot"
          - stop: "No start snapshot"
  
      # 4. Build end_json from fuel gauge sensors (only slots with valid fuel gauge AND in start snapshot)
      - variables:
          end_json_built: >-
            {% set fuel_gauge_sensors = [
              'sensor.p1s_tray_1_fuel_gauge_remaining',
              'sensor.p1s_tray_2_fuel_gauge_remaining',
              'sensor.p1s_tray_3_fuel_gauge_remaining',
              'sensor.p1s_tray_4_fuel_gauge_remaining',
              'sensor.p1s_tray_5_fuel_gauge_remaining',
              'sensor.p1s_tray_6_fuel_gauge_remaining'
            ] %}
            {% set start_raw = states('input_text.p1s_tray_remaining_start_json') %}
            {% set start = start_raw | from_json if start_raw not in ['', '{}', 'unavailable', 'unknown'] else {} %}
            {% set ns = namespace(pairs=[]) %}
            {% for i in range(6) %}
              {% set slot_str = (i+1) | string %}
              {% set remaining = states(fuel_gauge_sensors[i]) | float(-1) %}
              {% if remaining > 0 and slot_str in start %}
                {% set ns.pairs = ns.pairs + ['"' ~ slot_str ~ '": ' ~ remaining] %}
              {% endif %}
            {% endfor %}
            {{ '{' ~ ns.pairs | join(', ') ~ '}' }}
  
      # 5. Write end_json
      - service: input_text.set_value
        target:
          entity_id: input_text.p1s_tray_remaining_end_json
        data:
          value: "{{ end_json_built | to_json }}"
  
      # 6. Fire P1S_PRINT_USAGE_READY event for AppDaemon
      - event: P1S_PRINT_USAGE_READY
        event_data:
          job_key: "{{ states('input_text.p1s_print_job_key') }}"
          task_name: "{{ states('sensor.p1s_YOUR_PRINTER_SERIAL_task_name') }}"
          print_weight_g: "{{ states('sensor.p1s_YOUR_PRINTER_SERIAL_print_weight') | float(0) }}"
          trays_used: "{{ states('input_text.filament_iq_trays_used_this_print') }}"
          start_json: "{{ states('input_text.p1s_tray_remaining_start_json') }}"
          end_json: "{{ end_json_built | to_json }}"
          print_status: "{{ trigger_state }}"
  
      # 7. Checkpoint complete
      - service: input_text.set_value
        target:
          entity_id: input_text.filament_iq_finish_automation_checkpoint
        data:
          value: "event_fired"
  
      # 8. Notification — handled by AppDaemon ams_print_usage_sync
  
      # 9. Final checkpoint
      - service: input_text.set_value
        target:
          entity_id: input_text.filament_iq_finish_automation_checkpoint
        data:
          value: "complete"
    mode: single
  
  # Detect mid-print spool mapping changes → set reconcile flag
  - id: p1s_detect_spool_swap_during_print
    alias: P1S – detect spool swap during print
    description: When spool assignment changes while print is active, set reconcile flag and notify
    trigger:
      - platform: state
        entity_id:
          - input_text.ams_slot_1_spool_id
          - input_text.ams_slot_2_spool_id
          - input_text.ams_slot_3_spool_id
          - input_text.ams_slot_4_spool_id
          - input_text.ams_slot_5_spool_id
          - input_text.ams_slot_6_spool_id
    condition:
      - condition: state
        entity_id: input_boolean.filament_iq_print_active
        state: 'on'
      - condition: state
        entity_id: input_boolean.filament_iq_startup_suppress_swap
        state: 'off'
      # Only fire when printer is actually printing (avoid false positives when mutex is stale)
      - condition: or
        conditions:
          - condition: template
            value_template: "{{ states('sensor.filament_iq_operator_status') in ['printing_normally', 'printing_attention_needed', 'printing'] }}"
          - condition: template
            value_template: "{{ states('sensor.p1s_YOUR_PRINTER_SERIAL_print_status') in ['running', 'printing'] }}"
    action:
      - service: input_boolean.turn_on
        target:
          entity_id: input_boolean.filament_iq_needs_reconcile
      - service: notify.persistent_notification
        data:
          title: "P1S Spool Swap During Print Detected"
          message: "{{ trigger.to_state.entity_id }} changed from {{ trigger.from_state.state }} to {{ trigger.to_state.state }} while print active. Automatic filament tracking disabled for this print. Manual reconciliation required."
      - delay: "00:05:00"
    mode: single
  
  # After AppDaemon/reconcile startup, suppress spool-swap detection for 90s to avoid false positives from bulk helper updates.
  - id: appdaemon_startup_suppress_swap_clear
    alias: AppDaemon startup – suppress spool swap detection then clear
    description: On appdaemon_startup or ams_rfid_reconcile_startup (or when suppress boolean turns on), ensure suppress is on then turn it off after 90s.
    trigger:
      - platform: event
        event_type:
          - appdaemon_startup
          - ams_rfid_reconcile_startup
      - platform: state
        entity_id: input_boolean.filament_iq_startup_suppress_swap
        to: 'on'
    action:
      - service: input_boolean.turn_on
        target:
          entity_id: input_boolean.filament_iq_startup_suppress_swap
      - delay:
          seconds: 90
      - service: input_boolean.turn_off
        target:
          entity_id: input_boolean.filament_iq_startup_suppress_swap
    mode: restart
  
  # Sync spool dropdown to bound spool when helper changes (reconciler or assign).
  - id: ams_sync_dropdown_to_bound_spool
    alias: "AMS: Sync spool dropdown to bound spool ID"
    description: When input_text.ams_slot_N_spool_id changes to a positive value, select the matching option in the slot's dropdown.
    trigger:
      - platform: state
        entity_id:
          - input_text.ams_slot_1_spool_id
          - input_text.ams_slot_2_spool_id
          - input_text.ams_slot_3_spool_id
          - input_text.ams_slot_4_spool_id
          - input_text.ams_slot_5_spool_id
          - input_text.ams_slot_6_spool_id
    condition:
      - condition: template
        value_template: "{{ trigger.to_state.state | int(0) > 0 }}"
    action:
      - variables:
          slot: "{{ trigger.entity_id.split('_slot_')[1].split('_')[0] }}"
          spool_id: "{{ trigger.to_state.state }}"
          match: "{% set ns = namespace(match='') %}{% for opt in state_attr('input_select.ams_slot_' ~ slot ~ '_select_spool', 'options') or [] %}{% if ('(' ~ spool_id ~ ')') in opt %}{% set ns.match = opt %}{% endif %}{% endfor %}{{ ns.match }}"
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ match | trim | length > 0 }}"
            sequence:
              - service: input_select.select_option
                target:
                  entity_id: "input_select.ams_slot_{{ slot }}_select_spool"
                data:
                  option: "{{ match | trim }}"
  
  # Reload automations when Spoolman fires a threshold event (info/warning/critical).
  # The Spoolman integration does not fire an event when spools are added/updated;
  # after swapping a spool and updating automations.yaml, deploy then either run
  # automation.reload from Developer Tools > Services, or wait for a threshold event.
  - id: spoolman_reload_automations_on_threshold
    alias: Spoolman – reload automations on threshold event
    description: When any spool hits a Spoolman threshold, reload automations so updated name→spool_id mappings are picked up.
    trigger:
    - platform: event
      event_type: spoolman_spool_threshold_exceeded
    action:
    - action: automation.reload
    mode: single
  
  # Populate all spool dropdowns (global + per-slot) from Spoolman entities (no REST).
  # Trigger on HA start and when options sensor changes; condition options non-empty.
  - id: ams_populate_spool_dropdown_on_rest_data
    alias: AMS – populate all spool dropdowns from Spoolman entities
