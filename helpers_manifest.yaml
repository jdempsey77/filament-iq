  - input_text.spoolman_new_filament_material
  - input_text.spoolman_new_filament_color_hex
  - input_text.spoolman_new_spool_location
  - input_text.spoolman_new_spool_uuid
  # P1S print tracking state
  - input_text.p1s_last_active_tray
  - input_text.p1s_last_tray_entity
  - input_text.p1s_trays_used_this_print
