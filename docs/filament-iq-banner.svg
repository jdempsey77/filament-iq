<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 140" width="700" height="140">
  <!-- Background -->
  <rect width="700" height="140" fill="#0d1117"/>
  <!-- Subtle grid -->
  <defs>
    <pattern id="grid" width="28" height="28" patternUnits="userSpaceOnUse">
      <path d="M28 0L0 0 0 28" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="700" height="140" fill="url(#grid)"/>
  <!-- Spool mark -->
  <circle cx="70" cy="70" r="46" fill="none" stroke="#5B8AF0" stroke-width="4"/>
  <path d="M70 26 A44 44 0 1 1 69.99 26Z" fill="none" stroke="#F97316" stroke-width="15" opacity="0.9"/>
  <circle cx="70" cy="70" r="16" fill="#0d1117" stroke="#5B8AF0" stroke-width="3"/>
  <line x1="70" y1="24" x2="70" y2="54" stroke="#5B8AF0" stroke-width="3" stroke-linecap="round"/>
  <line x1="109.8" y1="92" x2="90.2" y2="81" stroke="#5B8AF0" stroke-width="3" stroke-linecap="round"/>
  <line x1="30.2" y1="92" x2="49.8" y2="81" stroke="#5B8AF0" stroke-width="3" stroke-linecap="round"/>
  <circle cx="70" cy="70" r="6.5" fill="#5B8AF0"/>
  <!-- Filament tail -->
  <path d="M113 44 Q122 32 120 22" fill="none" stroke="#F97316" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
  <circle cx="120" cy="22" r="4" fill="#F97316" opacity="0.7"/>
  <!-- Wordmark -->
  <text x="148" y="60" font-family="system-ui,-apple-system,sans-serif" font-size="36" font-weight="800" fill="#ffffff" dominant-baseline="middle" letter-spacing="-1">Filament</text>
  <text x="148" y="98" font-family="system-ui,-apple-system,sans-serif" font-size="36" font-weight="200" fill="#5B8AF0" dominant-baseline="middle" letter-spacing="14">IQ</text>
  <!-- Tagline -->
  <text x="440" y="54" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="400" fill="rgba(255,255,255,0.45)" dominant-baseline="middle">Filament identity &amp; lifecycle</text>
  <text x="440" y="74" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="400" fill="rgba(255,255,255,0.45)" dominant-baseline="middle">management for Bambu Lab printers</text>
  <text x="440" y="100" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="500" fill="#F97316" dominant-baseline="middle" opacity="0.75">v1.5.0</text>
</svg>
