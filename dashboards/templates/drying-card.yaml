                - type: conditional
                  conditions:
                    - condition: state
                      entity: binary_sensor.p1s_your_printer_serial_AMS_SENSOR_PREFIXdrying
                      state: 'on'
                  card:
                    type: custom:mushroom-template-card
                    primary: >-
                      {% set temp =
                      states('sensor.p1s_your_printer_serial_AMS_SENSOR_PREFIXtemperature') %}
                      Drying Active · {{ temp }}°C
                    secondary: >-
                      {% set t =
                      states('sensor.p1s_your_printer_serial_AMS_SENSOR_PREFIXremaining_drying_time')
                      | float(0) %} {% set h = t | int %} {% set m = ((t - h) *
                      60) | round(0) | int %} {% if h > 0 %}{{ h }}h {% endif
                      %}{{ m }}m remaining
                    icon: mdi:fan-clock
                    icon_color: '#64b4dc'
                    tap_action:
                      action: none
                    card_mod:
                      style: |
                        ha-card {
                          border-top: 1px solid rgba(100,180,220,0.30) !important;
                          border-bottom: none !important;
                          border-right: none !important;
                          border-radius: 0 0 14px 14px !important;
                          box-shadow: none !important;
                          background: rgba(80,160,210,0.08) !important;
                        }
