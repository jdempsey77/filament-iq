  - input_text.ams_slot_2_expected_color_hex
  - input_text.ams_slot_3_expected_color_hex
  - input_text.ams_slot_4_expected_color_hex
  - input_text.ams_slot_5_expected_color_hex
  - input_text.ams_slot_6_expected_color_hex
  # AMS slot unbound reason (6 slots)
