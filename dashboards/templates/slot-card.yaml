                        box-shadow: none !important;
                        background: transparent !important;
                        {% set status = states('sensor.ams_slot_SLOT_NUM_status') %}
                        {% set r = states('input_text.ams_slot_SLOT_NUM_unbound_reason') %}
                        {% set active_ams = state_attr('sensor.p1s_your_printer_serial_active_tray', 'ams_index') %}
                        {% set active_tray = state_attr('sensor.p1s_your_printer_serial_active_tray', 'tray_index') %}
                        {% set printing = states('sensor.p1s_your_printer_serial_current_stage') == 'printing' %}
                        {% set is_active = printing and active_ams == AMS_INDEX_NUM and active_tray == TRAY_INDEX %}
                        {% set hex = states('sensor.ams_slot_SLOT_NUM_color_hex') %}
                        {% set safe_hex = hex if hex not in ['unknown', 'unavailable', ''] else '3b9fd8' %}
                        {% if is_active and status == 'ok' %}
                        background: rgba(255,255,255,0.06) !important;
                        {% elif status == 'empty' %}opacity: 0.4;
                        {% elif 'RFID_NOT_REFRESHED' in r %}background: rgba(255,152,0,0.05) !important;
                        {% elif status == 'needs_bind' %}background: rgba(239,83,80,0.05) !important;
                        {% endif %}
                        {% set g = states('sensor.ams_slot_SLOT_NUM_remaining_g') | float(0) %}
                        {% set pct = [0, [100, (g / 1000 * 100) | round(0) | int] | min] | max %}
                        {% if status != 'empty' %}
                        background-image: linear-gradient(to right, rgba(255,255,255,0.7) {{ pct }}%, rgba(255,255,255,0.1) {{ pct }}%) !important;
                        background-position: bottom !important;
                        background-size: 100% 3px !important;
                        background-repeat: no-repeat !important;
                        {% endif %}
                      }
                      .primary {
                        {% set status = states('sensor.ams_slot_SLOT_NUM_status') %}
                        {% set r = states('input_text.ams_slot_SLOT_NUM_unbound_reason') %}
                        {% set active_ams = state_attr('sensor.p1s_your_printer_serial_active_tray', 'ams_index') %}
                        {% set active_tray = state_attr('sensor.p1s_your_printer_serial_active_tray', 'tray_index') %}
                        {% set printing = states('sensor.p1s_your_printer_serial_current_stage') == 'printing' %}
                        {% set is_active = printing and active_ams == AMS_INDEX_NUM and active_tray == TRAY_INDEX %}
                        {% set hex = states('sensor.ams_slot_SLOT_NUM_color_hex') %}
                        {% set safe_hex = hex if hex not in ['unknown', 'unavailable', ''] else '3b9fd8' %}
                        {% if is_active and status == 'ok' %}color: #{{ safe_hex }} !important;
                        {% elif 'RFID_NOT_REFRESHED' in r %}color: #FF9800 !important;
                        {% elif status == 'needs_bind' %}color: #ef5350 !important;
                        {% endif %}
                      }
