                                below. {% elif status == 'ok' %}### {{
                                states('sensor.ams_slot_SLOT_NUM_name') }}

                                {{ states('sensor.ams_slot_SLOT_NUM_vendor') }} - {{
                                states('sensor.ams_slot_SLOT_NUM_material') }}

                                Remaining: {{
                                states('sensor.ams_slot_SLOT_NUM_remaining_g') }}g ·
                                Spool #{{
                                states('input_text.ams_slot_SLOT_NUM_spool_id') }} {%
                                elif status == 'needs_bind' %}### Binding
