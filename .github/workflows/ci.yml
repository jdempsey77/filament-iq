name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        # Pillow is required by apps/filament_iq/label_printer.py (and the
        # corresponding test_label_printer.py tests). brother_ql is also a
        # runtime dep but is imported lazily inside send_to_printer() and
        # only when dry_run is False — tests never reach it, so it's not
        # needed in CI.
        run: pip install appdaemon pytest Pillow
      - name: Run tests
        run: python3 -m pytest tests/ -q
      - name: Run audit
        run: python3 scripts/audit_config_driven.py
        continue-on-error: true
