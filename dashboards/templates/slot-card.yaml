                      {% set hex = states('sensor.ams_slot_SLOT_NUM_color_hex') %}
                      {% if hex in ['000000', 'unknown', 'unavailable', ''] %}#555555
                      {% else %}#{{ hex }}{% endif %}
                    {% endif %}
                  badge_icon: >-
                    {% set printing =
