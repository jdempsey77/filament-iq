              {% if '|||' in raw %}
                {% set parts = (raw.split('|||') | map('trim') | reject('eq', '') | list) %}
                {{ parts | sort }}
              {% elif ' - ' in raw %}
                {{ [raw | trim] }}
              {% else %}
                {{ [] }}
              {% endif %}
            {% else %}
