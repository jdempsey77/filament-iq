# Filament list from Spoolman API for "Add spool" dropdown. Uses fixed resource URL so the entity is always created (resource_template can prevent REST entity creation).
# Set resource below to your Spoolman API base + /api/v1/filament (e.g. http://192.168.1.100:7912/api/v1/filament). Restart HA after changing.
sensor:
  - platform: rest
    resource: "http://YOUR_SPOOLMAN_IP:7912/api/v1/filament"
    name: Spoolman filaments API
    value_template: >
      {% if value_json is defined and value_json is iterable and value_json is not string %}
        OK
      {% else %}
        {{ this.state if this.state is defined else 'unknown' }}
      {% endif %}
    json_attributes_path: "$"
    scan_interval: 3600
    unique_id: spoolman_filaments_api
  - platform: rest
    resource: "http://YOUR_SPOOLMAN_IP:7912/api/v1/vendor"
    name: Spoolman vendors API
    value_template: >
      {% if value_json is defined and value_json is iterable and value_json is not string %}
        {% set ns = namespace(parts=[]) %}
        {% for v in value_json %}
          {% set vendor_name = (v.name | default('')) | string | trim %}
          {% if vendor_name %}
            {% set ns.parts = ns.parts + [(v.id | string) ~ ' - ' ~ vendor_name] %}
          {% endif %}
        {% endfor %}
        {{ ns.parts | join('|||') }}
      {% else %}
        {{ this.state if this.state is defined else '' }}
      {% endif %}
    scan_interval: 3600
    unique_id: spoolman_vendors_api
  - platform: rest
    resource: "http://YOUR_SPOOLMAN_IP:7912/api/v1/spool"
    name: Spoolman spools API
    value_template: >
      {% if value_json is defined and value_json is iterable and value_json is not string %}
        {% set ns = namespace(fids=[]) %}
        {% for s in value_json %}
          {% if s.filament and s.filament.id %}
            {% set fid = s.filament.id | string %}
            {% if fid not in ns.fids %}
              {% set ns.fids = ns.fids + [fid] %}
            {% endif %}
          {% endif %}
        {% endfor %}
        {{ ns.fids | join(',') }}
      {% else %}
        {{ this.state if this.state is defined else '' }}
      {% endif %}
    scan_interval: 3600
    unique_id: spoolman_spools_api


# Spoolman list data for flex-table dashboard (wraps API array in object so HA can store items)
command_line:
  - sensor:
      name: "Spoolman filament list data"
      unique_id: spoolman_filament_list_data
      command: 'curl -s "http://YOUR_SPOOLMAN_IP:7912/api/v1/filament" | python3 -c "import json,sys; d=json.load(sys.stdin); print(json.dumps({\"count\":len(d),\"items\":d}))"'
      value_template: "{{ value_json.count }}"
      json_attributes:
        - items
      scan_interval: 300
  - sensor:
      name: "Spoolman spool list data"
      unique_id: spoolman_spool_list_data
      command: 'curl -s "http://YOUR_SPOOLMAN_IP:7912/api/v1/spool" | python3 -c "import json,sys; d=json.load(sys.stdin); print(json.dumps({\"count\":len(d),\"items\":d}))"'
      value_template: "{{ value_json.count }}"
      json_attributes:
        - items
      scan_interval: 300


template:
  - sensor:
      - name: "P1S Operator Status"
        unique_id: p1s_operator_status_YOUR_PRINTER_SERIAL
        availability: >
          {{ states('sensor.p1s_YOUR_PRINTER_SERIAL_print_status') not in ['unknown', 'unavailable'] or states('binary_sensor.p1s_YOUR_PRINTER_SERIAL_online') not in ['unknown', 'unavailable'] }}
        state: >
          {% set status = states('sensor.p1s_YOUR_PRINTER_SERIAL_print_status') | lower %}
          {% set online = states('binary_sensor.p1s_YOUR_PRINTER_SERIAL_online') %}
          {% set print_error = states('binary_sensor.p1s_YOUR_PRINTER_SERIAL_print_error') %}
          {% set hms_errors = states('binary_sensor.p1s_YOUR_PRINTER_SERIAL_hms_errors') %}
          {% set has_error = print_error == 'on' or hms_errors == 'on' %}
          {% if online == 'off' or status == 'offline' or status in ['unknown', 'unavailable', ''] %}
            offline
          {% elif status == 'failed' or (has_error and status in ['idle', 'finish']) %}
            failed_requires_intervention
          {% elif status in ['finish', 'finished', 'completed'] %}
            finished_success
          {% elif status in ['running', 'printing'] %}
            {% if has_error %}printing_attention_needed{% else %}printing_normally{% endif %}
          {% elif status in ['pause', 'paused'] %}
            {% if has_error %}paused_error{% else %}paused_user{% endif %}
          {% elif status in ['prepare', 'init', 'slicing'] %}
            printing_normally
          {% elif status == 'idle' %}
            idle_ready
          {% else %}
            unknown
          {% endif %}
        icon: >
          {% set status = states('sensor.p1s_YOUR_PRINTER_SERIAL_print_status') | lower %}
          {% set online = states('binary_sensor.p1s_YOUR_PRINTER_SERIAL_online') %}
          {% set print_error = states('binary_sensor.p1s_YOUR_PRINTER_SERIAL_print_error') %}
          {% set hms_errors = states('binary_sensor.p1s_YOUR_PRINTER_SERIAL_hms_errors') %}
          {% set has_error = print_error == 'on' or hms_errors == 'on' %}
          {% if online == 'off' or status == 'offline' %}mdi:printer-off
          {% elif status == 'failed' or (has_error and status in ['idle', 'finish']) %}mdi:printer-alert
          {% elif status in ['finish', 'finished', 'completed'] %}mdi:printer-3d-nozzle-check
          {% elif status in ['running', 'printing'] and has_error %}mdi:printer-3d-nozzle-alert
          {% elif status in ['running', 'printing'] %}mdi:printer-3d
          {% elif status in ['pause', 'paused'] and has_error %}mdi:printer-alert
          {% elif status in ['pause', 'paused'] %}mdi:printer-3d-paused
          {% else %}mdi:printer-3d{% endif %}
      - name: "AMS Unbound Slot Count"
        unique_id: ams_unbound_slot_count
        state: >-
          {% set ns = namespace(count=0) %}
          {% for i in range(1,7) %}
          {% set r = states('input_text.ams_slot_' ~ i ~ '_unbound_reason') %}
          {% if r not in ['', 'unknown', 'unavailable', 'UNBOUND_TRAY_EMPTY', 'FORCE_ACCEPTED'] %}
          {% set ns.count = ns.count + 1 %}
          {% endif %}
          {% endfor %}
          {{ ns.count }}
        icon: >-
          {% set ns = namespace(count=0) %}
          {% for i in range(1,7) %}
          {% set r = states('input_text.ams_slot_' ~ i ~ '_unbound_reason') %}
          {% if r not in ['', 'unknown', 'unavailable', 'UNBOUND_TRAY_EMPTY', 'FORCE_ACCEPTED'] %}
          {% set ns.count = ns.count + 1 %}
          {% endif %}
          {% endfor %}
          {% if ns.count > 0 %}mdi:alert{% else %}mdi:check-circle{% endif %}
