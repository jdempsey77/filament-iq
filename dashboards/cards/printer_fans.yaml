      - type: custom:mushroom-template-card
        primary: Print Hours
        secondary: >-
          {{ states('sensor.p1s_01p00c5a3101668_total_usage') | float(0) | round(0) | int }}h
        icon: mdi:clock-outline
        icon_color: grey
        layout: vertical
        tap_action:
          action: more-info
          entity: sensor.p1s_01p00c5a3101668_total_usage
        hold_action:
