# ═══════════════════════════════════════════════════════════════
# Filament IQ — Dashboard
# https://github.com/jdempsey77/filament-iq
# ═══════════════════════════════════════════════════════════════
#
# Generated by: ./scripts/setup-dashboard.sh
#
# PREREQUISITES:
#   - ha-bambulab integration installed and configured
#   - Spoolman running on your network
#   - filament_iq_proxy custom component installed (see README)
#   - filament-iq-manager.js registered as Lovelace resource
# ═══════════════════════════════════════════════════════════════

views:
  - title: 3D Printer
    icon: mdi:printer-3d
    path: printer
    type: sections
    max_columns: 3
    sections:
      - type: grid
        cards:
          - type: custom:mod-card
            style: |
              ha-card {
                background: #2c2c2e !important;
                border: 1px solid #3a3a3c !important;
                border-radius: 14px !important;
                box-shadow: 0 6px 16px rgba(0, 0, 0, 0.7) !important;
                overflow: hidden;
                padding: 0 !important;
              }
            card:
              type: vertical-stack
              cards:
                - type: custom:mod-card
                  style: |
                    ha-card {
                      background: #2c2c2e !important;
                      border: none !important;
                      border-bottom: 1px solid rgba(255,255,255,0.06) !important;
                      border-radius: 0 !important;
                      box-shadow: none !important;
                      padding: 0 !important;
                    }
                  card:
                    type: custom:button-card
                    entity: image.p1s_your_printer_serial_cover_image
                    show_entity_picture: |
                      [[[
                        const status = states['sensor.p1s_your_printer_serial_print_status'].state;
                        return !['idle', 'offline', 'unavailable', 'unknown'].includes(status);
                      ]]]
                    show_icon: |
                      [[[
                        const status = states['sensor.p1s_your_printer_serial_print_status'].state;
                        return ['idle', 'offline', 'unavailable', 'unknown'].includes(status);
                      ]]]
                    icon: mdi:printer-3d-nozzle
                    show_name: true
                    show_label: true
                    show_state: false
                    layout: icon_name_state2nd
                    name: |
                      [[[
                        const status = states['sensor.p1s_your_printer_serial_print_status'].state;
                        const task = states['sensor.p1s_your_printer_serial_task_name'].state;
                        let primary = '';
                        if (status === 'running') primary = 'PRINTING';
                        else if (status === 'idle') primary = 'IDLE';
                        else if (status === 'pause') primary = 'PAUSED';
                        else if (status === 'failed' || status === 'error') primary = 'FAILED';
                        else if (status === 'finish') primary = 'FINISHED';
                        else if (status === 'prepare') primary = 'PREPARING';
                        else if (['offline', 'unavailable', 'unknown'].includes(status)) primary = 'OFFLINE';
                        else primary = status ? status.toUpperCase() : '—';
                        if (!['idle', 'offline', 'unavailable', 'unknown'].includes(status) &&
                            task && !['unknown', 'unavailable', ''].includes(task)) {
                          primary += ' · ' + task.replace(/_/g, ' ');
                        }
                        return primary;
                      ]]]
                    label: |
                      [[[
                        const status = states['sensor.p1s_your_printer_serial_print_status'].state;
                        if (['idle', 'offline', 'unavailable', 'unknown'].includes(status))
                          return 'No active print';
                        if (['running', 'pause', 'prepare'].includes(status)) {
                          const pct = parseInt(states['sensor.p1s_your_printer_serial_print_progress'].state) || 0;
                          const t = parseFloat(states['sensor.p1s_your_printer_serial_remaining_time'].state) || 0;
                          const h = Math.floor(t);
                          const m = Math.floor((t - h) * 60);
                          const cur = states['sensor.p1s_your_printer_serial_current_layer'].state;
                          const tot = states['sensor.p1s_your_printer_serial_total_layer_count'].state;
                          let text = pct + '% · ';
                          if (h > 0) text += h + 'h ';
                          text += m + 'm left';
                          if (cur && tot && !['unknown', 'unavailable', ''].includes(cur) &&
                              !['unknown', 'unavailable', ''].includes(tot)) {
                            text += ' · Layer ' + cur + '/' + tot;
                          }
                          return text;
                        }
                        if (status === 'finish') return 'Print complete';
                        if (status === 'failed' || status === 'error') return 'Print failed';
                        return '—';
                      ]]]
                    tap_action:
                      action: more-info
                      entity: sensor.p1s_your_printer_serial_print_status
                    styles:
                      grid:
                        - grid-template-areas: '"i n" "i l"'
                        - grid-template-columns: min-content 1fr
                        - grid-template-rows: min-content min-content
                        - column-gap: 10px
                      card:
                        - background: transparent
                        - box-shadow: none
                        - padding: 8px 12px
                        - justify-content: flex-start
                      img_cell:
                        - background: '#e8e8e8'
                        - border-radius: 4px
                        - width: 56px
                        - height: 56px
                        - min-width: 56px
                        - grid-area: i
                        - align-self: center
                      entity_picture:
                        - object-fit: contain
                        - padding: 4px
                        - width: 100%
                        - height: 100%
                      icon:
                        - color: grey
                        - width: 24px
                        - height: 24px
                      name:
                        - font-size: 15px
                        - font-weight: 700
                        - letter-spacing: 0.3px
                        - text-align: left
                        - justify-self: start
                        - white-space: normal
                        - align-self: end
                        - grid-area: 'n'
                      label:
                        - font-size: 12px
                        - color: '#9ca3af'
                        - text-align: left
                        - justify-self: start
                        - align-self: start
                        - grid-area: l
                - type: conditional
                  conditions:
                    - condition: state
                      entity: sensor.p1s_your_printer_serial_print_status
                      state_not: idle
                    - condition: state
                      entity: sensor.p1s_your_printer_serial_print_status
                      state_not: finish
                    - condition: state
                      entity: sensor.p1s_your_printer_serial_print_status
                      state_not: offline
                    - condition: state
                      entity: sensor.p1s_your_printer_serial_print_status
                      state_not: unavailable
                    - condition: state
                      entity: sensor.p1s_your_printer_serial_print_status
                      state_not: unknown
                  card:
                    type: custom:mod-card
                    style: |
                      ha-card {
                        background: #2c2c2e !important;
                        border: none !important;
                        border-bottom: 1px solid rgba(255,255,255,0.06) !important;
                        border-radius: 0 !important;
                        box-shadow: none !important;
                        padding: 0 !important;
                      }
                    card:
                      type: vertical-stack
                      cards:
                        - type: custom:mod-card
                          style: |
                            ha-card {
                              background: transparent !important;
                              border: none !important;
                              border-radius: 0 !important;
                              box-shadow: none !important;
                              padding: 8px 12px 4px !important;
                            }
                          card:
                            type: custom:mushroom-template-card
                            primary: ''
                            secondary: ''
                            icon: ''
                            tap_action:
                              action: none
                            card_mod:
                              style: |
                                ha-card {
                                  --ha-card-background: transparent;
                                  box-shadow: none;
                                  min-height: 5px !important;
                                  padding: 0 !important;
                                }
                                mushroom-card-content {
                                  display: none !important;
                                }
                                ha-card::before {
                                  content: '';
                                  display: block;
                                  height: 5px;
                                  border-radius: 3px;
                                  background: rgba(255,255,255,0.07);
                                  position: relative;
                                  overflow: hidden;
                                }
                                ha-card::after {
                                  content: '';
                                  display: block;
                                  position: absolute;
                                  height: 5px;
                                  border-radius: 3px;
                                  background: linear-gradient(90deg, #3b9fd8, #63cab7);
                                  width: {{ states('sensor.p1s_your_printer_serial_print_progress') | int(0) }}%;
                                  z-index: 1;
                                }
                        - type: custom:mushroom-template-card
                          primary: >-
                            {% set ai =
                            state_attr('sensor.p1s_your_printer_serial_active_tray',
                            'ams_index') %} {% set ti =
                            state_attr('sensor.p1s_your_printer_serial_active_tray',
                            'tray_index') %} {% if ai == 0 and ti is not none
                            %}{% set slot = ti + 1 %} {% elif ai == 128 %}{% set
                            slot = 5 %} {% elif ai == 129 %}{% set slot = 6 %}
                            {% else %}{% set slot = 0 %} {% endif %} {% if slot
                            >= 1 and slot <= 6 %}
                              {% set name = states('sensor.ams_slot_' ~ slot ~ '_name') %}
                              {% set remaining = states('sensor.ams_slot_' ~ slot ~ '_remaining_g') %}
                              Slot {{ slot }}
                              {%- if name not in ['unknown', 'unavailable', '', none] %} · {{ name }}{% endif %}
                              {%- if remaining not in ['unknown', 'unavailable', '', none] %} · {{ remaining | float(0) | round(0) | int }}g{% endif %}
                            {% else %}No active tray {% endif %}
                          icon: >-
                            {% set ai =
                            state_attr('sensor.p1s_your_printer_serial_active_tray',
                            'ams_index') %} {% set ti =
                            state_attr('sensor.p1s_your_printer_serial_active_tray',
                            'tray_index') %} {% if ai == 0 and ti is not none
                            %}{% set slot = ti + 1 %} {% elif ai == 128 %}{% set
                            slot = 5 %} {% elif ai == 129 %}{% set slot = 6 %}
                            {% else %}{% set slot = 0 %} {% endif %} {% if slot
                            >= 1 and slot <= 6 %}mdi:numeric-{{ slot }}-circle
                            {% else %}mdi:tray-alert {% endif %}
                          icon_color: >-
                            {% set ai =
                            state_attr('sensor.p1s_your_printer_serial_active_tray',
                            'ams_index') %} {% set ti =
                            state_attr('sensor.p1s_your_printer_serial_active_tray',
                            'tray_index') %} {% if ai == 0 and ti is not none
                            %}{% set slot = ti + 1 %} {% elif ai == 128 %}{% set
                            slot = 5 %} {% elif ai == 129 %}{% set slot = 6 %}
                            {% else %}{% set slot = 0 %} {% endif %} {% if slot
                            >= 1 and slot <= 6 %}
                              {% set hex = states('sensor.ams_slot_' ~ slot ~ '_color_hex') %}
                              {% if hex in ['000000', 'unknown', 'unavailable', '', none] %}#555555
                              {% else %}#{{ hex }}
                              {% endif %}
                            {% else %}grey {% endif %}
                          layout: horizontal
                          tap_action:
                            action: none
                          card_mod:
                            style: |
                              ha-card {
                                --ha-card-background: transparent;
                                box-shadow: none;
                                padding: 0 12px 6px;
                              }
                              .primary {
                                font-size: 12px !important;
                                color: #9ca3af !important;
                              }
                              mushroom-shape-icon {
                                --icon-size: 18px !important;
                              }
          - square: false
            type: grid
            cards:
              - type: custom:button-card
                entity: switch.officeoutlet01_3dprinter
                name: Power
                show_icon: true
                icon: mdi:power
                show_state: false
                tap_action:
                  action: toggle
                  confirmation:
                    text: Toggle printer power?
                hold_action:
                  action: more-info
                styles:
                  card:
                    - padding: 11px 14px
                    - border-radius: 10px
                    - box-shadow: none
                    - border: >-
                        [[[ return '1px solid ' + (entity.state === 'on' ?
                        '#d8d8da' : '#3a3a3c'); ]]]
                    - background: >-
                        [[[ return entity.state === 'on' ? '#f5f5f7' :
                        '#2c2c2e'; ]]]
                  grid:
                    - grid-template-areas: '"i n"'
                    - grid-template-columns: min-content 1fr
                    - align-items: center
                    - column-gap: 11px
                  icon:
                    - width: 18px
                    - color: >-
                        [[[ return entity.state === 'on' ? '#1c1c1e' :
                        '#e8e8ea'; ]]]
                    - opacity: '[[[ return entity.state === ''on'' ? ''1'' : ''0.35''; ]]]'
                    - filter: '[[[ return ''none''; ]]]'
                  name:
                    - font-size: 13px
                    - text-align: left
                    - justify-self: start
                    - color: >-
                        [[[ return entity.state === 'on' ? '#1c1c1e' :
                        '#e8e8ea'; ]]]
              - type: custom:button-card
                entity: light.p1s_your_printer_serial_chamber_light
                name: Light
                show_icon: true
                icon: mdi:lightbulb
                show_state: false
                tap_action:
                  action: toggle
                hold_action:
                  action: more-info
                styles:
                  card:
                    - padding: 11px 14px
                    - border-radius: 10px
                    - box-shadow: none
                    - border: >-
                        [[[ return '1px solid ' + (entity.state === 'on' ?
                        '#d8d8da' : '#3a3a3c'); ]]]
                    - background: >-
                        [[[ return entity.state === 'on' ? '#f5f5f7' :
                        '#2c2c2e'; ]]]
                  grid:
                    - grid-template-areas: '"i n"'
                    - grid-template-columns: min-content 1fr
                    - align-items: center
                    - column-gap: 11px
                  icon:
                    - width: 18px
                    - color: >-
                        [[[ return entity.state === 'on' ? '#1c1c1e' :
                        '#e8e8ea'; ]]]
                    - opacity: '[[[ return entity.state === ''on'' ? ''1'' : ''0.35''; ]]]'
                    - filter: '[[[ return ''none''; ]]]'
                  name:
                    - font-size: 13px
                    - text-align: left
                    - justify-self: start
                    - color: >-
                        [[[ return entity.state === 'on' ? '#1c1c1e' :
                        '#e8e8ea'; ]]]
              # Add your own air purifier or additional control cards here
              # Example: fan.your_air_purifier_entity
            columns: 3
          - type: custom:button-card
            entity: sensor.p1s_your_printer_serial_print_status
            show_name: false
            show_icon: false
            show_state: false
            show_label: true
            triggers_update:
              - fan.p1s_your_printer_serial_chamber_fan
              - fan.p1s_your_printer_serial_cooling_fan
              - fan.p1s_your_printer_serial_aux_fan
              - sensor.p1s_your_printer_serial_nozzle_temperature
              - sensor.p1s_your_printer_serial_nozzle_target_temperature
              - sensor.p1s_your_printer_serial_bed_temperature
              - sensor.p1s_your_printer_serial_bed_target_temperature
              - sensor.p1s_your_printer_serial_wi_fi_signal
              - sensor.p1s_your_printer_serial_total_usage
            label: |
              [[[
                var chamberOn  = states['fan.p1s_your_printer_serial_chamber_fan'].state === 'on';
                var coolingOn  = states['fan.p1s_your_printer_serial_cooling_fan'].state === 'on';
                var auxOn      = states['fan.p1s_your_printer_serial_aux_fan'].state === 'on';
                var chamberPct = chamberOn ? (states['fan.p1s_your_printer_serial_chamber_fan'].attributes.percentage || 0) : 0;
                var coolingPct = coolingOn ? (states['fan.p1s_your_printer_serial_cooling_fan'].attributes.percentage || 0) : 0;
                var auxPct     = auxOn ? (states['fan.p1s_your_printer_serial_aux_fan'].attributes.percentage || 0) : 0;
                var nozzle    = Math.round(parseFloat(states['sensor.p1s_your_printer_serial_nozzle_temperature'].state) || 0);
                var nozzleTgt = Math.round(parseFloat(states['sensor.p1s_your_printer_serial_nozzle_target_temperature'].state) || 0);
                var bed       = Math.round(parseFloat(states['sensor.p1s_your_printer_serial_bed_temperature'].state) || 0);
                var bedTgt    = Math.round(parseFloat(states['sensor.p1s_your_printer_serial_bed_target_temperature'].state) || 0);
                var rssi      = parseInt(states['sensor.p1s_your_printer_serial_wi_fi_signal'].state) || 0;
                var hours     = Math.round(parseFloat(states['sensor.p1s_your_printer_serial_total_usage'].state) || 0);
                var wifiLabel = rssi >= -50 ? 'WiFi · Excellent' : rssi >= -60 ? 'WiFi · Good' : rssi >= -70 ? 'WiFi · Fair' : rssi >= -80 ? 'WiFi · Weak' : 'WiFi · Poor';
                var fanPath   = 'M12,11A1,1 0 0,0 11,12A1,1 0 0,0 12,13A1,1 0 0,0 13,12A1,1 0 0,0 12,11M12.5,2C17,2 17.11,5.57 14.75,6.75C13.76,7.24 13.32,8.29 13.13,9.22C13.61,9.42 14.03,9.73 14.35,10.13C18.05,8.13 22.03,8.92 22.03,12.5C22.03,17 18.46,17.1 17.28,14.73C16.78,13.74 15.72,13.3 14.79,13.11C14.59,13.59 14.28,14 13.88,14.34C15.87,18.03 15.08,22 11.5,22C7,22 6.91,18.42 9.27,17.24C10.25,16.75 10.69,15.71 10.89,14.79C10.4,14.59 9.97,14.27 9.65,13.87C5.96,15.85 2,15.07 2,11.5C2,7 5.56,6.89 6.74,9.26C7.24,10.25 8.29,10.68 9.22,10.87C9.41,10.39 9.73,9.97 10.14,9.65C8.15,5.96 8.94,2 12.5,2Z';
                var nozzlePath= 'M7,2H17V8H19V13H16.5L13,17H11L7.5,13H5V8H7V2M10,22H2V20H10A1,1 0 0,0 11,19V18H13V19A3,3 0 0,1 10,22Z';
                var bedPath   = 'M8.5 4.5L5.4 9.5L8.5 14.7L5.2 20.5L3.4 19.6L6.1 14.7L3 9.5L6.7 3.6L8.5 4.5M14.7 4.4L11.6 9.5L14.7 14.5L11.4 20.3L9.6 19.4L12.3 14.5L9.2 9.5L12.9 3.5L14.7 4.4M21 4.4L17.9 9.5L21 14.5L17.7 20.3L15.9 19.4L18.6 14.5L15.5 9.5L19.2 3.5L21 4.4';
                var clockPath = 'M12,20A8,8 0 0,0 20,12A8,8 0 0,0 12,4A8,8 0 0,0 4,12A8,8 0 0,0 12,20M12,2A10,10 0 0,1 22,12A10,10 0 0,1 12,22C6.47,22 2,17.5 2,12A10,10 0 0,1 12,2M12.5,7V12.25L17,14.92L16.25,16.15L11,13V7H12.5Z';
                var wifiPath  = 'M12 3C7.8 3 3.7 4.4 .4 7C4.3 11.8 8.2 16.7 12 21.5C14.3 18.6 16.7 15.7 19 12.8V9.6L12 18.3L3.3 7.4C5.9 5.8 8.9 5 12 5C15.1 5 18.1 5.9 20.7 7.4L20.3 8H22.9C23.2 7.7 23.4 7.3 23.7 7C20.3 4.4 16.2 3 12 3M21 10V16H23V10M21 18V20H23V18';
                var base = 'font-size:13px;padding:3px 0;display:flex;align-items:center;gap:8px;';
                var dim  = 'color:#6e6e73;';
                var lit  = 'color:#e8e8ea;';
                var hot  = 'color:#e8784a;';
                function svg(path, color) {
                  return '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" style="width:15px;height:15px;flex-shrink:0;fill:' + color + '"><path d="' + path + '"/></svg>';
                }
                function row(svgEl, label, style) {
                  return '<div style="' + base + style + '">' + svgEl + '<span>' + label + '</span></div>';
                }
                var chamberColor = chamberOn  ? '#e8e8ea' : '#6e6e73';
                var coolingColor = coolingOn  ? '#e8e8ea' : '#6e6e73';
                var auxColor     = auxOn      ? '#e8e8ea' : '#6e6e73';
                var nozzleColor  = nozzleTgt  > 0 ? '#e8784a' : '#6e6e73';
                var bedColor     = bedTgt     > 0 ? '#e8784a' : '#6e6e73';
                return '<div style="display:grid;grid-template-columns:1fr 1fr;gap:0 16px;width:100%">' +
                  row(svg(fanPath,    chamberColor), chamberOn ? 'Chamber · ' + chamberPct + '%' : 'Chamber', chamberOn ? lit : dim) +
                  row(svg(nozzlePath, nozzleColor),  'Nozzle · ' + nozzle + '° / ' + nozzleTgt + '°',        nozzleTgt > 0 ? hot : dim) +
                  row(svg(fanPath,    coolingColor), coolingOn ? 'Cooling · ' + coolingPct + '%' : 'Cooling', coolingOn ? lit : dim) +
                  row(svg(bedPath,    bedColor),     'Bed · ' + bed + '° / ' + bedTgt + '°',                 bedTgt > 0 ? hot : dim) +
                  row(svg(fanPath,    auxColor),     auxOn ? 'Aux · ' + auxPct + '%' : 'Aux',                 auxOn ? lit : dim) +
                  row(svg(clockPath,  '#6e6e73'),    'Print Hours · ' + hours + 'h',                          dim) +
                  row(svg(wifiPath,   '#6e6e73'),    wifiLabel,                                                dim) +
                  '</div>';
              ]]]
            tap_action:
              action: none
            styles:
              card:
                - padding: 11px 14px
                - border-radius: 10px
                - box-shadow: none
                - background: '#2c2c2e'
                - border: 1px solid
              label:
                - width: 100%
                - text-align: left
                - line-height: '1'
                - margin: 0
                - padding: 0
            card_mod:
              style: |
                ha-card {
                  border: 1px solid #3a3a3c !important;
                  box-shadow: none !important;
                }
      - type: grid
        cards:
          # Printer camera — shows live feed from Bambu's built-in camera
          # Add your own external camera card here if desired
          - show_state: false
            show_name: false
            camera_view: live
            fit_mode: cover
            type: picture-entity
            entity: camera.p1s_your_printer_serial_camera
            card_mod:
              style: |
                background: #2c2c2e !important;
                ha-card {
                  border: 1px solid #3a3a3c !important;
                  border-radius: 12px !important;
                  box-shadow: 0 6px 16px rgba(0, 0, 0, 0.7) !important;
                }
          - type: grid
            columns: 2
            square: false
            cards:
              - type: custom:button-card
                name: Reconcile
                show_icon: true
                icon: mdi:sync
                show_state: false
                tap_action:
                  action: call-service
                  service: script.reconcile_all_ams_slots
                  data: {}
                styles:
                  card:
                    - padding: 11px 14px
                    - border-radius: 10px
                    - box-shadow: none
                    - border: 1px solid
                    - background: '#2c2c2e'
                  grid:
                    - grid-template-areas: '"i n"'
                    - grid-template-columns: min-content 1fr
                    - align-items: center
                    - column-gap: 11px
                  icon:
                    - width: 18px
                    - color: '#3b9fd8'
                    - opacity: '0.6'
                    - filter: none
                  name:
                    - font-size: 13px
                    - text-align: left
                    - justify-self: start
                    - color: '#e8e8ea'
                card_mod:
                  style: |
                    ha-card {
                      border: 1px solid #3a3a3c !important;
                      box-shadow: none !important;
                    }
              - type: custom:button-card
                name: Filament IQ
                show_icon: true
                icon: mdi:brain
                show_state: false
                tap_action:
                  action: navigate
                  navigation_path: /lovelace/filament-manager
                styles:
                  card:
                    - padding: 11px 14px
                    - border-radius: 10px
                    - box-shadow: none
                    - border: 1px solid
                    - background: '#2c2c2e'
                  grid:
                    - grid-template-areas: '"i n"'
                    - grid-template-columns: min-content 1fr
                    - align-items: center
                    - column-gap: 11px
                  icon:
                    - width: 18px
                    - color: '#0a84ff'
                    - opacity: '0.8'
                    - filter: none
                  name:
                    - font-size: 13px
                    - text-align: left
                    - justify-self: start
                    - color: '#e8e8ea'
                card_mod:
                  style: |
                    ha-card {
                      border: 1px solid #3a3a3c !important;
                      box-shadow: none !important;
                    }
          - type: custom:mod-card
