            id: homeassistant_start
        then:
          - delay:
              seconds: 5
      - action: input_select.set_options
        target:
          entity_id: input_select.spoolman_new_spool_filament
        data:
          options: "{{ ['— Select filament —'] + (state_attr('sensor.ams_filament_list_options', 'options') or []) }}"
    mode: single
  
  - id: ams_vendor_list_populate_dropdown
    alias: AMS – populate Add filament vendor dropdown
    description: When vendor list sensor or Spoolman vendors API sensor updates or on start, set input_select.spoolman_new_filament_vendor options.
    trigger:
      - platform: homeassistant
        event: start
        id: homeassistant_start
      - platform: state
        entity_id:
          - sensor.ams_vendor_list_options
          - sensor.spoolman_vendors_api
    condition:
      - condition: template
        value_template: >
          {{ states('input_select.spoolman_new_filament_vendor') not in ['unknown', 'unavailable'] }}
    action:
      - if:
          - condition: trigger
            id: homeassistant_start
        then:
          - delay:
              seconds: 5
      - action: input_select.set_options
        target:
          entity_id: input_select.spoolman_new_filament_vendor
        data:
