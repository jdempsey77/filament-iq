- id: printer_air_purifier_lan
  alias: Printer Air Purifier (LAN-proof)
  description: Turn office air purifier on when printing/paused, off when idle/finished/failed. Logs unknown states.
  triggers:
  - trigger: state
    entity_id: sensor.p1s_01p00c5a3101668_print_status
  conditions: []
  actions:
  - choose:
      - conditions:
        - condition: template
          value_template: "{{ trigger.to_state.state | lower in ['running', 'printing', 'pause', 'paused'] }}"
        sequence:
          - action: fan.turn_on
            target:
              entity_id: fan.office_air_purifier
            data:
              percentage: 75
      - conditions:
        - condition: template
          value_template: "{{ trigger.to_state.state | lower in ['idle', 'standby', 'finish', 'finished', 'completed', 'failed', 'error'] }}"
        sequence:
          - action: fan.turn_off
