            {% if fid not in ns.fids %}
              {% set ns.fids = ns.fids + [fid] %}
            {% endif %}
          {% endif %}
        {% endfor %}
        {{ ns.fids | join(',') }}
      {% else %}
        {{ this.state if this.state is defined else '' }}
      {% endif %}
    scan_interval: 3600
    unique_id: spoolman_spools_api

# Template sensors
template:
  - sensor:
      - name: "Dishwasher Status"
        unique_id: dishwasher_status_vt838979b
        availability: >
          {{ states('binary_sensor.vt838979b_dishwasher_is_clean') not in ['unknown', 'unavailable'] or states('sensor.vt838979b_dishwasher_operating_mode') not in ['unknown', 'unavailable'] }}
        state: >
          {% set operating_mode = states('sensor.vt838979b_dishwasher_operating_mode') %}
          {% set is_clean = states('binary_sensor.vt838979b_dishwasher_is_clean') %}
          {% set time_remaining = states('sensor.vt838979b_dishwasher_time_remaining') %}
          {% set status = '' %}
          {% if operating_mode and operating_mode not in ['unknown', 'unavailable', ''] %}
            {% if 'Complete' in operating_mode or 'Idle' in operating_mode or 'Standby' in operating_mode %}
              {% set status = 'Clean' %}
            {% elif 'Running' in operating_mode or 'Washing' in operating_mode or 'Drying' in operating_mode or 'Rinsing' in operating_mode or 'Active' in operating_mode %}
              {% set status = 'Running' %}
            {% else %}
              {% set status = operating_mode %}
            {% endif %}
          {% elif is_clean == 'on' %}
            {% set status = 'Clean' %}
          {% elif is_clean == 'off' %}
            {% set status = 'Running' %}
          {% else %}
            {% set status = 'Unknown' %}
          {% endif %}
          {% if status == 'Running' and time_remaining and time_remaining not in ['unknown', 'unavailable', ''] %}
            {% set time_float = time_remaining | float(0) %}
            {% if time_float > 0 %}
              {% set total_minutes = (time_float * 60) | int %}
              {% set hours = (total_minutes / 60) | int %}
              {% set minutes = total_minutes % 60 %}
              {% if hours > 0 %}
                {{ status }} ({{ hours }}h {{ minutes }}m)
              {% else %}
                {{ status }} ({{ minutes }} min)
              {% endif %}
            {% else %}
              {{ status }}
            {% endif %}
          {% else %}
            {{ status }}
          {% endif %}
        icon: >
          {% set operating_mode = states('sensor.vt838979b_dishwasher_operating_mode') %}
          {% set is_clean = states('binary_sensor.vt838979b_dishwasher_is_clean') %}
          {% if operating_mode and ('Complete' in operating_mode or 'Idle' in operating_mode) %}
            mdi:dishwasher
          {% elif is_clean == 'on' %}
            mdi:dishwasher
          {% elif operating_mode and ('Running' in operating_mode or 'Washing' in operating_mode or 'Active' in operating_mode) %}
            mdi:dishwasher-alert
          {% elif is_clean == 'off' %}
            mdi:dishwasher-alert
          {% else %}
            mdi:dishwasher-off
          {% endif %}
      - name: "Dishwasher Last Finished Time"
        unique_id: dishwasher_last_finished_time_vt838979b
        availability: >
          {{ states('input_datetime.dishwasher_last_finished') not in ['unknown', 'unavailable', ''] or states('binary_sensor.vt838979b_dishwasher_is_clean') == 'on' }}
        state: >
          {% set input_val = states('input_datetime.dishwasher_last_finished') %}
          {% set input_dt = input_val.replace(' ', 'T') | as_datetime if input_val and input_val not in ['unknown', 'unavailable', ''] else none %}
          {% set input_ts = input_dt.timestamp() if input_dt else 0 %}
          {% set is_clean = states('binary_sensor.vt838979b_dishwasher_is_clean') %}
          {% set clean_changed = state_attr('binary_sensor.vt838979b_dishwasher_is_clean', 'last_changed') %}
          {% set clean_ts = (clean_changed | as_timestamp | default(0)) if (is_clean == 'on' and clean_changed) else 0 %}
          {% set effective_ts = [input_ts, clean_ts] | max %}
          {% if effective_ts > 0 %}
            {{ effective_ts | timestamp_custom('%Y-%m-%d %H:%M:%S', true) }}
          {% elif input_val and input_val not in ['unknown', 'unavailable', ''] %}
            {% set s = input_val %}
            {% set ts = s.replace(' ', 'T') if ' ' in s else s %}
            {% set tz_raw = now().strftime('%z') %}
            {% set tz = tz_raw[:3] ~ ':' ~ tz_raw[3:] %}
            {{ ts ~ tz if 'T' in ts and ('+' not in ts[-6:] and '-' not in ts[-6:]) else ts }}
          {% else %}
            {% set tz_raw = now().strftime('%z') %}
            {% set tz = tz_raw[:3] ~ ':' ~ tz_raw[3:] %}
            1970-01-01T00:00:00{{ tz }}
          {% endif %}
        device_class: timestamp
        icon: mdi:clock-check
      - name: "Dishwasher Last Finished Display"
        unique_id: dishwasher_last_finished_display_vt838979b
        availability: >
          {{ states('input_datetime.dishwasher_last_finished') not in ['unknown', 'unavailable'] or states('binary_sensor.vt838979b_dishwasher_is_clean') == 'on' }}
        state: >
          {% set input_val = states('input_datetime.dishwasher_last_finished') %}
          {% set input_dt = (input_val | string).replace(' ', 'T') | as_datetime if input_val and input_val not in ['unknown', 'unavailable', ''] else none %}
          {% set input_ts = input_dt.timestamp() if input_dt else 0 %}
          {% set is_clean = states('binary_sensor.vt838979b_dishwasher_is_clean') %}
          {% set clean_changed = state_attr('binary_sensor.vt838979b_dishwasher_is_clean', 'last_changed') %}
          {% set clean_ts = (clean_changed | as_timestamp | default(0)) if (is_clean == 'on' and clean_changed) else 0 %}
          {% set effective_ts = [input_ts, clean_ts] | max %}
          {% if effective_ts > 0 %}
            {% set dt_str = effective_ts | timestamp_custom('%Y-%m-%d %H:%M:%S', true) %}
            {% set dt_parsed = (dt_str | string).replace(' ', 'T') | as_datetime %}
            {% if dt_parsed %}
              {% set now_dt = now() %}
              {% set dt_aware = dt_parsed.replace(tzinfo=now_dt.tzinfo) if not dt_parsed.tzinfo else dt_parsed %}
              {% set diff = (now_dt - dt_aware).total_seconds() %}
              {% set days = (diff / 86400) | int %}
              {% set hours = ((diff % 86400) / 3600) | int %}
              {% set minutes = ((diff % 3600) / 60) | int %}
              {% if days > 0 %}
                {{ dt_aware.strftime('%m/%d/%y') }} ({{ days }} day{{ 's' if days > 1 else '' }} ago)
              {% elif hours > 0 %}
                {{ dt_aware.strftime('%m/%d/%y') }} ({{ hours }} hour{{ 's' if hours > 1 else '' }} ago)
              {% elif minutes > 0 %}
                {{ dt_aware.strftime('%m/%d/%y') }} ({{ minutes }} minute{{ 's' if minutes > 1 else '' }} ago)
              {% else %}
                {{ dt_aware.strftime('%b %d, %Y at %I:%M %p') }} (just now)
              {% endif %}
            {% else %}
              Never
            {% endif %}
          {% else %}
            Never
          {% endif %}
        icon: mdi:clock-check
      - name: "P1S Operator Status"
        unique_id: p1s_operator_status_01p00c5a3101668
        availability: >
          {{ states('sensor.p1s_01p00c5a3101668_print_status') not in ['unknown', 'unavailable'] or states('binary_sensor.p1s_01p00c5a3101668_online') not in ['unknown', 'unavailable'] }}
        state: >
          {% set status = states('sensor.p1s_01p00c5a3101668_print_status') | lower %}
          {% set online = states('binary_sensor.p1s_01p00c5a3101668_online') %}
          {% set print_error = states('binary_sensor.p1s_01p00c5a3101668_print_error') %}
          {% set hms_errors = states('binary_sensor.p1s_01p00c5a3101668_hms_errors') %}
          {% set has_error = print_error == 'on' or hms_errors == 'on' %}
          {% if online == 'off' or status == 'offline' or status in ['unknown', 'unavailable', ''] %}
            offline
          {% elif status == 'failed' or (has_error and status in ['idle', 'finish']) %}
            failed_requires_intervention
          {% elif status in ['finish', 'finished', 'completed'] %}
            finished_success
          {% elif status in ['running', 'printing'] %}
            {% if has_error %}printing_attention_needed{% else %}printing_normally{% endif %}
          {% elif status in ['pause', 'paused'] %}
            {% if has_error %}paused_error{% else %}paused_user{% endif %}
          {% elif status in ['prepare', 'init', 'slicing'] %}
            printing_normally
          {% elif status == 'idle' %}
            idle_ready
          {% else %}
            unknown
          {% endif %}
        icon: >
          {% set status = states('sensor.p1s_01p00c5a3101668_print_status') | lower %}
          {% set online = states('binary_sensor.p1s_01p00c5a3101668_online') %}
          {% set print_error = states('binary_sensor.p1s_01p00c5a3101668_print_error') %}
          {% set hms_errors = states('binary_sensor.p1s_01p00c5a3101668_hms_errors') %}
          {% set has_error = print_error == 'on' or hms_errors == 'on' %}
          {% if online == 'off' or status == 'offline' %}mdi:printer-off
          {% elif status == 'failed' or (has_error and status in ['idle', 'finish']) %}mdi:printer-alert
          {% elif status in ['finish', 'finished', 'completed'] %}mdi:printer-3d-nozzle-check
