# Loads default set of integrations. Do not remove.
default_config:

# Temporary debug logging for Spoolman integration setup diagnosis (remove once stable)
logger:
  default: info
  logs:
    custom_components.spoolman: debug
    homeassistant.components.template: debug
    homeassistant.helpers.template: debug

# Dishwasher "last finished" – automation updates this when cycle completes
input_datetime:
  dishwasher_last_finished:
    name: Dishwasher Last Finished
    has_date: true
    has_time: true
  # P1S print times – persisted so they survive HA restart
  p1s_print_start_time:
    name: P1S Print Start Time
    has_date: true
    has_time: true
  p1s_print_end_time:
    name: P1S Print End Time
    has_date: true
    has_time: true

# -----------------------------------------------------------------------------
# AMS Slot Manager (Spoolman-backed). See AMS_SLOT_MANAGER.md.
# Spoolman base URL for rest_command: set input_text.spoolman_base_url (e.g. http://192.168.x.x:8080)
# or use the same host as your Spoolman integration. Placeholder filament: set ams_placeholder_filament_id.
# -----------------------------------------------------------------------------

# Slot → Spoolman spool ID (1–6 or ID from placeholder). Updated by ams_ensure_slot_spools.
input_text:
