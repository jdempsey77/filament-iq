# 3D Printer dashboard view – extracted from home_assistant/dashboards/dashboard.stage.yaml
# TODO: Replace YOUR_PRINTER_SERIAL with your Bambu P1S serial (e.g. 01p00a1b2c3d4e5f)
- title: 3D Printer
  icon: mdi:printer-3d
  path: printer
  type: sections
  max_columns: 3
  sections:
  - type: grid
    cards:
    - type: vertical-stack
      cards:
      - type: custom:mushroom-template-card
        primary: AMS Filament Slots
        secondary: '{% set count = states(''sensor.ams_unbound_slot_count'') | int(0) %} {% if count > 0 %}{{ count }} slot{{ ''s'' if count > 1 }} need{{ '''' if count > 1 else ''s'' }} binding {% else
          %}All slots bound {% endif %}'
        icon: mdi:tray-full
        tap_action:
          action: none
        icon_color: '{% if states(''sensor.ams_unbound_slot_count'') | int(0) > 0 %}red{% else %}green{% endif %}'
        card_mod:
          style: 'ha-card { --ha-card-background: transparent; box-shadow: none; }

            '
    - type: custom:mod-card
      style: "ha-card {\n  background: rgba(255,255,255,0.03) !important;\n  border: 2px solid rgba(255,255,255,0.12) !important;\n  border-radius: 14px !important;\n  box-shadow: 0 6px 16px rgba(0, 0,\
        \ 0, 0.7) !important;\n  overflow: hidden;\n  padding: 0 !important;\n}\n"
      card:
        type: vertical-stack
        cards:
        - type: custom:mod-card
          style: "ha-card {\n  background: rgba(255,255,255,0.03) !important;\n  border: none !important;\n  border-bottom: 1px solid rgba(255,255,255,0.06) !important;\n  border-radius: 0 !important;\n\
            \  box-shadow: none !important;\n  padding: 0 !important;\n}\n"
          card:
            type: custom:mushroom-template-card
            primary: '{% set printing = states(''sensor.p1s_YOUR_PRINTER_SERIAL_current_stage'') == ''printing'' %} {% if printing %}{{ states(''sensor.filament_iq_operator_status'') }} {% else %}Bambu Lab
              P1S {% endif %}'
            secondary: '{% set stage = states(''sensor.p1s_YOUR_PRINTER_SERIAL_current_stage'') %} {% set speed = states(''select.p1s_YOUR_PRINTER_SERIAL_printing_speed'') %} {% if stage == ''printing'' %}{{ stage
              | capitalize }} · {{ speed | capitalize }} {% elif stage == ''idle'' %}Idle · Ready to print {% elif stage == ''finish'' %}Last print complete {% elif stage in [''offline'', ''unavailable'']
              %}Offline {% else %}{{ stage | replace(''_'', '' '') | capitalize }} {% endif %}'
            icon: mdi:printer-3d
            icon_color: '{% set stage = states(''sensor.p1s_YOUR_PRINTER_SERIAL_current_stage'') %} {% if stage == ''printing'' %}#63cab7 {% elif stage == ''idle'' or stage == ''finish'' %}#63cab7 {% elif stage
              in [''offline'', ''unavailable''] %}grey {% else %}orange {% endif %}'
            badge_icon: '{% if states(''sensor.p1s_YOUR_PRINTER_SERIAL_current_stage'') == ''printing'' %}mdi:circle{% else %}{% endif %}'
            badge_color: '#63cab7'
            tap_action:
              action: none
            card_mod:
              style: "ha-card {\n  --ha-card-background: transparent;\n  box-shadow: none;\n  padding: 8px 12px;\n}\n"
        - type: conditional
          conditions:
          - condition: state
            entity: sensor.p1s_YOUR_PRINTER_SERIAL_current_stage
            state: printing
          card:
            type: vertical-stack
            cards:
            - type: custom:mod-card
              style: "ha-card {\n  background: rgba(255,255,255,0.03) !important;\n  border: none !important;\n  border-bottom: 1px solid rgba(255,255,255,0.06) !important;\n  border-radius: 0 !important;\n\
                \  box-shadow: none !important;\n  padding: 0 !important;\n}\n"
              card:
                type: custom:mushroom-template-card
                primary: '{% set pct = states(''sensor.p1s_YOUR_PRINTER_SERIAL_print_progress'') | int(0) %} {% set t = states(''sensor.p1s_YOUR_PRINTER_SERIAL_remaining_time'') | float(0) %} {% set h = t | int
                  %} {% set m = ((t - h) * 60) | int %} {{ pct }}% · {% if h > 0 %}{{ h }}h {% endif %}{{ m }}m remaining'
                secondary: '{% set cur = states(''sensor.p1s_YOUR_PRINTER_SERIAL_current_layer'') %} {% set tot = states(''sensor.p1s_YOUR_PRINTER_SERIAL_total_layer_count'') %} Layer {{ cur }} of {{ tot }}'
                icon: mdi:progress-clock
                icon_color: '#3b9fd8'
                tap_action:
                  action: none
                card_mod:
                  style: "ha-card {\n  --ha-card-background: transparent;\n  box-shadow: none;\n  padding: 6px 12px 4px;\n}\n.primary {\n  font-size: 15px !important;\n  font-weight: 600 !important;\n \
                    \ color: #e8eaf0 !important;\n}\n.secondary {\n  font-size: 12px !important;\n  color: #9ca3af !important;\n}\nmushroom-shape-icon {\n  --icon-size: 22px !important;\n}\n"
            - type: custom:mod-card
              style: "ha-card {\n  background: rgba(255,255,255,0.03) !important;\n  border: none !important;\n  border-bottom: 1px solid rgba(255,255,255,0.06) !important;\n  border-radius: 0 !important;\n\
                \  box-shadow: none !important;\n  padding: 0 4px 8px 4px !important;\n}\n"
              card:
                type: custom:mushroom-template-card
                primary: ''
                secondary: ''
                icon: ''
                tap_action:
                  action: none
                card_mod:
                  style: "ha-card {\n  --ha-card-background: transparent;\n  box-shadow: none;\n  min-height: 5px !important;\n  padding: 0 12px !important;\n}\nmushroom-card-content {\n  display: none\
                    \ !important;\n}\nha-card::after {\n  content: '';\n  display: block;\n  height: 5px;\n  border-radius: 3px;\n  background: rgba(255,255,255,0.07);\n  position: relative;\n  overflow:\
                    \ hidden;\n}\nha-card::before {\n  content: '';\n  display: block;\n  position: absolute;\n  height: 5px;\n  border-radius: 3px;\n  background: linear-gradient(90deg, #3b9fd8, #63cab7);\n\
                    \  width: {{ states('sensor.p1s_YOUR_PRINTER_SERIAL_print_progress') | int(0) }}%;\n  z-index: 1;\n}\n"
    - type: custom:mod-card
      style: "ha-card {\n  background: rgba(255,255,255,0.03) !important;\n  border: 2px solid rgba(255,255,255,0.12) !important;\n  border-radius: 14px !important;\n  box-shadow: 0 6px 16px rgba(0, 0,\
        \ 0, 0.7) !important;\n  overflow: hidden;\n  padding: 0 !important;\n}\n"
      card:
        type: vertical-stack
        cards:
        - type: grid
          columns: 1
          square: false
          cards:
          - type: custom:mushroom-template-card
            entity: light.p1s_YOUR_PRINTER_SERIAL_chamber_light
            primary: Chamber Light
            secondary: '{% if is_state(''light.p1s_YOUR_PRINTER_SERIAL_chamber_light'', ''on'') %}On{% else %}Off{% endif %}'
            icon: mdi:lightbulb
            icon_color: '{% if is_state(''light.p1s_YOUR_PRINTER_SERIAL_chamber_light'', ''on'') %}amber{% else %}grey{% endif %}'
            layout: horizontal
            tap_action:
              action: toggle
            card_mod:
              style: "ha-card {\n  border: none !important;\n  border-radius: 0 !important;\n  border-bottom: 1px solid rgba(255,255,255,0.04) !important;\n  box-shadow: none !important;\n  background:\
                \ transparent !important;\n}\nmushroom-shape-icon {\n  {% if is_state('light.p1s_YOUR_PRINTER_SERIAL_chamber_light', 'on') %}\n  --icon-shape-color: rgba(255,191,0,0.2);\n  {% else %}\n  --icon-shape-color:\
                \ rgba(255,255,255,0.05);\n  {% endif %}\n}\n"
        - type: grid
          columns: 2
          square: false
          cards:
          - type: custom:mushroom-fan-card
            entity: fan.p1s_YOUR_PRINTER_SERIAL_chamber_fan
            name: Chamber Fan
            icon: mdi:fan
            show_percentage_control: true
            show_oscillate_control: false
            icon_animation: true
            tap_action:
              action: toggle
            card_mod:
              style: "ha-card {\n  border: none !important;\n  border-radius: 0 !important;\n  border-bottom: 1px solid rgba(255,255,255,0.04) !important;\n  box-shadow: none !important;\n  background:\
                \ transparent !important;\n}\n"
          - type: custom:mushroom-fan-card
            entity: fan.p1s_YOUR_PRINTER_SERIAL_cooling_fan
            name: Cooling Fan
            icon: mdi:fan
            show_percentage_control: true
            show_oscillate_control: false
            icon_animation: true
            tap_action:
              action: toggle
            card_mod:
              style: "ha-card {\n  border: none !important;\n  border-radius: 0 !important;\n  border-bottom: 1px solid rgba(255,255,255,0.04) !important;\n  box-shadow: none !important;\n  background:\
                \ transparent !important;\n}\n"
          - type: custom:mushroom-fan-card
            entity: fan.p1s_YOUR_PRINTER_SERIAL_aux_fan
            name: Aux Fan
            icon: mdi:fan
            show_percentage_control: true
            show_oscillate_control: false
            icon_animation: true
            tap_action:
              action: toggle
            card_mod:
              style: "ha-card {\n  border: none !important;\n  border-radius: 0 !important;\n  border-bottom: none !important;\n  box-shadow: none !important;\n  background: transparent !important;\n}\n"
          - type: custom:mushroom-fan-card
            entity: fan.YOUR_AIR_PURIFIER
            name: Air Purifier
            icon: mdi:air-filter
            show_percentage_control: true
            show_oscillate_control: false
            icon_animation: true
            tap_action:
              action: toggle
            card_mod:
              style: "ha-card {\n  border: none !important;\n  border-radius: 0 !important;\n  border-bottom: none !important;\n  box-shadow: none !important;\n  background: transparent !important;\n}\n"
        - type: custom:mushroom-template-card
          primary: '{{ states(''sensor.p1s_YOUR_PRINTER_SERIAL_total_usage'') | float(0) | int }}h total print time'
          secondary: Lifetime usage
          icon: mdi:clock-outline
          icon_color: grey
          tap_action:
            action: more-info
            entity: sensor.p1s_YOUR_PRINTER_SERIAL_total_usage
          card_mod:
            style: "ha-card {\n  border: none !important;\n  border-top: 1px solid rgba(255,255,255,0.06) !important;\n  border-radius: 0 0 14px 14px !important;\n  box-shadow: none !important;\n  background:\
              \ transparent !important;\n  padding: 2px 0 !important;\n}\n.primary {\n  font-size: 14px !important;\n  font-weight: 600 !important;\n  color: #e8eaf0 !important;\n}\n.secondary {\n  font-size:\
              \ 11px !important;\n  color: #9ca3af !important;\n}\nmushroom-shape-icon {\n  --icon-size: 20px !important;\n}\n"
  - type: grid
    cards:
    - type: custom:mushroom-entity-card
      entity: switch.YOUR_PRINTER_POWER_SWITCH
      name: Printer Power
      icon: mdi:power
      tap_action:
        action: toggle
        confirmation:
          text: Toggle Printer Power?
      hold_action:
        action: more-info
      icon_color: accent
      layout: horizontal
      card_mod:
        style: "background: rgba(255,255,255,0.03) !important;\nha-card {\n  border: 2px solid rgba(255,255,255,0.12) !important;\n  border-radius: 12px !important;\n  box-shadow: 0 6px 16px rgba(0, 0,\
          \ 0, 0.7) !important;\n  grid-column: 1 / -1;\n}\n"
    - type: custom:webrtc-camera
      entity: camera.YOUR_ROOM_CAMERA
      ui: false
      card_mod:
        background: rgba(255,255,255,0.03) !important;
        style: "ha-card {\n  border: 2px solid rgba(255,255,255,0.12) !important;\n  border-radius: 12px !important;\n  box-shadow: 0 6px 16px rgba(0, 0, 0, 0.7) !important;\n}\n#video-container .header\
          \ {\n  display: none !important;\n}\n"
    - type: conditional
      conditions:
      - entity: switch.YOUR_PRINTER_POWER_SWITCH
        state: 'on'
      card:
        show_state: false
        show_name: false
        camera_view: live
        fit_mode: cover
        type: picture-entity
        entity: camera.p1s_YOUR_PRINTER_SERIAL_camera
        card_mod:
          style: "background: rgba(255,255,255,0.03) !important;\nha-card {\n  border: 2px solid rgba(255,255,255,0.12) !important;\n  border-radius: 12px !important;\n  box-shadow: 0 6px 16px rgba(0, 0,\
            \ 0, 0.7) !important;\n}\n"
    - type: custom:mod-card
      style: "ha-card {\n  background: rgba(255,255,255,0.03) !important;\n  border: 2px solid rgba(255,255,255,0.12) !important;\n  border-radius: 12px !important;\n  box-shadow: 0 6px 16px rgba(0, 0,\
        \ 0, 0.7) !important;\n  padding: 12px !important;\n}\n"
      card:
        type: grid
        columns: 2
        square: false
        cards:
        - type: custom:mushroom-template-card
          primary: Reconcile
          icon: mdi:sync
          icon_color: blue
          layout: horizontal
          tap_action:
            action: call-service
            service: script.reconcile_all_ams_slots
            data: {}
          card_mod:
            style: 'ha-card { --ha-card-padding: 4px; }

              mushroom-shape-icon { --icon-size: 24px; }

              '
        - type: custom:mushroom-template-card
          primary: Reload
          icon: mdi:refresh
          icon_color: cyan
          layout: horizontal
          tap_action:
            action: call-service
            service: script.reload_spoolman_integration
            data: {}
          card_mod:
            style: 'ha-card { --ha-card-padding: 4px; }

              mushroom-shape-icon { --icon-size: 24px; }

              '
        - type: custom:mushroom-template-card
          primary: Filaments
          icon: mdi:palette-swatch-variant
          icon_color: purple
          layout: horizontal
          tap_action:
            action: navigate
            navigation_path: /lovelace/filaments
          card_mod:
            style: 'ha-card { --ha-card-padding: 4px; }

              mushroom-shape-icon { --icon-size: 24px; }

              '
        - type: custom:mushroom-template-card
          primary: Spools
          icon: mdi:printer-3d-nozzle
          icon_color: teal
          layout: horizontal
          tap_action:
            action: navigate
            navigation_path: /lovelace/spools
          card_mod:
            style: 'ha-card { --ha-card-padding: 4px; }

              mushroom-shape-icon { --icon-size: 24px; }

              '
  - type: grid
    cards:
    - type: custom:mod-card
      style: "ha-card {\n  background: rgba(255,255,255,0.03) !important;\n  border: 2px solid rgba(255,255,255,0.12) !important;\n  border-radius: 14px !important;\n  box-shadow: 0 6px 16px rgba(0, 0,\
        \ 0, 0.7) !important;\n  overflow: hidden;\n  padding: 0 !important;\n}\n"
      card:
        type: vertical-stack
        cards:
        - type: custom:mod-card
          style: "ha-card {\n  background: rgba(255,255,255,0.03) !important;\n  border: none !important;\n  border-bottom: 1px solid rgba(255,255,255,0.06) !important;\n  border-radius: 0 !important;\n\
            \  box-shadow: none !important;\n  padding: 0 !important;\n}\n"
          card:
            type: custom:mushroom-template-card
            primary: AMS 2 Pro
            secondary: '{% set h = states(''sensor.p1s_YOUR_PRINTER_SERIAL_ams_1_humidity'') %} {% set t = states(''sensor.p1s_YOUR_PRINTER_SERIAL_ams_1_temperature'') %} {{ h }}% humidity · {{ t }}°C'
            icon: mdi:printer-3d
            icon_color: green
            tap_action:
              action: none
            card_mod:
              style: "ha-card {\n  --ha-card-background: transparent;\n  box-shadow: none;\n  padding: 8px 12px;\n}\n"
        - type: custom:mushroom-template-card
          entity: sensor.ams_slot_1_status
          primary: "{% set status = states('sensor.ams_slot_1_status') %} {% set r = states('input_text.ams_slot_1_unbound_reason') %} {% if 'RFID_NOT_REFRESHED' in r %}Reload Spool {% elif status == 'empty'\
            \ %}Empty {% elif status == 'needs_bind' %}\n  {% if 'NONRFID_NO_MATCH' in r %}No Match Found\n  {% elif 'AMBIGUOUS' in r %}Multiple Matches\n  {% elif 'GENERIC' in r or 'LOW_CONFIDENCE' in\
            \ r %}Too Generic\n  {% elif 'NOT_FOUND' in r %}Spool Missing\n  {% elif 'UID_NO_MATCH' in r %}RFID Not Recognized\n  {% else %}Needs Binding\n  {% endif %}\n{% else %}{{ states('sensor.ams_slot_1_vendor')\
            \ }} · {{ states('sensor.ams_slot_1_material') }} {% endif %}"
          secondary: "{% set status = states('sensor.ams_slot_1_status') %} {% set r = states('input_text.ams_slot_1_unbound_reason') %} {% if 'RFID_NOT_REFRESHED' in r %}{{ states('sensor.ams_slot_1_name')\
            \ }} · RFID not refreshed {% elif status == 'empty' %}No spool loaded {% elif status == 'needs_bind' %}\n  {% if 'NONRFID_NO_MATCH' in r %}Tap to select spool\n  {% elif 'AMBIGUOUS' in r %}Tap\
            \ to select spool\n  {% elif 'GENERIC' in r or 'LOW_CONFIDENCE' in r %}Too generic to auto-match\n  {% elif 'NOT_FOUND' in r %}Tap to reassign\n  {% elif 'UID_NO_MATCH' in r %}Tap to select\
            \ spool\n  {% else %}Tap to bind manually\n  {% endif %}\n{% else %}\n  {% set name = states('sensor.ams_slot_1_name') %}\n  {% set id = states('input_text.ams_slot_1_spool_id') %}\n  {% set\
            \ g = states('sensor.ams_slot_1_remaining_g') | float(0) | round(0) | int %}\n  {{ name }} · #{{ id }} · {{ g }}g\n{% endif %}"
          icon: '{% set status = states(''sensor.ams_slot_1_status'') %} {% set r = states(''input_text.ams_slot_1_unbound_reason'') %} {% if status == ''empty'' %}mdi:numeric-1-circle-outline {% elif ''RFID_NOT_REFRESHED''
            in r %}mdi:alert-circle {% elif status == ''needs_bind'' %}mdi:alert-circle {% else %}mdi:numeric-1-circle {% endif %}'
          icon_color: "{% set status = states('sensor.ams_slot_1_status') %} {% set r = states('input_text.ams_slot_1_unbound_reason') %} {% if status == 'empty' %}#3a3d44 {% elif 'RFID_NOT_REFRESHED' in\
            \ r %}#FF9800 {% elif status == 'needs_bind' %}#ef5350 {% else %}\n  {% set hex = states('sensor.ams_slot_1_color_hex') %}\n  {% if hex in ['000000', 'unknown', 'unavailable', ''] %}#555555\n\
            \  {% else %}#{{ hex }}{% endif %}\n{% endif %}"
          badge_icon: '{% set printing = states(''sensor.p1s_YOUR_PRINTER_SERIAL_current_stage'') == ''printing'' %} {% set active_ams = state_attr(''sensor.p1s_YOUR_PRINTER_SERIAL_active_tray'', ''ams_index'')
            %} {% set active_tray = state_attr(''sensor.p1s_YOUR_PRINTER_SERIAL_active_tray'', ''tray_index'') %} {% set is_active = printing and active_ams == 0 and active_tray == 0 %} {% set status = states(''sensor.ams_slot_1_status'')
            %} {% if is_active and status == ''ok'' %}mdi:printer-3d-nozzle{% else %}{% endif %}'
          badge_color: '{% set printing = states(''sensor.p1s_YOUR_PRINTER_SERIAL_current_stage'') == ''printing'' %} {% set active_ams = state_attr(''sensor.p1s_YOUR_PRINTER_SERIAL_active_tray'', ''ams_index'')
            %} {% set active_tray = state_attr(''sensor.p1s_YOUR_PRINTER_SERIAL_active_tray'', ''tray_index'') %} {% set is_active = printing and active_ams == 0 and active_tray == 0 %} {% set status = states(''sensor.ams_slot_1_status'')
            %} {% if is_active and status == ''ok'' %}#63cab7{% else %}transparent{% endif %}'
          tap_action:
            action: fire-dom-event
            browser_mod:
              service: browser_mod.popup
              data:
                title: Slot 1
                size: wide
                content:
                  type: vertical-stack
                  cards:
                  - type: markdown
                    content: '{% set r = states(''input_text.ams_slot_1_unbound_reason'') %} {% set status = states(''sensor.ams_slot_1_status'') %} {% if ''RFID_NOT_REFRESHED'' in r %}### RFID Refresh
                      Needed

                      **{{ states(''sensor.ams_slot_1_name'') }}** (spool #{{ states(''input_text.ams_slot_1_spool_id'') }}) is correctly assigned but the AMS hasn''t read the RFID tag.

                      **To fix:** Unload the spool from slot 1, then reload it. After reloading, tap **Reconcile** below. {% elif status == ''ok'' %}### {{ states(''sensor.ams_slot_1_name'') }}

                      {{ states(''sensor.ams_slot_1_vendor'') }} - {{ states(''sensor.ams_slot_1_material'') }}

                      Remaining: {{ states(''sensor.ams_slot_1_remaining_g'') }}g · Spool #{{ states(''input_text.ams_slot_1_spool_id'') }} {% elif status == ''needs_bind'' %}### Binding Required

                      {% if ''NONRFID_NO_MATCH'' in r %}This slot has a spool that doesn''t match anything in Spoolman. {% elif ''AMBIGUOUS'' in r %}Multiple spools match this slot''s signature. {% elif
                      ''NOT_FOUND'' in r %}The previously assigned spool was not found. {% elif ''UID_NO_MATCH'' in r %}The RFID tag isn''t recognized. {% else %}This slot needs manual binding. {% endif
                      %}

                      Select a spool below and tap **Assign & Bind**. {% elif status == ''empty'' %}### Empty Slot

                      No spool is loaded in this slot. {% endif %}'
                  - type: entities
                    entities:
                    - entity: input_select.ams_slot_1_select_spool
                  - type: custom:mushroom-template-card
                    primary: Assign & Bind
                    icon: mdi:link-variant
                    icon_color: blue
                    layout: horizontal
                    tap_action:
                      action: call-service
                      service: script.ams_slot_assign_and_update
                      data:
                        slot: '1'
                    card_mod:
                      style: 'ha-card { --ha-card-padding: 4px; }

                        mushroom-shape-icon { --icon-size: 24px; }

                        '
          card_mod:
            style: "ha-card {\n  border: none !important;\n  border-bottom: 1px solid rgba(255,255,255,0.05) !important;\n  border-radius: 0 !important;\n  box-shadow: none !important;\n  background: transparent\
              \ !important;\n  {% set status = states('sensor.ams_slot_1_status') %}\n  {% set r = states('input_text.ams_slot_1_unbound_reason') %}\n  {% set active_ams = state_attr('sensor.p1s_YOUR_PRINTER_SERIAL_active_tray',\
              \ 'ams_index') %}\n  {% set active_tray = state_attr('sensor.p1s_YOUR_PRINTER_SERIAL_active_tray', 'tray_index') %}\n  {% set printing = states('sensor.p1s_YOUR_PRINTER_SERIAL_current_stage') == 'printing'\
              \ %}\n  {% set is_active = printing and active_ams == 0 and active_tray == 0 %}\n  {% set hex = states('sensor.ams_slot_1_color_hex') %}\n  {% set safe_hex = hex if hex not in ['unknown',\
              \ 'unavailable', ''] else '3b9fd8' %}\n  {% if is_active and status == 'ok' %}\n  background: rgba(255,255,255,0.06) !important;\n  {% elif status == 'empty' %}opacity: 0.4;\n  {% elif 'RFID_NOT_REFRESHED'\
              \ in r %}background: rgba(255,152,0,0.05) !important;\n  {% elif status == 'needs_bind' %}background: rgba(239,83,80,0.05) !important;\n  {% endif %}\n  {% set g = states('sensor.ams_slot_1_remaining_g')\
              \ | float(0) %}\n  {% set pct = [0, [100, (g / 1000 * 100) | round(0) | int] | min] | max %}\n  {% if status != 'empty' %}\n  background-image: linear-gradient(to right, rgba(255,255,255,0.7)\
