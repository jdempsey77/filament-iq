                        {% set r = states('input_text.ams_slot_SLOT_NUM_unbound_reason') %}
                        {% if 'RFID_NOT_REFRESHED' in r %}color: #a06a06 !important;
                        {% elif status == 'needs_bind' %}color: #a04040 !important;
                        {% endif %}
                      }
                - type: custom:mushroom-template-card
