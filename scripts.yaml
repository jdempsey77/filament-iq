# Scripts (included from configuration.yaml).
# Root keys are script IDs (e.g. reload_spoolman_integration); each has alias, sequence, etc.
#
# Reload Spoolman (dashboard button): REQUIRED — replace YOUR_SPOOLMAN_ENTRY_ID below
# with your Spoolman config entry ID. Get it: Settings → Devices & Services → Spoolman
# → ⋮ → Configure; the URL ends with /integration/XXXXXXXX — that hex is entry_id.
# Or in .storage/core.config_entries search for "spoolman" and copy "entry_id".
# Then redeploy: ./scripts/manage_ha.sh --scripts (and restart HA if needed).
#
# yaml-language-server: $schema=
# Reload Spoolman integration only. Do NOT run refresh_ams_spool_list here (causes spinners; dropdown is populated by automation when REST data arrives).
# DEBUG: Simulate finish path without a real print. Requires filament_debug_mode ON for checkpoints.
# Seeds start/end JSON, fires finish automation. Verify checkpoints in p1s_finish_automation_checkpoint.
# Spoolman decrement only runs if ams_slot_1_spool_id/ams_slot_2_spool_id are set and > 0.
p1s_debug_force_finish_path:
  alias: P1S Debug – force finish path (no print)
  sequence:
    - action: input_text.set_value
      target:
        entity_id: input_text.p1s_tray_remaining_start_json
      data:
        value: '{"1": 100, "2": 200}'
    - action: input_text.set_value
      target:
        entity_id: input_text.p1s_tray_remaining_end_json
      data:
        value: '{"1": 90, "2": 150}'
    - action: input_boolean.turn_on
      target:
        entity_id: input_boolean.p1s_debug_finish_trigger

reload_spoolman_integration:
  alias: Reload Spoolman integration
  sequence:
    - action: homeassistant.reload_config_entry
      data:
        entry_id: "01KGX5YPH9CXR2Y1KZRVSP48V7"

# Add filament to Spoolman from test dashboard form (uses spoolman_new_filament_* helpers). Then reload integration.
# If spoolman_base_url is empty, request goes to localhost:8080 and the filament won't appear in your Spoolman.
spoolman_add_filament:
  alias: Add filament to Spoolman
  sequence:
    - action: rest_command.ams_spoolman_create_filament
    - action: script.reload_spoolman_integration
    - action: notify.persistent_notification
      data:
        message: "Filament created and Spoolman reloaded."
        title: Filament added to Spoolman

# Add spool to Spoolman from test dashboard (uses spoolman_new_spool_* helpers). Only runs when a filament is selected (dropdown contains " - "). Then reload integration.
spoolman_add_spool:
  alias: Add spool to Spoolman
  sequence:
    - choose:
        - conditions:
            - condition: template
              value_template: "{{ (states('input_select.spoolman_new_spool_filament') or '') | trim != '' and ' - ' in (states('input_select.spoolman_new_spool_filament') or '') }}"
          sequence:
            - action: rest_command.ams_spoolman_create_spool
            - action: script.reload_spoolman_integration

# Optional manual refresh: re-apply dropdown from template sensor options only (no Spoolman reload).
refresh_ams_spool_list:
  alias: Refresh AMS spool list (Assign from warehouse)
  sequence:
    - action: input_select.set_options
      target:
        entity_id: input_select.ams_assign_source_spool
      data:
        options: "{{ ['— Select spool —'] + (state_attr('sensor.ams_spool_list_options', 'options') or []) }}"

# Force Spoolman filaments fetch and repopulate "Add spool" filament dropdown. Use if dropdown is empty (wrong URL or sensor not yet updated).
refresh_filament_dropdown:
  alias: Refresh filament list (Add spool)
  sequence:
    - action: homeassistant.update_entity
      target:
        entity_id:
          - sensor.spoolman_filaments_api
          - sensor.spoolman_vendors_api
          - sensor.spoolman_spools_api
    - delay:
        seconds: 2
    - action: input_select.set_options
      target:
        entity_id: input_select.spoolman_new_spool_filament
      data:
        options: "{{ ['— Select filament —'] + (state_attr('sensor.ams_filament_list_options', 'options') or []) }}"

