# Rehydrate print active mutex after HA restart if print is still running
- id: p1s_rehydrate_mutex_on_restart
  alias: P1S – rehydrate print active mutex on HA restart
  description: If HA restarts while print is active, restore mutex to ON to prevent manual slot mapping changes
  trigger:
    - platform: homeassistant
      event: start
  condition:
    - condition: state
      entity_id: sensor.p1s_01p00c5a3101668_print_status
      state:
        - running
        - printing
        - pause
        - paused
  action:
    - service: input_boolean.turn_on
      target:
        entity_id: input_boolean.filament_iq_print_active
  mode: single

# Auto-detect AMS tray changes and try to match to Spoolman spools on Shelf. If exactly one match, auto-assign; otherwise notify for manual assignment.
- id: ams_tray_auto_detect_and_assign
  alias: AMS – auto-detect tray change and assign Spoolman spool
  description: When an AMS tray changes (new filament loaded), try to match to a Spoolman spool on Shelf and auto-assign if unique match.
  initial_state: false
  trigger:
    - platform: state
      entity_id:
        - sensor.p1s_01p00c5a3101668_ams_1_tray_1
        - sensor.p1s_01p00c5a3101668_ams_1_tray_2
        - sensor.p1s_01p00c5a3101668_ams_1_tray_3
        - sensor.p1s_01p00c5a3101668_ams_1_tray_4
        - sensor.p1s_01p00c5a3101668_ams_128_tray_1
        - sensor.p1s_01p00c5a3101668_ams_129_tray_1
  condition:
    # Only fire if state actually changed (not just republished)
    - condition: template
      value_template: >
        {{ trigger.to_state.state not in ['Empty', 'unknown', 'unavailable', ''] 
           and trigger.from_state is not none
           and trigger.from_state.state != trigger.to_state.state 
           and trigger.from_state.state not in ['unknown', 'unavailable', 'None', ''] }}
  action:
    - variables:
        tray_text: "{{ trigger.to_state.state | trim }}"
        slot_map:
          sensor.p1s_01p00c5a3101668_ams_1_tray_1: { slot: 1, location: "AMS1_Slot1" }
          sensor.p1s_01p00c5a3101668_ams_1_tray_2: { slot: 2, location: "AMS1_Slot2" }
          sensor.p1s_01p00c5a3101668_ams_1_tray_3: { slot: 3, location: "AMS1_Slot3" }
          sensor.p1s_01p00c5a3101668_ams_1_tray_4: { slot: 4, location: "AMS1_Slot4" }
          sensor.p1s_01p00c5a3101668_ams_128_tray_1: { slot: 5, location: "AMS2_HT_Slot1" }
          sensor.p1s_01p00c5a3101668_ams_129_tray_1: { slot: 6, location: "AMS2_HT_Slot2" }
        slot_num: "{{ slot_map[trigger.entity_id].slot }}"
        ams_location: "{{ slot_map[trigger.entity_id].location }}"
        # Check if tray text is specific enough (has color, weight, or distinguishing info)
        # Generic examples: "Overture PLA", "eSUN ABS" (only vendor+material)
        # Specific examples: "Overture PLA Black", "eSUN ABS+ White 1kg"
        is_generic: >
          {% set words = (tray_text | lower).split() %}
          {% set has_color = words | select('in', ['black', 'white', 'red', 'blue', 'green', 'yellow', 'orange', 'purple', 'gray', 'grey', 'pink', 'brown', 'transparent', 'clear', 'natural']) | list | length > 0 %}
          {% set tl = tray_text | lower %}
          {% set has_weight = 'g' in tl or 'kg' in tl or 'lb' in tl %}
          {% set word_count = words | length %}
          {{ not has_color and not has_weight and word_count <= 2 }}
        # Find all spools on Shelf that match the tray text (vendor/material/name fuzzy match)
        matching_spools: >
          {% set ns = namespace(matches=[]) %}
          {% for st in (states.sensor | selectattr('entity_id', 'match', '^sensor\\.spoolman_spool_\\d+$') | list) %}
            {% set loc = (state_attr(st.entity_id, 'location') or '') | string | lower %}
            {% if loc == 'shelf' %}
              {% set vendor = (state_attr(st.entity_id, 'filament_vendor_name') or state_attr(st.entity_id, 'vendor_name') or '') | string | lower %}
              {% set material = (state_attr(st.entity_id, 'filament_material') or state_attr(st.entity_id, 'material') or '') | string | lower %}
              {% set name = (state_attr(st.entity_id, 'filament_name') or state_attr(st.entity_id, 'name') or '') | string | lower %}
              {% set tray_lower = tray_text | lower %}
              {% set match_score = 0 %}
              {# Vendor: check full string OR first word (handles multi-word vendors like "Bambu Lab") #}
              {% set vendor_first_word = vendor.split() | first if vendor else '' %}
              {% if (vendor and vendor in tray_lower) or (vendor_first_word and vendor_first_word | length > 2 and vendor_first_word in tray_lower) %}
                {% set match_score = match_score + 1 %}
              {% endif %}
              {% if material and material in tray_lower %}{% set match_score = match_score + 1 %}{% endif %}
              {% if name and name in tray_lower %}{% set match_score = match_score + 1 %}{% endif %}
              {% if match_score >= 2 %}
                {% set spool_id = st.entity_id.split('_')[-1] %}
                {% set remaining = state_attr(st.entity_id, 'remaining_weight') | float(999999) %}
                {% set ns.matches = ns.matches + [{'id': spool_id, 'remaining': remaining}] %}
              {% endif %}
            {% endif %}
          {% endfor %}
          {{ ns.matches }}
    - choose:
        # Generic tray text → skip auto-assign, notify once
        - conditions:
            - condition: template
              value_template: "{{ is_generic }}"
          sequence:
            - action: notify.persistent_notification
              data:
                title: "AMS Slot {{ slot_num }}: Manual Assignment Required"
                message: "Detected '{{ tray_text }}' in {{ ams_location }}. Tray text is too generic for auto-matching (lacks color/weight). Go to Spool Management to manually assign."
        # Exactly one match → auto-assign
        - conditions:
            - condition: template
              value_template: "{{ not is_generic and matching_spools | length == 1 }}"
          sequence:
            - variables:
                spool_id: "{{ matching_spools[0].id }}"
            - action: input_text.set_value
              target:
                entity_id: "input_text.ams_slot_{{ slot_num }}_spool_id"
              data:
                value: "{{ spool_id }}"
            - action: spoolman.patch_spool
              data:
                id: "{{ spool_id | int }}"
                location: "{{ ams_location }}"
            - action: script.reload_spoolman_integration
            - action: notify.persistent_notification
              data:
                title: "AMS Slot {{ slot_num }} Auto-Assigned"
                message: "Detected '{{ tray_text }}' in {{ ams_location }}. Auto-assigned Spoolman spool {{ spool_id }}. Weigh the spool and tap 'Assign & Update' to set remaining weight."
        # Multiple matches → pick least remaining if unique winner, else manual
        - conditions:
            - condition: template
              value_template: "{{ not is_generic and matching_spools | length > 1 }}"
          sequence:
            - variables:
                sorted_matches: "{{ matching_spools | sort(attribute='remaining') }}"
                least_remaining: "{{ sorted_matches[0].remaining }}"
                second_least: "{{ sorted_matches[1].remaining if sorted_matches | length > 1 else 999999 }}"
                is_unique_winner: "{{ least_remaining < (second_least - 50) }}"
                winner_spool_id: "{{ sorted_matches[0].id if is_unique_winner else none }}"
            - choose:
                - conditions:
                    - condition: template
                      value_template: "{{ is_unique_winner }}"
                  sequence:
                    - action: input_text.set_value
                      target:
                        entity_id: "input_text.ams_slot_{{ slot_num }}_spool_id"
                      data:
                        value: "{{ winner_spool_id }}"
                    - action: spoolman.patch_spool
                      data:
                        id: "{{ winner_spool_id | int }}"
                        location: "{{ ams_location }}"
                    - action: script.reload_spoolman_integration
                    - action: notify.persistent_notification
                      data:
                        title: "AMS Slot {{ slot_num }} Auto-Assigned (Least Remaining)"
                        message: "Detected '{{ tray_text }}' in {{ ams_location }}. Auto-assigned Spoolman spool {{ winner_spool_id }} (least remaining: {{ least_remaining | round(0) }}g). Verify and update weight if needed."
              default:
                - action: notify.persistent_notification
                  data:
                    title: "AMS Slot {{ slot_num }}: Manual Assignment Required"
                    message: "Detected '{{ tray_text }}' in {{ ams_location }}. Found {{ matching_spools | length }} possible matches (IDs: {{ matching_spools | map(attribute='id') | join(', ') }}), but no clear winner. Go to Spool Management to manually assign."
      default:
        # No matches → notify
        - action: notify.persistent_notification
          data:
            title: "AMS Slot {{ slot_num }}: Manual Assignment Required"
            message: "Detected '{{ tray_text }}' in {{ ams_location }}. No matching Spoolman spool found on Shelf. Go to Spool Management to manually assign."
  mode: queued
  max: 10

- id: ams_bind_reminder_push
  alias: "AMS Bind Reminder Push"
  description: "Push notification when an AMS slot needs binding"
  triggers:
    - trigger: state
      entity_id:
        - input_text.ams_slot_1_unbound_reason
        - input_text.ams_slot_2_unbound_reason
        - input_text.ams_slot_3_unbound_reason
        - input_text.ams_slot_4_unbound_reason
        - input_text.ams_slot_5_unbound_reason
        - input_text.ams_slot_6_unbound_reason
      for: "00:00:30"
  conditions:
    - condition: template
      value_template: >-
        {{ trigger.to_state.state | default('') not in
        ['', 'unknown', 'unavailable', 'UNBOUND_TRAY_EMPTY'] }}
    - condition: state
      entity_id: input_boolean.appdaemon_startup_suppress_swap
      state: 'off'
  actions:
    - variables:
        slot_num: >-
          {{ trigger.entity_id | regex_findall('ams_slot_(\d+)_unbound') | first }}
    - action: notify.mobile_app_jd_pixel_10xl
      data:
        title: "AMS Slot {{ slot_num }} Needs Binding"
        message: >-
          ⚠️ Slot {{ slot_num }}: {{ states('sensor.ams_slot_' ~ slot_num ~ '_name') }}
          Reason: {{ trigger.to_state.state }}
          Open dashboard to bind.
        data:
          tag: "ams_bind_slot_{{ slot_num }}"
          clickAction: "/lovelace/3d-printer"
          url: "/lovelace/3d-printer"
  mode: queued
  max: 6

- id: ams_bind_reminder_clear
  alias: "AMS Bind Reminder Clear"
  description: "Clear bind reminder notification when slot is bound"
  triggers:
    - trigger: state
      entity_id:
        - input_text.ams_slot_1_unbound_reason
        - input_text.ams_slot_2_unbound_reason
        - input_text.ams_slot_3_unbound_reason
        - input_text.ams_slot_4_unbound_reason
        - input_text.ams_slot_5_unbound_reason
        - input_text.ams_slot_6_unbound_reason
  conditions:
    - condition: template
      value_template: >-
        {% set val = trigger.to_state.state | default('') %}
        {{ val == '' or val == 'unknown' or val == 'unavailable' }}
  actions:
    - variables:
        slot_num: >-
          {{ trigger.entity_id | regex_findall('ams_slot_(\d+)_unbound') | first }}
    - action: notify.mobile_app_jd_pixel_10xl
      data:
        message: clear_notification
        data:
          tag: "ams_bind_slot_{{ slot_num }}"
  mode: queued
  max: 6

- id: ams_print_unbound_warning
  alias: "AMS Print With Unbound Warning"
  description: "Urgent push when print starts with unbound slots"
  triggers:
    - trigger: state
      entity_id: sensor.p1s_01p00c5a3101668_print_status
      to:
        - running
        - printing
  conditions:
    - condition: template
      value_template: >-
        {% set reasons = [
          states('input_text.ams_slot_1_unbound_reason'),
          states('input_text.ams_slot_2_unbound_reason'),
          states('input_text.ams_slot_3_unbound_reason'),
          states('input_text.ams_slot_4_unbound_reason'),
          states('input_text.ams_slot_5_unbound_reason'),
          states('input_text.ams_slot_6_unbound_reason')
        ] %}
        {{ reasons | reject('in', ['', 'unknown', 'unavailable', 'UNBOUND_TRAY_EMPTY']) | list | length > 0 }}
  actions:
    - action: notify.mobile_app_jd_pixel_10xl
      data:
        title: "Print Started With Unbound Slots"
        message: "🚨 Print started with unbound slot — filament usage won't be tracked!"
        data:
          tag: ams_print_unbound_warning
          importance: high
          channel: alarm_stream
  mode: single
- id: spoolman_edit_prefill_location
  alias: "Spoolman edit – prefill on spool select, reset on clear"
  trigger:
    - platform: state
      entity_id: input_select.spoolman_edit_spool_select
  condition: []
  action:
    - choose:
        - conditions:
            - condition: template
              value_template: >
                {{ trigger.to_state.state in ['— Select spool —', '', 'unknown', 'unavailable'] }}
          sequence:
            - service: input_boolean.turn_off
              target:
                entity_id:
                  - input_boolean.spoolman_edit_update_weight
                  - input_boolean.spoolman_edit_update_location
            - service: input_number.set_value
              target:
                entity_id: input_number.spoolman_edit_remaining_weight
              data:
                value: 0
            - service: input_text.set_value
              target:
                entity_id: input_text.spoolman_edit_spool_location
              data:
                value: ""
        - conditions:
            - condition: template
              value_template: >
                {{ trigger.to_state.state not in ['— Select spool —', '', 'unknown', 'unavailable'] }}
          sequence:
            - variables:
                spool_id: "{{ trigger.to_state.state.split(' - ')[0] | trim }}"
            - service: input_text.set_value
              target:
                entity_id: input_text.spoolman_edit_spool_location
              data:
                value: >
                  {% set items = state_attr('sensor.spoolman_spool_list_data', 'items') or [] %}
                  {% set match = items | selectattr('id', 'eq', spool_id | int(0)) | list %}
                  {% if match | length > 0 %}
                    {{ match[0].location | default('') }}
                  {% else %}
                    {{ '' }}
                  {% endif %}
            - service: input_number.set_value
              target:
                entity_id: input_number.spoolman_edit_remaining_weight
              data:
                value: >
                  {% set items = state_attr('sensor.spoolman_spool_list_data', 'items') or [] %}
                  {% set match = items | selectattr('id', 'eq', spool_id | int(0)) | list %}
                  {% if match | length > 0 %}
                    {{ match[0].remaining_weight | default(0) | round(0) }}
                  {% else %}
                    0
                  {% endif %}
            - service: input_boolean.turn_off
              target:
                entity_id:
                  - input_boolean.spoolman_edit_update_weight
                  - input_boolean.spoolman_edit_update_location
  mode: single

- alias: "Spoolman filter – refresh dropdown options"
  id: spoolman_filter_refresh_dropdown_options
  description: "Updates filter input_select options when Spoolman data sensors change"
  mode: single
  trigger:
    - platform: state
      entity_id:
        - sensor.spoolman_filament_list_data
        - sensor.spoolman_spool_list_data
    - platform: homeassistant
      event: start
  condition: []
  action:
    - delay:
        seconds: 5
    - service: input_select.set_options
      target:
        entity_id: input_select.spoolman_filter_filament_material
      data:
        options: "{{ state_attr('sensor.spoolman_filter_filament_materials', 'options') or ['All'] }}"
    - service: input_select.set_options
      target:
        entity_id: input_select.spoolman_filter_filament_vendor
      data:
        options: "{{ state_attr('sensor.spoolman_filter_filament_vendors', 'options') or ['All'] }}"
    - service: input_select.set_options
      target:
        entity_id: input_select.spoolman_filter_spool_material
      data:
        options: "{{ state_attr('sensor.spoolman_filter_spool_materials', 'options') or ['All'] }}"
    - service: input_select.set_options
      target:
        entity_id: input_select.spoolman_filter_spool_vendor
      data:
        options: "{{ state_attr('sensor.spoolman_filter_spool_vendors', 'options') or ['All'] }}"
    - service: input_select.set_options
      target:
        entity_id: input_select.spoolman_filter_spool_location
      data:
        options: "{{ state_attr('sensor.spoolman_filter_spool_locations', 'options') or ['All'] }}"
    # Edit spool dropdown
    - service: input_select.set_options
      target:
        entity_id: input_select.spoolman_edit_spool_select
      data:
        options: >
          {% set items = state_attr('sensor.spoolman_spool_list_data', 'items') or [] %}
          {% set ns = namespace(opts=['— Select spool —']) %}
          {% for s in items %}
            {% set f = s.filament if s.filament is mapping else {} %}
            {% set vendor = (f.vendor.name | default('')) if f.vendor is mapping else '' %}
            {% set name = f.name | default('') %}
            {% set mat = f.material | default('') %}
            {% set loc = s.location | default('') %}
            {% set remaining = s.remaining_weight | default(0) | round(0) | string %}
            {% set label = ((vendor ~ ' – ' if vendor else '') ~ (name ~ ' – ' if name else '') ~ mat ~ ' – ' ~ remaining ~ 'g' ~ (' [' ~ loc ~ ']' if loc else '')) | trim %}
            {% set label = label if label else ('Spool ' ~ s.id | string) %}
            {% set ns.opts = ns.opts + [s.id | string ~ ' - ' ~ label] %}
          {% endfor %}
          {{ ns.opts }}
    # Auto-populate Add Spool filament dropdown
    - service: script.refresh_filament_dropdown
      data: {}
