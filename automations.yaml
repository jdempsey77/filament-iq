- id: p1s_persist_print_times
  alias: P1S – persist print start/end times
  description: Capture start_time and end_time sensors to persistent helpers so they survive HA restart
  trigger:
  - platform: state
    entity_id: sensor.p1s_01p00c5a3101668_start_time
  - platform: state
    entity_id: sensor.p1s_01p00c5a3101668_end_time
  - platform: state
    entity_id: sensor.p1s_operator_status
    to:
    - printing_normally
    - printing_attention_needed
  condition: []
  action:
  - choose:
    - conditions:
      - condition: template
        value_template: "{{ trigger.entity_id == 'sensor.p1s_01p00c5a3101668_start_time' and trigger.to_state.state not in ['unknown', 'unavailable', ''] }}"
      sequence:
      - action: input_datetime.set_datetime
        target:
          entity_id: input_datetime.p1s_print_start_time
        data:
          datetime: "{{ trigger.to_state.state }}"
    - conditions:
      - condition: template
        value_template: "{{ trigger.entity_id == 'sensor.p1s_01p00c5a3101668_end_time' and trigger.to_state.state not in ['unknown', 'unavailable', ''] }}"
      sequence:
      - action: input_datetime.set_datetime
        target:
          entity_id: input_datetime.p1s_print_end_time
        data:
          datetime: "{{ trigger.to_state.state }}"
    - conditions:
      - condition: state
        entity_id: sensor.p1s_operator_status
        state:
        - printing_normally
        - printing_attention_needed
      - condition: template
        value_template: "{{ states('sensor.p1s_01p00c5a3101668_start_time') not in ['unknown', 'unavailable', ''] }}"
      sequence:
      - action: input_datetime.set_datetime
        target:
          entity_id: input_datetime.p1s_print_start_time
        data:
          datetime: "{{ states('sensor.p1s_01p00c5a3101668_start_time') }}"
      - condition: template
        value_template: "{{ states('sensor.p1s_01p00c5a3101668_end_time') not in ['unknown', 'unavailable', ''] }}"
      - action: input_datetime.set_datetime
        target:
          entity_id: input_datetime.p1s_print_end_time
        data:
          datetime: "{{ states('sensor.p1s_01p00c5a3101668_end_time') }}"
  mode: restart

# -----------------------------------------------------------------------------
# Spoolman filament tracking (Bambu P1S): low filament + subtract after print
# -----------------------------------------------------------------------------
# Which spool: printer active_tray when available, else input_select.active_filament_spool.
# Spoolman reserved IDs 1–6 for AMS slots: slot 1 = spool 1, … slot 6 = spool 6.
# Map printer tray display name → slot 1–6; spool_id comes from input_text.ams_slot_N_spool_id (persisted).
# -----------------------------------------------------------------------------

- id: spoolman_low_filament_warning
  alias: Spoolman low filament warning
  description: Notify when active spool remaining weight is below 50g (critical) or 100g (warning). Uses printer active_tray when available, else dropdown.
  trigger:
  - platform: state
    entity_id:
      - input_select.active_filament_spool
      - sensor.p1s_01p00c5a3101668_active_tray
  - platform: time
    at: "09:00:00"
  variables:
    active_spool: "{% set tray = states('sensor.p1s_01p00c5a3101668_active_tray') %}{% set sel = states('input_select.active_filament_spool') %}{% if tray and tray not in ['', 'unknown', 'unavailable'] %}{{ tray }}{% else %}{{ sel }}{% endif %}"
    # Map display name → slot 1–6. Add new names when you swap filament.
    slot_num: "{% set s = active_spool %}{% if s == 'Overture PETG Black (AMS2 HT Slot 1)' %}5{% elif s == 'Overture PETG Clear (AMS2 HT Slot 2)' %}6{% elif s == 'Overture PLA White (AMS1 Slot 1)' %}1{% elif s == 'Overture PLA Red (AMS1 Slot 2)' or s == 'Bambu Lab - Red (AMS1 Slot 2)' or 'Slot 2' in s and 'Red' in s %}2{% elif s == 'Overture PLA Black (AMS1 Slot 3)' or s == 'Marsworks - Marswork PLA Black Refill' %}3{% elif s == 'Bambu Lab PLA Light Blue (AMS1 Slot 4)' %}4{% else %}0{% endif %}"
    spool_id: "{{ states('input_text.ams_slot_' ~ slot_num ~ '_spool_id') }}"
    remaining_g: "{{ states('sensor.ams_slot_' ~ slot_num ~ '_remaining_g') | float(0) }}"
  condition:
  - condition: template
    value_template: "{{ (slot_num | string) != '0' }}"
  - condition: template
    value_template: "{{ active_spool not in ['none', 'unknown', 'unavailable', '', none] }}"
  - condition: template
    value_template: "{{ remaining_g not in ['unknown', 'unavailable', ''] }}"
  action:
  - choose:
    - conditions:
      - condition: template
        value_template: "{{ remaining_g < 50 }}"
      sequence:
      - action: notify.persistent_notification
        data:
          title: "Spoolman – critical low filament (< 50 g)"
          message: "Spool « {{ active_spool }} » has {{ remaining_g | round(1) }} g remaining."
    - conditions:
      - condition: template
        value_template: "{{ remaining_g < 100 }}"
      sequence:
      - action: notify.persistent_notification
        data:
          title: "Spoolman – low filament (< 100 g)"
          message: "Spool « {{ active_spool }} » has {{ remaining_g | round(1) }} g remaining."
  mode: single

- id: p1s_capture_active_tray_entity
  alias: P1S – capture active tray entity during print
  description: When print starts, clear trays-used list, wait until any tray reports active=true then store that tray entity for subtract-after-print.
  trigger:
    - platform: state
      entity_id: sensor.p1s_01p00c5a3101668_print_status
      to:
        - running
        - printing
  action:
    - action: input_text.set_value
      target:
        entity_id: input_text.p1s_trays_used_this_print
      data:
        value: ""
    - wait_template: >
        {{ state_attr('sensor.p1s_01p00c5a3101668_ams_1_tray_1','active') == true or
           state_attr('sensor.p1s_01p00c5a3101668_ams_1_tray_2','active') == true or
           state_attr('sensor.p1s_01p00c5a3101668_ams_1_tray_3','active') == true or
           state_attr('sensor.p1s_01p00c5a3101668_ams_1_tray_4','active') == true or
           state_attr('sensor.p1s_01p00c5a3101668_ams_128_tray_1','active') == true or
           state_attr('sensor.p1s_01p00c5a3101668_ams_129_tray_1','active') == true }}
      timeout: "00:01:00"
      continue_on_timeout: true
    - choose:
        - conditions:
            - condition: template
              value_template: "{{ state_attr('sensor.p1s_01p00c5a3101668_ams_1_tray_1','active') == true }}"
          sequence:
            - action: input_text.set_value
              target:
                entity_id: input_text.p1s_last_tray_entity
              data:
                value: "sensor.p1s_01p00c5a3101668_ams_1_tray_1"
            - service: logbook.log
              data:
                name: P1S Tray Capture
                message: "Captured tray entity: sensor.p1s_01p00c5a3101668_ams_1_tray_1"
        - conditions:
            - condition: template
              value_template: "{{ state_attr('sensor.p1s_01p00c5a3101668_ams_1_tray_2','active') == true }}"
          sequence:
            - action: input_text.set_value
              target:
                entity_id: input_text.p1s_last_tray_entity
              data:
                value: "sensor.p1s_01p00c5a3101668_ams_1_tray_2"
            - service: logbook.log
              data:
                name: P1S Tray Capture
                message: "Captured tray entity: sensor.p1s_01p00c5a3101668_ams_1_tray_2"
        - conditions:
            - condition: template
              value_template: "{{ state_attr('sensor.p1s_01p00c5a3101668_ams_1_tray_3','active') == true }}"
          sequence:
            - action: input_text.set_value
              target:
                entity_id: input_text.p1s_last_tray_entity
              data:
                value: "sensor.p1s_01p00c5a3101668_ams_1_tray_3"
            - service: logbook.log
              data:
                name: P1S Tray Capture
                message: "Captured tray entity: sensor.p1s_01p00c5a3101668_ams_1_tray_3"
        - conditions:
            - condition: template
              value_template: "{{ state_attr('sensor.p1s_01p00c5a3101668_ams_1_tray_4','active') == true }}"
          sequence:
            - action: input_text.set_value
              target:
                entity_id: input_text.p1s_last_tray_entity
              data:
                value: "sensor.p1s_01p00c5a3101668_ams_1_tray_4"
            - service: logbook.log
              data:
                name: P1S Tray Capture
                message: "Captured tray entity: sensor.p1s_01p00c5a3101668_ams_1_tray_4"
        - conditions:
            - condition: template
              value_template: "{{ state_attr('sensor.p1s_01p00c5a3101668_ams_128_tray_1','active') == true }}"
          sequence:
            - action: input_text.set_value
              target:
                entity_id: input_text.p1s_last_tray_entity
              data:
                value: "sensor.p1s_01p00c5a3101668_ams_128_tray_1"
            - service: logbook.log
              data:
                name: P1S Tray Capture
                message: "Captured tray entity: sensor.p1s_01p00c5a3101668_ams_128_tray_1"
        - conditions:
            - condition: template
              value_template: "{{ state_attr('sensor.p1s_01p00c5a3101668_ams_129_tray_1','active') == true }}"
          sequence:
            - action: input_text.set_value
              target:
                entity_id: input_text.p1s_last_tray_entity
              data:
                value: "sensor.p1s_01p00c5a3101668_ams_129_tray_1"
            - service: logbook.log
              data:
                name: P1S Tray Capture
                message: "Captured tray entity: sensor.p1s_01p00c5a3101668_ams_129_tray_1"
      default:
        - service: logbook.log
          data:
            name: P1S Tray Capture
            message: "FAILED to capture tray entity (no tray active=true within 60s)."
  mode: single

# While print is running, append any tray that becomes active to the "trays used" list (for multi-color subtract).
- id: p1s_record_trays_used_during_print
  alias: P1S – record trays used during print
  description: When a tray reports active=true during a print, add it to p1s_trays_used_this_print so we can split weight on finish.
  trigger:
    - platform: state
      entity_id:
        - sensor.p1s_01p00c5a3101668_ams_1_tray_1
        - sensor.p1s_01p00c5a3101668_ams_1_tray_2
        - sensor.p1s_01p00c5a3101668_ams_1_tray_3
        - sensor.p1s_01p00c5a3101668_ams_1_tray_4
        - sensor.p1s_01p00c5a3101668_ams_128_tray_1
        - sensor.p1s_01p00c5a3101668_ams_129_tray_1
  condition:
    - condition: state
      entity_id: sensor.p1s_01p00c5a3101668_print_status
      state:
        - running
        - printing
    - condition: template
      value_template: "{{ state_attr(trigger.entity_id, 'active') == true }}"
  action:
    - action: input_text.set_value
      target:
        entity_id: input_text.p1s_trays_used_this_print
      data:
        value: >
          {% set raw = (states('input_text.p1s_trays_used_this_print') or '') | trim %}
          {% set tid = trigger.entity_id %}
          {% set slot = '1' if tid == 'sensor.p1s_01p00c5a3101668_ams_1_tray_1'
                   else '2' if tid == 'sensor.p1s_01p00c5a3101668_ams_1_tray_2'
                   else '3' if tid == 'sensor.p1s_01p00c5a3101668_ams_1_tray_3'
                   else '4' if tid == 'sensor.p1s_01p00c5a3101668_ams_1_tray_4'
                   else '5' if tid == 'sensor.p1s_01p00c5a3101668_ams_128_tray_1'
                   else '6' if tid == 'sensor.p1s_01p00c5a3101668_ams_129_tray_1'
                   else '0' %}
          {# keep only valid numeric slots from existing state (auto-cleans legacy entity_id strings) #}
          {% set slots_list = raw.split(',') | map('trim') | select | list %}
          {% set slots_list = slots_list | select('in', ['1','2','3','4','5','6']) | list %}
          {% set cur = slots_list | join(',') %}
          {% if slot == '0' %}{{ cur }}
          {% elif slot in slots_list %}{{ cur }}
          {% else %}{{ cur + (',' if cur else '') + slot }}{% endif %}
  mode: restart

# Fuel gauge: snapshot AMS tray remaining_filament at print start and finish (for usage estimation).
- id: p1s_remaining_snapshot_init
  alias: P1S – init remaining filament snapshots
  description: Clear snapshot JSON helpers when print starts, then seed with currently-active trays
  trigger:
    - platform: state
      entity_id: sensor.p1s_01p00c5a3101668_print_status
      to:
        - running
        - printing
  action:
    # Mutex: Set print active + job key
    - service: input_boolean.turn_on
      target:
        entity_id: input_boolean.p1s_print_active
    - action: input_text.set_value
      target:
        entity_id: input_text.p1s_print_job_key
      data:
        value: "{{ now().timestamp() | string }}_{{ states('sensor.p1s_01p00c5a3101668_task_name') | replace(' ', '_') }}"
    - service: input_boolean.turn_off
      target:
        entity_id: input_boolean.p1s_needs_reconcile
    - variables:
        debug_info: "print_status={{ states('sensor.p1s_01p00c5a3101668_print_status') }} | reset_start_end_json=1"
    - action: input_text.set_value
      target:
        entity_id: input_text.p1s_init_seed_debug
      data:
        value: "{{ debug_info }}"
    - action: input_text.set_value
      target:
        entity_id: input_text.p1s_tray_remaining_start_json
      data:
        value: "{}"
    - action: input_text.set_value
      target:
        entity_id: input_text.p1s_tray_remaining_end_json
      data:
        value: "{}"
    # Wait for printer to report which tray is in use (tray active or active_tray state), not Spoolman slot remaining
    - wait_template: >
        {{ state_attr('sensor.p1s_01p00c5a3101668_ams_1_tray_1', 'active') == true
           or state_attr('sensor.p1s_01p00c5a3101668_ams_1_tray_2', 'active') == true
           or state_attr('sensor.p1s_01p00c5a3101668_ams_1_tray_3', 'active') == true
           or state_attr('sensor.p1s_01p00c5a3101668_ams_1_tray_4', 'active') == true
           or state_attr('sensor.p1s_01p00c5a3101668_ams_128_tray_1', 'active') == true
           or state_attr('sensor.p1s_01p00c5a3101668_ams_129_tray_1', 'active') == true
           or ((states('sensor.p1s_01p00c5a3101668_active_tray') | default('') | trim) not in ['', 'unknown', 'unavailable', 'None']) }}
      timeout: "00:02:00"
      continue_on_timeout: true
    - variables:
        tray_entities:
          - sensor.p1s_01p00c5a3101668_ams_1_tray_1
          - sensor.p1s_01p00c5a3101668_ams_1_tray_2
          - sensor.p1s_01p00c5a3101668_ams_1_tray_3
          - sensor.p1s_01p00c5a3101668_ams_1_tray_4
          - sensor.p1s_01p00c5a3101668_ams_128_tray_1
          - sensor.p1s_01p00c5a3101668_ams_129_tray_1
        slot_map: [1, 2, 3, 4, 5, 6]
        seeded_dict: >
          {% set active_name = states('sensor.p1s_01p00c5a3101668_active_tray') | lower | trim %}
          {% set ns = namespace(result={}) %}
          {% for i in range(6) %}
            {% set tray = tray_entities[i] %}
            {% set slot = slot_map[i] | string %}
            {% set is_active_attr = state_attr(tray, 'active') == true %}
            {% set tray_name = states(tray) | lower | trim %}
            {% set is_active_by_name = active_name and tray_name and active_name == tray_name %}
            {% if is_active_attr or is_active_by_name %}
              {% set fg = states('sensor.p1s_tray_' ~ slot ~ '_fuel_gauge_remaining') | float(-1) %}
              {% set ams = states('sensor.ams_slot_' ~ slot ~ '_remaining_g') | float(-1) %}
              {% set effective = fg if fg > 0 else (ams if ams > 0 else -1) %}
              {% set grams = (effective if effective >= 0 else 0) | round(0) | int %}
              {# SAFETY: Clamp to >= 0 (replaces old comment) #}
              {% set ns.result = dict(ns.result, **{slot: grams}) %}
            {% endif %}
          {% endfor %}
          {{ ns.result }}
        # Fallback when no tray reports active: seed all slots with valid remaining so we still get start/end snapshots.
        fallback_dict: >
          {% set ns = namespace(result={}) %}
          {% for i in range(6) %}
            {% set slot = slot_map[i] | string %}
            {% set fg = states('sensor.p1s_tray_' ~ slot ~ '_fuel_gauge_remaining') | float(-1) %}
            {% set ams = states('sensor.ams_slot_' ~ slot ~ '_remaining_g') | float(-1) %}
            {% set effective = fg if fg > 0 else (ams if ams > 0 else -1) %}
            {% if effective >= 0 %}
              {# SAFETY: Clamp to >= 0 #}
              {% set grams = [0, effective] | max | round(0) | int %}
              {% set ns.result = dict(ns.result, **{slot: grams}) %}
            {% endif %}
          {% endfor %}
          {{ ns.result }}
        dict_to_seed: "{{ seeded_dict if seeded_dict | length > 0 else fallback_dict }}"
        active_slots: >
          {% set active_name = states('sensor.p1s_01p00c5a3101668_active_tray') | lower | trim %}
          {% set ns = namespace(slots=[]) %}
          {% for i in range(6) %}
            {% set t = tray_entities[i] %}
            {% set by_attr = state_attr(t, 'active') == true %}
            {% set by_name = active_name and (states(t) | lower | trim) == active_name %}
            {% if by_attr or by_name %}
              {% set ns.slots = ns.slots + [slot_map[i]] %}
            {% endif %}
          {% endfor %}
          {{ ns.slots | join(',') }}
        debug_detail: >
          {% set active_name = states('sensor.p1s_01p00c5a3101668_active_tray') | lower | trim %}
          {% set ns = namespace(lines=[]) %}
          {% for i in range(6) %}
            {% set slot = slot_map[i] | string %}
            {% set t = tray_entities[i] %}
            {% set by_attr = state_attr(t, 'active') == true %}
            {% set by_name = active_name and (states(t) | lower | trim) == active_name %}
            {% if by_attr or by_name %}
              {% set fg = states('sensor.p1s_tray_' ~ slot ~ '_fuel_gauge_remaining') | float(-1) %}
              {% set ams = states('sensor.ams_slot_' ~ slot ~ '_remaining_g') | float(-1) %}
              {% set effective = fg if fg > 0 else (ams if ams > 0 else -1) %}
              {% set fg_int = fg | round(0) | int %}
              {% set ams_int = ams | round(0) | int %}
              {% set eff_int = effective | round(0) | int %}
              {% set src = 'attr' if by_attr else 'name' %}
              {% set ns.lines = ns.lines + ['s' ~ slot ~ '(' ~ src ~ ') fg=' ~ fg_int ~ ' ams=' ~ ams_int ~ ' eff=' ~ eff_int] %}
            {% endif %}
          {% endfor %}
          {{ ns.lines | join(' | ') }}
    - action: input_text.set_value
      target:
        entity_id: input_text.p1s_init_seed_debug
      data:
        value: "print_status={{ states('sensor.p1s_01p00c5a3101668_print_status') }} | active_slots={{ active_slots }} | {{ debug_detail }} | seeded={{ seeded_dict | tojson }}{% if seeded_dict | length == 0 and fallback_dict | length > 0 %} | fallback={{ fallback_dict | tojson }}{% endif %}"
    - if:
        - condition: template
          value_template: "{{ dict_to_seed | length > 0 }}"
      then:
        - action: input_text.set_value
          target:
            entity_id: input_text.p1s_tray_remaining_start_json
          data:
            value: "{{ dict_to_seed | tojson }}"
    - service: logbook.log
      data:
        name: P1S Filament Tracking
        message: "Init: reset helpers, seeded {{ dict_to_seed | length }} slot(s){% if seeded_dict | length == 0 and fallback_dict | length > 0 %} (fallback: no tray active){% endif %}"
  mode: single

- id: p1s_remaining_snapshot_on_tray_first_active
  alias: P1S – seed start grams on tray first active
  description: Record start grams when tray becomes active during print (merge-only, write-once per slot)
  trigger:
    - platform: state
      entity_id:
        - sensor.p1s_01p00c5a3101668_ams_1_tray_1
        - sensor.p1s_01p00c5a3101668_ams_1_tray_2
        - sensor.p1s_01p00c5a3101668_ams_1_tray_3
        - sensor.p1s_01p00c5a3101668_ams_1_tray_4
        - sensor.p1s_01p00c5a3101668_ams_128_tray_1
        - sensor.p1s_01p00c5a3101668_ams_129_tray_1
      attribute: active
      to: true
  condition:
    - condition: template
      value_template: "{{ states('sensor.p1s_01p00c5a3101668_print_status') in ['running', 'printing'] }}"
  variables:
    slot_map:
      sensor.p1s_01p00c5a3101668_ams_1_tray_1: 1
      sensor.p1s_01p00c5a3101668_ams_1_tray_2: 2
      sensor.p1s_01p00c5a3101668_ams_1_tray_3: 3
      sensor.p1s_01p00c5a3101668_ams_1_tray_4: 4
      sensor.p1s_01p00c5a3101668_ams_128_tray_1: 5
      sensor.p1s_01p00c5a3101668_ams_129_tray_1: 6
    slot_int: "{{ slot_map[trigger.entity_id] }}"
    slot: "{{ slot_int | string }}"
    raw_start: "{{ states('input_text.p1s_tray_remaining_start_json') | default('') }}"
    existing: "{{ raw_start | from_json if raw_start not in ['unknown','unavailable','None','null',''] else {} }}"
    fg: "{{ states('sensor.p1s_tray_' ~ slot_int ~ '_fuel_gauge_remaining') | float(-1) }}"
    ams: "{{ states('sensor.ams_slot_' ~ slot_int ~ '_remaining_g') | float(-1) }}"
    eff: "{{ fg if fg > 0 else (ams if ams > 0 else -1) }}"
    grams: "{{ [0, eff] | max | round(0) | int }}"
    not_present: "{{ slot not in existing }}"
    current_keys: "{{ existing.keys() | list | join(',') }}"
  action:
    - if:
        - condition: template
          value_template: "{{ eff >= 0 and not_present }}"
      then:
        - variables:
            merged: "{{ existing | combine({slot: grams}) }}"
        - action: input_text.set_value
          target:
            entity_id: input_text.p1s_tray_remaining_start_json
          data:
            value: "{{ merged | tojson }}"
        - action: input_text.set_value
          target:
            entity_id: input_text.p1s_init_seed_debug
          data:
            value: "tray={{ trigger.entity_id }} | slot={{ slot_int }} | fg={{ fg | round(0) | int }} | ams={{ ams | round(0) | int }} | eff={{ eff | round(0) | int }} | grams={{ grams }} | merged | keys={{ merged.keys() | list | join(',') }}"
      else:
        - variables:
            skip_reason: >
              {% if eff < 0 %}eff<0
              {% elif not not_present %}already_present
              {% else %}unknown{% endif %}
        - action: input_text.set_value
          target:
            entity_id: input_text.p1s_init_seed_debug
          data:
            value: "tray={{ trigger.entity_id }} | slot={{ slot_int }} | skip={{ skip_reason }} | keys={{ current_keys }}"
  mode: queued
  max: 10

# DEBUG: Record every print_status change to helper (when filament_debug_mode ON)
- id: p1s_debug_print_status_transition
  alias: P1S – DEBUG record print_status transitions
  description: "When filament_debug_mode ON: record print_status from→to to p1s_last_print_status_transition."
  trigger:
    - platform: state
      entity_id: sensor.p1s_01p00c5a3101668_print_status
  condition:
    - condition: state
      entity_id: input_boolean.filament_debug_mode
      state: "on"
  action:
    - action: input_text.set_value
      target:
        entity_id: input_text.p1s_last_print_status_transition
      data:
        value: "{{ (now().isoformat() ~ ' | from=' ~ (trigger.from_state.state | default('(none)')) ~ ' | to=' ~ (trigger.to_state.state | default('(none)')))[:255] }}"
  mode: single

- id: p1s_remaining_snapshot_on_finish
  alias: P1S – snapshot remaining on print finish
  description: Record tray remaining_filament at print finish and notify with start→end delta (NO JSON PARSING)
  trigger:
    - platform: state
      entity_id: sensor.p1s_01p00c5a3101668_print_status
      from:
        - running
        - printing
        - pause
        - paused
    - platform: state
      entity_id: input_boolean.p1s_debug_finish_trigger
      to: "on"
  condition: []
  variables:
    trigger_state: "{{ 'debug' if trigger.entity_id == 'input_boolean.p1s_debug_finish_trigger' else (trigger.to_state.state | default('finish')) }}"
    task_name: "{{ states('sensor.p1s_01p00c5a3101668_task_name') }}"
    is_failed: "{{ trigger_state in ['failed', 'error', 'canceled'] }}"
    should_decrement: "{{ not is_failed or states('input_boolean.p1s_decrement_on_failed') == 'on' }}"
  action:
    # FIRST ACTION: Unconditional checkpoint (proves automation runs)
    - service: input_text.set_value
      target:
        entity_id: input_text.p1s_finish_automation_checkpoint
      data:
        value: "ENTERED_FIRST__BUILD_JSONFREE"
    # Reset debug trigger early so it can fire again
    - choose:
        - conditions:
            - condition: template
              value_template: "{{ trigger.entity_id == 'input_boolean.p1s_debug_finish_trigger' }}"
          sequence:
            - service: input_boolean.turn_off
              target:
                entity_id: input_boolean.p1s_debug_finish_trigger
    # Clear print mutex (always, even on early exit)
    - service: input_boolean.turn_off
      target:
        entity_id: input_boolean.p1s_print_active
    # Check if ANY slot has start data
    - variables:
        has_any_start: >
          {{ states('input_number.p1s_start_slot_1_g')|int + 
             states('input_number.p1s_start_slot_2_g')|int +
             states('input_number.p1s_start_slot_3_g')|int +
             states('input_number.p1s_start_slot_4_g')|int +
             states('input_number.p1s_start_slot_5_g')|int +
             states('input_number.p1s_start_slot_6_g')|int > 0 }}
    - if:
        - condition: template
          value_template: "{{ not has_any_start }}"
      then:
        - service: notify.persistent_notification
          data:
            title: "P1S Filament Tracking: Start Snapshot Empty"
            message: "Print finished but no start snapshot was recorded. Filament NOT decremented."
        - service: input_text.set_value
          target:
            entity_id: input_text.p1s_finish_automation_checkpoint
          data:
            value: "no_start_data"
        - stop: "No start data"
    # Process each slot
    - service: input_text.set_value
      target:
        entity_id: input_text.p1s_finish_automation_checkpoint
      data:
        value: "processing_slots"
    - repeat:
        count: 6
        sequence:
          - variables:
              slot_num: "{{ repeat.index }}"
              start_g: "{{ states('input_number.p1s_start_slot_' ~ repeat.index ~ '_g') | int(0) }}"
              spool_id: "{{ states('input_text.ams_slot_' ~ repeat.index ~ '_spool_id') | int(0) }}"
          - if:
              - condition: template
                value_template: "{{ start_g > 0 }}"
            then:
              # In debug mode: use pre-seeded end values; in real print: read sensors
              - choose:
                  - conditions:
                      - condition: template
                        value_template: "{{ trigger_state != 'debug' }}"
                    sequence:
                      # REAL PRINT: Compute end value (fuel gauge > spoolman > -1)
                      - variables:
                          fg: "{{ states('sensor.p1s_tray_' ~ repeat.index ~ '_fuel_gauge_remaining') | float(-1) }}"
                          ams: "{{ states('sensor.ams_slot_' ~ repeat.index ~ '_remaining_g') | float(-1) }}"
                          eff: "{{ fg if fg > 0 else (ams if ams > 0 else -1) }}"
                          end_g_raw: "{{ [0, eff] | max | int }}"
                      - service: input_number.set_value
                        target:
                          entity_id: "input_number.p1s_end_slot_{{ repeat.index }}_g"
                        data:
                          value: "{{ end_g_raw }}"
                      # Reconcile check (only for real prints)
                      - if:
                          - condition: template
                            value_template: "{{ eff < 0 }}"
                        then:
                          - service: input_boolean.turn_on
                            target:
                              entity_id: input_boolean.p1s_needs_reconcile
              # DEBUG or REAL: read end_g and compute used_g
              - variables:
                  end_g: "{{ states('input_number.p1s_end_slot_' ~ repeat.index ~ '_g') | int(0) }}"
                  used_g: "{{ [0, start_g - end_g] | max }}"
              # Decrement if conditions met
              - if:
                  - condition: template
                    value_template: "{{ should_decrement and spool_id > 0 and used_g > 0 }}"
                then:
                  - service: input_text.set_value
                    target:
                      entity_id: input_text.p1s_finish_automation_checkpoint
                    data:
                      value: "slot{{ repeat.index }}_decrement_{{ used_g }}g"
                  - service: spoolman.use_spool_filament
                    data:
                      id: "{{ spool_id }}"
                      use_weight: "{{ used_g }}"
    # Reload Spoolman
    - service: script.reload_spoolman_integration
    - service: input_text.set_value
      target:
        entity_id: input_text.p1s_finish_automation_checkpoint
      data:
        value: "reload_done"
    # Build notification
    - variables:
        message_lines: >
          {% set job_label = (task_name | replace('.gcode.3mf', '') | replace('.3mf', '') | trim) or task_name or '—' %}
          Print: {{ job_label }}
          Status: {{ trigger_state }}
          
          {% for i in range(1, 7) %}
          {% set start = states('input_number.p1s_start_slot_' ~ i ~ '_g')|int(0) %}
          {% if start > 0 %}
          {% set end = states('input_number.p1s_end_slot_' ~ i ~ '_g')|int(0) %}
          {% set used = [0, start - end]|max %}
          Slot {{ i }}: {{ start }}g → {{ end }}g (used ~{{ used }}g)
          {% endif %}
          {% endfor %}
    - service: notify.persistent_notification
      data:
        title: "P1S Filament Usage ({{ trigger_state }})"
        message: "{{ message_lines }}"
    - service: input_text.set_value
      target:
        entity_id: input_text.p1s_finish_automation_checkpoint
      data:
        value: "complete"
  mode: single

# Detect mid-print spool mapping changes → set reconcile flag
- id: p1s_detect_spool_swap_during_print
  alias: P1S – detect spool swap during print
  description: When spool assignment changes while print is active, set reconcile flag and notify
  trigger:
    - platform: state
      entity_id:
        - input_text.ams_slot_1_spool_id
        - input_text.ams_slot_2_spool_id
        - input_text.ams_slot_3_spool_id
        - input_text.ams_slot_4_spool_id
        - input_text.ams_slot_5_spool_id
        - input_text.ams_slot_6_spool_id
  condition:
    - condition: state
      entity_id: input_boolean.p1s_print_active
      state: 'on'
  action:
    - service: input_boolean.turn_on
      target:
        entity_id: input_boolean.p1s_needs_reconcile
    - service: notify.persistent_notification
      data:
        title: "P1S Spool Swap During Print Detected"
        message: "{{ trigger.to_state.entity_id }} changed from {{ trigger.from_state.state }} to {{ trigger.to_state.state }} while print active. Automatic filament tracking disabled for this print. Manual reconciliation required."
  mode: queued
  max: 10

# Reload automations when Spoolman fires a threshold event (info/warning/critical).
# The Spoolman integration does not fire an event when spools are added/updated;
# after swapping a spool and updating automations.yaml, deploy then either run
# automation.reload from Developer Tools > Services, or wait for a threshold event.
- id: spoolman_reload_automations_on_threshold
  alias: Spoolman – reload automations on threshold event
  description: When any spool hits a Spoolman threshold, reload automations so updated name→spool_id mappings are picked up.
  trigger:
  - platform: event
    event_type: spoolman_spool_threshold_exceeded
  action:
  - action: automation.reload
  mode: single

# Populate all spool dropdowns (global + per-slot) from Spoolman entities (no REST).
# Trigger on HA start and when options sensor changes; condition options non-empty.
- id: ams_populate_spool_dropdown_on_rest_data
  alias: AMS – populate all spool dropdowns from Spoolman entities
  description: On start or when sensor.ams_spool_list_options changes, set all dropdowns (global + slots 1-6).
  trigger:
    - platform: homeassistant
      event: start
    - platform: state
      entity_id:
        - sensor.ams_spool_list_options
  condition:
    - condition: template
      value_template: "{{ (state_attr('sensor.ams_spool_list_options', 'options') or []) | length > 0 }}"
  action:
    - action: input_select.set_options
      target:
        entity_id:
          - input_select.ams_assign_source_spool
          - input_select.ams_slot_1_select_spool
          - input_select.ams_slot_2_select_spool
          - input_select.ams_slot_3_select_spool
          - input_select.ams_slot_4_select_spool
          - input_select.ams_slot_5_select_spool
          - input_select.ams_slot_6_select_spool
      data:
        options: "{{ ['— Select spool —'] + (state_attr('sensor.ams_spool_list_options', 'options') or []) }}"
