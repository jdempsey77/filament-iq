# Combined assign + update scripts (one per slot). Parse dropdown, assign if valid, calculate remaining, update Spoolman.
ams_slot_1_assign_and_update:
  alias: Slot 1 – Assign & Update
  sequence:
    # Safety: Block if print is active
    - condition: state
      entity_id: input_boolean.p1s_print_active
      state: 'off'
    - variables:
        selected: "{{ states('input_select.ams_slot_1_select_spool') }}"
        spool_id: "{{ (selected.split('(')[-1].split(')')[0] | trim | int(0)) if (selected != '— Select spool —' and '(' in selected) else 0 }}"
        old_spool_id: "{{ states('input_text.ams_slot_1_spool_id') | int(0) }}"
    - choose:
        - conditions:
            - condition: template
              value_template: "{{ spool_id > 0 }}"
          sequence:
            - service: input_text.set_value
              target:
                entity_id: input_text.ams_slot_1_spool_id
              data:
                value: "{{ spool_id }}"
    - choose:
        - conditions:
            - condition: template
              value_template: "{{ old_spool_id > 0 and old_spool_id != spool_id }}"
          sequence:
            - service: spoolman.patch_spool
              data:
                id: "{{ old_spool_id }}"
                location: "Shelf"
    - variables:
        final_spool_id: "{{ states('input_text.ams_slot_1_spool_id') | int }}"
        gross: "{{ states('input_number.ams_slot_1_gross_weight') | float(0) }}"
        stype: "{{ states('input_select.ams_slot_1_spool_type') }}"
        tare: "{% if stype == 'Bambu Lab (plastic)' %}{{ states('input_number.tare_bambu_lab_plastic') | float(0) }}{% elif stype == 'Overture cardboard' %}{{ states('input_number.tare_overture_cardboard') | float(0) }}{% else %}{{ states('input_number.ams_slot_1_tare_override') | float(0) }}{% endif %}"
        extras: "{{ states('input_number.ams_slot_1_extras_weight') | float(0) }}"
        remaining: "{% if stype == 'Bambu Lab (plastic)' or stype == 'Overture cardboard' %}{{ [0, gross - tare] | max }}{% else %}{{ [0, gross - tare - extras] | max }}{% endif %}"
    - choose:
        - conditions:
            - condition: template
              value_template: "{{ final_spool_id > 0 }}"
          sequence:
            - service: spoolman.patch_spool
              data:
                id: "{{ final_spool_id }}"
                remaining_weight: "{{ remaining | float | round(2) }}"
                location: "AMS1_Slot1"
            - service: script.reload_spoolman_integration

