        data:
          value: "{{ (trigger.to_state.state.split('(')[-1].split(')')[0] | trim | int(0)) if (trigger.to_state.state != '— Select spool —' and '(' in trigger.to_state.state) else 0 }}"
    mode: single
  
  # Populate "New spool – filament" dropdown from Spoolman (API or entities). Trigger when list sensor or API sensor updates, or on start.
  - id: ams_filament_list_populate_dropdown
    alias: AMS – populate Add spool filament dropdown
    description: When filament list sensor or Spoolman API sensors update or on start, set input_select.spoolman_new_spool_filament options from all Spoolman filaments.
    trigger:
      - platform: homeassistant
        event: start
        id: homeassistant_start
      - platform: state
        entity_id:
          - sensor.ams_filament_list_options
          - sensor.spoolman_filaments_api
          - sensor.spoolman_filaments_processed
          - sensor.spoolman_spools_api
    condition:
      - condition: template
        value_template: >
          {{ states('input_select.spoolman_new_spool_filament') not in ['unknown', 'unavailable'] }}
    action:
      - if:
