                    in r %}{{ states('sensor.ams_slot_SLOT_NUM_name') }} · RFID not
                    refreshed {% elif status == 'empty' %}No spool loaded {%
                    elif status == 'needs_bind' %}
                      {% if 'NONRFID_NO_MATCH' in r %}Tap to select spool
                      {% elif 'AMBIGUOUS' in r %}Tap to select spool
                      {% elif 'GENERIC' in r or 'LOW_CONFIDENCE' in r %}Too generic to auto-match
                      {% elif 'NOT_FOUND' in r %}Tap to reassign
                      {% elif 'UID_NO_MATCH' in r %}Tap to select spool
                      {% else %}Tap to bind manually
                      {% endif %}
                    {% else %}
                      {% set name = states('sensor.ams_slot_SLOT_NUM_name') %}
                      {% set id = states('input_text.ams_slot_SLOT_NUM_spool_id') %}
                      {% set g = states('sensor.ams_slot_SLOT_NUM_remaining_g') | float(0) | round(0) | int %}
                      {{ name }} · #{{ id }} · {{ g }}g
                    {% endif %}
                  icon: >-
                    {% set status = states('sensor.ams_slot_SLOT_NUM_status') %} {% set
                    r = states('input_text.ams_slot_SLOT_NUM_unbound_reason') %} {% if
                    status == 'empty' %}ICON_OUTLINE {% elif
                    'RFID_NOT_REFRESHED' in r %}mdi:alert-circle {% elif status
