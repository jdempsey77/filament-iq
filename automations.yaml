# When user selects a spool from "Assign from warehouse" dropdown, set the numeric ID for scripts.
- id: ams_assign_source_spool_from_select
  alias: AMS – set source spool ID from dropdown selection
  description: When Assign from warehouse source spool dropdown changes, set input_number.ams_assign_source_spool_id for assign script.
  trigger:
    - platform: state
      entity_id:
        - input_select.ams_assign_source_spool
  action:
    - action: input_number.set_value
      target:
        entity_id: input_number.ams_assign_source_spool_id
      data:
        value: "{{ (trigger.to_state.state.split('(')[-1].split(')')[0] | trim | int(0)) if (trigger.to_state.state != '— Select spool —' and '(' in trigger.to_state.state) else 0 }}"
  mode: single

# Populate "New spool – filament" dropdown from Spoolman (API or entities). Trigger when list sensor or API sensor updates, or on start.
- id: ams_filament_list_populate_dropdown
  alias: AMS – populate Add spool filament dropdown
  description: When filament list sensor or Spoolman API sensors update or on start, set input_select.spoolman_new_spool_filament options (filtered to show only filaments without spools).
