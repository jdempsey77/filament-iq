                    status == 'needs_bind' %}
                      {% if 'NONRFID_NO_MATCH' in r %}No Match Found
                      {% elif 'AMBIGUOUS' in r %}Multiple Matches
                      {% elif 'GENERIC' in r or 'LOW_CONFIDENCE' in r %}Too Generic
                      {% elif 'NOT_FOUND' in r %}Spool Missing
                      {% elif 'UID_NO_MATCH' in r %}RFID Not Recognized
                      {% else %}Needs Binding
                      {% endif %}
                    {% else %}{{ states('sensor.ams_slot_SLOT_NUM_vendor') }} · {{
                    states('sensor.ams_slot_SLOT_NUM_material') }} {% endif %}
                  secondary: >-
                    {% set ams_ok =
                    states('sensor.p1s_your_printer_serial_AMS_SENSOR_PREFIXhumidity') not in
                    ['unavailable', 'unknown', ''] %} {% set status =
                    states('sensor.ams_slot_SLOT_NUM_status') %} {% set r =
                    states('input_text.ams_slot_SLOT_NUM_unbound_reason') %} {% if not
