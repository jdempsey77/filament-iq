                                {% set r =
                                states('input_text.ams_slot_SLOT_NUM_unbound_reason')
                                %} {% set status =
                                states('sensor.ams_slot_SLOT_NUM_status') %} {% if
                                'RFID_NOT_REFRESHED' in r %}### RFID Refresh
                                Needed

                                **{{ states('sensor.ams_slot_SLOT_NUM_name') }}**
                                (spool #{{
                                states('input_text.ams_slot_SLOT_NUM_spool_id') }}) is
                                correctly assigned but the AMS hasn't read the
