                    'printing' %} {% set active_ams =
                    state_attr('sensor.p1s_your_printer_serial_active_tray',
                    'ams_index') %} {% set active_tray =
                    state_attr('sensor.p1s_your_printer_serial_active_tray',
                    'tray_index') %} {% set is_active = printing and active_ams
                    == 0 and active_tray == 0 %} {% set status =
                    states('sensor.ams_slot_SLOT_NUM_status') %} {% if is_active and
                    status == 'ok' %}mdi:printer-3d-nozzle{% else %}{% endif %}
                  badge_color: >-
                    {% set printing =
                    states('sensor.p1s_your_printer_serial_current_stage') ==
                    'printing' %} {% set active_ams =
                    state_attr('sensor.p1s_your_printer_serial_active_tray',
                    'ams_index') %} {% set active_tray =
                    state_attr('sensor.p1s_your_printer_serial_active_tray',
