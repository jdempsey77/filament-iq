# -----------------------------------------------------------------------------
# AMS Slot Manager: scale-first update. remaining = max(0, gross - tare).
# Tare from spool type (Bambu Lab / Overture cardboard) or per-slot override (Custom).
# Spool ID from input_text.ams_slot_N_spool_id (persisted, may not be 1-6).
# -----------------------------------------------------------------------------
ams_update_slot_1:
  alias: AMS Slot 1 – update weight (gross − tare → Spoolman)
  sequence:
    - variables:
        spool_id: "{{ states('input_text.ams_slot_1_spool_id') }}"
        gross: "{{ states('input_number.ams_slot_1_gross_weight') | float(0) }}"
        stype: "{{ states('input_select.ams_slot_1_spool_type') }}"
        tare: "{% if stype == 'Bambu Lab (plastic)' %}{{ states('input_number.tare_bambu_lab_plastic') | float(0) }}{% elif stype == 'Overture cardboard' %}{{ states('input_number.tare_overture_cardboard') | float(0) }}{% else %}{{ states('input_number.ams_slot_1_tare_override') | float(0) }}{% endif %}"
        remaining: "{{ [0, gross - tare] | max }}"
    - service: spoolman.patch_spool
      data:
        id: "{{ spool_id | int }}"
        remaining_weight: "{{ remaining }}"
