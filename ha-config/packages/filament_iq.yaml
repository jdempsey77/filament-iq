  # Rehydrate print active mutex after HA restart if print is still running
  - id: p1s_rehydrate_mutex_on_restart
    alias: P1S – rehydrate print active mutex on HA restart
    description: If HA restarts while print is active, restore mutex to ON to prevent manual slot mapping changes
    trigger:
      - platform: homeassistant
        event: start
    condition:
      - condition: state
        entity_id: sensor.p1s_YOUR_PRINTER_SERIAL_print_status
        state:
          - running
          - printing
          - pause
          - paused
    action:
      - service: input_boolean.turn_on
        target:
          entity_id: input_boolean.filament_iq_print_active
    mode: single
  
  # Auto-detect AMS tray changes and try to match to Spoolman spools on Shelf. If exactly one match, auto-assign; otherwise notify for manual assignment.
  - id: ams_tray_auto_detect_and_assign
    alias: AMS – auto-detect tray change and assign Spoolman spool
    description: When an AMS tray changes (new filament loaded), try to match to a Spoolman spool on Shelf and auto-assign if unique match.
    initial_state: false
    trigger:
      - platform: state
        entity_id:
          - sensor.p1s_YOUR_PRINTER_SERIAL_ams_1_tray_1
          - sensor.p1s_YOUR_PRINTER_SERIAL_ams_1_tray_2
          - sensor.p1s_YOUR_PRINTER_SERIAL_ams_1_tray_3
          - sensor.p1s_YOUR_PRINTER_SERIAL_ams_1_tray_4
          - sensor.p1s_YOUR_PRINTER_SERIAL_ams_128_tray_1
          - sensor.p1s_YOUR_PRINTER_SERIAL_ams_129_tray_1
    condition:
      # Only fire if state actually changed (not just republished)
      - condition: template
        value_template: >
          {{ trigger.to_state.state not in ['Empty', 'unknown', 'unavailable', ''] 
             and trigger.from_state is not none
             and trigger.from_state.state != trigger.to_state.state 
             and trigger.from_state.state not in ['unknown', 'unavailable', 'None', ''] }}
    action:
      - variables:
          tray_text: "{{ trigger.to_state.state | trim }}"
          slot_map:
            sensor.p1s_YOUR_PRINTER_SERIAL_ams_1_tray_1: { slot: 1, location: "AMS1_Slot1" }
            sensor.p1s_YOUR_PRINTER_SERIAL_ams_1_tray_2: { slot: 2, location: "AMS1_Slot2" }
            sensor.p1s_YOUR_PRINTER_SERIAL_ams_1_tray_3: { slot: 3, location: "AMS1_Slot3" }
            sensor.p1s_YOUR_PRINTER_SERIAL_ams_1_tray_4: { slot: 4, location: "AMS1_Slot4" }
            sensor.p1s_YOUR_PRINTER_SERIAL_ams_128_tray_1: { slot: 5, location: "AMS2_HT_Slot1" }
            sensor.p1s_YOUR_PRINTER_SERIAL_ams_129_tray_1: { slot: 6, location: "AMS2_HT_Slot2" }
          slot_num: "{{ slot_map[trigger.entity_id].slot }}"
          ams_location: "{{ slot_map[trigger.entity_id].location }}"
          # Check if tray text is specific enough (has color, weight, or distinguishing info)
          # Generic examples: "Overture PLA", "eSUN ABS" (only vendor+material)
          # Specific examples: "Overture PLA Black", "eSUN ABS+ White 1kg"
          is_generic: >
            {% set words = (tray_text | lower).split() %}
            {% set has_color = words | select('in', ['black', 'white', 'red', 'blue', 'green', 'yellow', 'orange', 'purple', 'gray', 'grey', 'pink', 'brown', 'transparent', 'clear', 'natural']) | list | length > 0 %}
            {% set tl = tray_text | lower %}
            {% set has_weight = 'g' in tl or 'kg' in tl or 'lb' in tl %}
            {% set word_count = words | length %}
            {{ not has_color and not has_weight and word_count <= 2 }}
          # Find all spools on Shelf that match the tray text (vendor/material/name fuzzy match)
          matching_spools: >
            {% set ns = namespace(matches=[]) %}
            {% for st in (states.sensor | selectattr('entity_id', 'match', '^sensor\\.spoolman_spool_\\d+$') | list) %}
              {% set loc = (state_attr(st.entity_id, 'location') or '') | string | lower %}
              {% if loc == 'shelf' %}
                {% set vendor = (state_attr(st.entity_id, 'filament_vendor_name') or state_attr(st.entity_id, 'vendor_name') or '') | string | lower %}
                {% set material = (state_attr(st.entity_id, 'filament_material') or state_attr(st.entity_id, 'material') or '') | string | lower %}
                {% set name = (state_attr(st.entity_id, 'filament_name') or state_attr(st.entity_id, 'name') or '') | string | lower %}
                {% set tray_lower = tray_text | lower %}
                {% set match_score = 0 %}
                {# Vendor: check full string OR first word (handles multi-word vendors like "Bambu Lab") #}
                {% set vendor_first_word = vendor.split() | first if vendor else '' %}
                {% if (vendor and vendor in tray_lower) or (vendor_first_word and vendor_first_word | length > 2 and vendor_first_word in tray_lower) %}
                  {% set match_score = match_score + 1 %}
                {% endif %}
                {% if material and material in tray_lower %}{% set match_score = match_score + 1 %}{% endif %}
                {% if name and name in tray_lower %}{% set match_score = match_score + 1 %}{% endif %}
                {% if match_score >= 2 %}
                  {% set spool_id = st.entity_id.split('_')[-1] %}
                  {% set remaining = state_attr(st.entity_id, 'remaining_weight') | float(999999) %}
                  {% set ns.matches = ns.matches + [{'id': spool_id, 'remaining': remaining}] %}
                {% endif %}
              {% endif %}
            {% endfor %}
            {{ ns.matches }}
      - choose:
          # Generic tray text → skip auto-assign, notify once
          - conditions:
              - condition: template
                value_template: "{{ is_generic }}"
            sequence:
              - action: notify.persistent_notification
                data:
                  title: "AMS Slot {{ slot_num }}: Manual Assignment Required"
                  message: "Detected '{{ tray_text }}' in {{ ams_location }}. Tray text is too generic for auto-matching (lacks color/weight). Go to Spool Management to manually assign."
          # Exactly one match → auto-assign
          - conditions:
              - condition: template
                value_template: "{{ not is_generic and matching_spools | length == 1 }}"
            sequence:
              - variables:
                  spool_id: "{{ matching_spools[0].id }}"
              - action: input_text.set_value
                target:
                  entity_id: "input_text.ams_slot_{{ slot_num }}_spool_id"
                data:
                  value: "{{ spool_id }}"
              - action: spoolman.patch_spool
                data:
                  id: "{{ spool_id | int }}"
                  location: "{{ ams_location }}"
              - action: script.reload_spoolman_integration
              - action: notify.persistent_notification
                data:
                  title: "AMS Slot {{ slot_num }} Auto-Assigned"
                  message: "Detected '{{ tray_text }}' in {{ ams_location }}. Auto-assigned Spoolman spool {{ spool_id }}. Weigh the spool and tap 'Assign & Update' to set remaining weight."
          # Multiple matches → pick least remaining if unique winner, else manual
          - conditions:
              - condition: template
                value_template: "{{ not is_generic and matching_spools | length > 1 }}"
            sequence:
              - variables:
                  sorted_matches: "{{ matching_spools | sort(attribute='remaining') }}"
                  least_remaining: "{{ sorted_matches[0].remaining }}"
                  second_least: "{{ sorted_matches[1].remaining if sorted_matches | length > 1 else 999999 }}"
                  is_unique_winner: "{{ least_remaining < (second_least - 50) }}"
                  winner_spool_id: "{{ sorted_matches[0].id if is_unique_winner else none }}"
              - choose:
                  - conditions:
                      - condition: template
                        value_template: "{{ is_unique_winner }}"
                    sequence:
                      - action: input_text.set_value
                        target:
                          entity_id: "input_text.ams_slot_{{ slot_num }}_spool_id"
                        data:
                          value: "{{ winner_spool_id }}"
                      - action: spoolman.patch_spool
                        data:
                          id: "{{ winner_spool_id | int }}"
                          location: "{{ ams_location }}"
                      - action: script.reload_spoolman_integration
                      - action: notify.persistent_notification
                        data:
                          title: "AMS Slot {{ slot_num }} Auto-Assigned (Least Remaining)"
                          message: "Detected '{{ tray_text }}' in {{ ams_location }}. Auto-assigned Spoolman spool {{ winner_spool_id }} (least remaining: {{ least_remaining | round(0) }}g). Verify and update weight if needed."
                default:
                  - action: notify.persistent_notification
                    data:
                      title: "AMS Slot {{ slot_num }}: Manual Assignment Required"
                      message: "Detected '{{ tray_text }}' in {{ ams_location }}. Found {{ matching_spools | length }} possible matches (IDs: {{ matching_spools | map(attribute='id') | join(', ') }}), but no clear winner. Go to Spool Management to manually assign."
        default:
          # No matches → notify
          - action: notify.persistent_notification
            data:
              title: "AMS Slot {{ slot_num }}: Manual Assignment Required"
              message: "Detected '{{ tray_text }}' in {{ ams_location }}. No matching Spoolman spool found on Shelf. Go to Spool Management to manually assign."
    mode: queued
    max: 10
  
  - id: ams_bind_reminder_push
    alias: "AMS Bind Reminder Push"
    description: "Push notification when an AMS slot needs binding"
    triggers:
      - trigger: state
        entity_id:
          - input_text.ams_slot_1_unbound_reason
          - input_text.ams_slot_2_unbound_reason
          - input_text.ams_slot_3_unbound_reason
          - input_text.ams_slot_4_unbound_reason
          - input_text.ams_slot_5_unbound_reason
          - input_text.ams_slot_6_unbound_reason
        for: "00:00:30"
    conditions:
      - condition: template
        value_template: >-
          {{ trigger.to_state.state | default('') not in
          ['', 'unknown', 'unavailable', 'UNBOUND_TRAY_EMPTY'] }}
      - condition: state
        entity_id: input_boolean.filament_iq_startup_suppress_swap
        state: 'off'
    actions:
      - variables:
          slot_num: >-
            {{ trigger.entity_id | regex_findall('ams_slot_(\d+)_unbound') | first }}
      - action: notify.mobile_app_jd_pixel_10xl
        data:
          title: "AMS Slot {{ slot_num }} Needs Binding"
          message: >-
            ⚠️ Slot {{ slot_num }}: {{ states('sensor.ams_slot_' ~ slot_num ~ '_name') }}
            Reason: {{ trigger.to_state.state }}
            Open dashboard to bind.
          data:
            tag: "ams_bind_slot_{{ slot_num }}"
            clickAction: "/lovelace/3d-printer"
            url: "/lovelace/3d-printer"
    mode: queued
    max: 6
  
  - id: ams_bind_reminder_clear
    alias: "AMS Bind Reminder Clear"
    description: "Clear bind reminder notification when slot is bound"
    triggers:
      - trigger: state
        entity_id:
          - input_text.ams_slot_1_unbound_reason
          - input_text.ams_slot_2_unbound_reason
          - input_text.ams_slot_3_unbound_reason
          - input_text.ams_slot_4_unbound_reason
          - input_text.ams_slot_5_unbound_reason
          - input_text.ams_slot_6_unbound_reason
    conditions:
      - condition: template
        value_template: >-
          {% set val = trigger.to_state.state | default('') %}
          {{ val == '' or val == 'unknown' or val == 'unavailable' }}
    actions:
      - variables:
          slot_num: >-
            {{ trigger.entity_id | regex_findall('ams_slot_(\d+)_unbound') | first }}
      - action: notify.mobile_app_jd_pixel_10xl
        data:
          message: clear_notification
          data:
            tag: "ams_bind_slot_{{ slot_num }}"
    mode: queued
    max: 6
  
  - id: ams_print_unbound_warning
    alias: "AMS Print With Unbound Warning"
    description: "Urgent push when print starts with unbound slots"
    triggers:
      - trigger: state
        entity_id: sensor.p1s_YOUR_PRINTER_SERIAL_print_status
        to:
          - running
          - printing
    conditions:
      - condition: template
        value_template: >-
          {% set reasons = [
            states('input_text.ams_slot_1_unbound_reason'),
            states('input_text.ams_slot_2_unbound_reason'),
            states('input_text.ams_slot_3_unbound_reason'),
            states('input_text.ams_slot_4_unbound_reason'),
            states('input_text.ams_slot_5_unbound_reason'),
            states('input_text.ams_slot_6_unbound_reason')
          ] %}
          {{ reasons | reject('in', ['', 'unknown', 'unavailable', 'UNBOUND_TRAY_EMPTY']) | list | length > 0 }}
    actions:
      - action: notify.mobile_app_jd_pixel_10xl
        data:
          title: "Print Started With Unbound Slots"
          message: "🚨 Print started with unbound slot — filament usage won't be tracked!"
          data:
            tag: ams_print_unbound_warning
            importance: high
            channel: alarm_stream
    mode: single
  - id: spoolman_edit_prefill_location
    alias: "Spoolman edit – prefill on spool select, reset on clear"
    trigger:
      - platform: state
        entity_id: input_select.spoolman_edit_spool_select
    condition: []
    action:
      - choose:
          - conditions:
              - condition: template
                value_template: >
                  {{ trigger.to_state.state in ['— Select spool —', '', 'unknown', 'unavailable'] }}
            sequence:
              - service: input_boolean.turn_off
                target:
                  entity_id:
                    - input_boolean.spoolman_edit_update_weight
                    - input_boolean.spoolman_edit_update_location
              - service: input_number.set_value
                target:
                  entity_id: input_number.spoolman_edit_remaining_weight
                data:
                  value: 0
              - service: input_text.set_value
                target:
                  entity_id: input_text.spoolman_edit_spool_location
                data:
                  value: ""
          - conditions:
              - condition: template
                value_template: >
                  {{ trigger.to_state.state not in ['— Select spool —', '', 'unknown', 'unavailable'] }}
            sequence:
              - variables:
                  spool_id: "{{ trigger.to_state.state.split(' - ')[0] | trim }}"
              - service: input_text.set_value
                target:
                  entity_id: input_text.spoolman_edit_spool_location
                data:
                  value: >
                    {% set items = state_attr('sensor.spoolman_spool_list_data', 'items') or [] %}
                    {% set match = items | selectattr('id', 'eq', spool_id | int(0)) | list %}
                    {% if match | length > 0 %}
                      {{ match[0].location | default('') }}
                    {% else %}
                      {{ '' }}
                    {% endif %}
              - service: input_number.set_value
                target:
                  entity_id: input_number.spoolman_edit_remaining_weight
                data:
                  value: >
                    {% set items = state_attr('sensor.spoolman_spool_list_data', 'items') or [] %}
                    {% set match = items | selectattr('id', 'eq', spool_id | int(0)) | list %}
                    {% if match | length > 0 %}
                      {{ match[0].remaining_weight | default(0) | round(0) }}
                    {% else %}
                      0
                    {% endif %}
              - service: input_boolean.turn_off
                target:
                  entity_id:
                    - input_boolean.spoolman_edit_update_weight
                    - input_boolean.spoolman_edit_update_location
    mode: single
  
  - alias: "Spoolman filter – refresh dropdown options"
    id: spoolman_filter_refresh_dropdown_options
    description: "Updates filter input_select options when Spoolman data sensors change"
    mode: single
    trigger:
      - platform: state
        entity_id:
          - sensor.spoolman_filament_list_data
          - sensor.spoolman_spool_list_data
      - platform: homeassistant
        event: start
    condition: []
    action:
      - delay:
          seconds: 5
      - service: input_select.set_options
        target:
          entity_id: input_select.spoolman_filter_filament_material
        data:
          options: "{{ state_attr('sensor.spoolman_filter_filament_materials', 'options') or ['All'] }}"
      - service: input_select.set_options
        target:
          entity_id: input_select.spoolman_filter_filament_vendor
        data:
          options: "{{ state_attr('sensor.spoolman_filter_filament_vendors', 'options') or ['All'] }}"
      - service: input_select.set_options
        target:
          entity_id: input_select.spoolman_filter_spool_material
        data:
          options: "{{ state_attr('sensor.spoolman_filter_spool_materials', 'options') or ['All'] }}"
      - service: input_select.set_options
        target:
          entity_id: input_select.spoolman_filter_spool_vendor
        data:
          options: "{{ state_attr('sensor.spoolman_filter_spool_vendors', 'options') or ['All'] }}"
      - service: input_select.set_options
        target:
          entity_id: input_select.spoolman_filter_spool_location
        data:
          options: "{{ state_attr('sensor.spoolman_filter_spool_locations', 'options') or ['All'] }}"
      # Edit spool dropdown
      - service: input_select.set_options
        target:
          entity_id: input_select.spoolman_edit_spool_select
        data:
          options: >
            {% set items = state_attr('sensor.spoolman_spool_list_data', 'items') or [] %}
            {% set ns = namespace(opts=['— Select spool —']) %}
            {% for s in items %}
              {% set f = s.filament if s.filament is mapping else {} %}
              {% set vendor = (f.vendor.name | default('')) if f.vendor is mapping else '' %}
              {% set name = f.name | default('') %}
              {% set mat = f.material | default('') %}
              {% set loc = s.location | default('') %}
              {% set remaining = s.remaining_weight | default(0) | round(0) | string %}
              {% set label = ((vendor ~ ' – ' if vendor else '') ~ (name ~ ' – ' if name else '') ~ mat ~ ' – ' ~ remaining ~ 'g' ~ (' [' ~ loc ~ ']' if loc else '')) | trim %}
              {% set label = label if label else ('Spool ' ~ s.id | string) %}
              {% set ns.opts = ns.opts + [s.id | string ~ ' - ' ~ label] %}
            {% endfor %}
            {{ ns.opts }}
      # Auto-populate Add Spool filament dropdown
      - service: script.refresh_filament_dropdown
        data: {}

script:
  # Scripts (included from configuration.yaml).
  # Root keys are script IDs (e.g. reload_spoolman_integration); each has alias, sequence, etc.
  #
  # Reload Spoolman (dashboard button): REQUIRED — replace YOUR_SPOOLMAN_ENTRY_ID below
  # with your Spoolman config entry ID. Get it: Settings → Devices & Services → Spoolman
  # → ⋮ → Configure; the URL ends with /integration/XXXXXXXX — that hex is entry_id.
  # Or in .storage/core.config_entries search for "spoolman" and copy "entry_id".
  # Then redeploy: ./scripts/manage_ha.sh --scripts (and restart HA if needed).
  #
  # yaml-language-server: $schema=
  # Reload Spoolman integration only. Do NOT run refresh_ams_spool_list here (causes spinners; dropdown is populated by automation when REST data arrives).
  
  # V1 OPINIONATED AUTO-MAPPING: Choose spool for slot (deterministic, minimal logic)
  # Returns spool_id via ams_slot_N_spool_id helper. Called by finish automation for each slot.
  p1s_choose_spool_for_slot_v1:
    alias: P1S Choose Spool for Slot (V1 Opinionated)
    description: "Deterministic spool selection: binding > material+lightest > overall-lightest. Persists choice."
    mode: queued
    max: 10
    fields:
      slot:
        description: "Slot number (1-6)"
        example: "1"
      material:
        description: "Material (PLA, PETG, ABS, etc.)"
        example: "PLA"
      start_weight_g:
        description: "Start weight in grams"
        example: "500"
    sequence:
      - variables:
          auto_enabled: "{{ states('input_boolean.filament_iq_auto_mode_opinionated') == 'on' }}"
          # RESILIENT: Check if binding helper exists before reading
          binding_helper_exists: "{{ states('input_text.filament_iq_slot_to_spool_binding_json') not in ['unavailable', 'unknown', ''] }}"
          binding_raw: "{{ states('input_text.filament_iq_slot_to_spool_binding_json') | default('{}', true) | string }}"
          binding_dict: >
            {% set s = (binding_raw | trim) %}
            {% if s.startswith('{') and s.endswith('}') %}
              {{ s | from_json }}
            {% else %}
              {{ {} }}
            {% endif %}
          slot_str: "{{ slot_number | string }}"
          bound_spool_id: "{{ binding_dict.get(slot_str, 0) | int }}"
      # If auto mode OFF: return null (do nothing)
      - if:
          - condition: template
            value_template: "{{ not auto_enabled }}"
        then:
          # RESILIENT: Only write if helper exists
          - if:
              - condition: template
                value_template: "{{ states('input_text.filament_iq_last_mapping_json') not in ['unavailable', 'unknown', ''] }}"
            then:
              - service: input_text.set_value
                target:
                  entity_id: input_text.filament_iq_last_mapping_json
                data:
                  value: "{{ ('slot=' ~ slot_number ~ ' | auto_mode=OFF | no_action') | string }}"
          - stop: "Auto mode disabled"
      # Check if binding exists and spool exists
      - if:
          - condition: template
            value_template: "{{ bound_spool_id > 0 }}"
        then:
          - variables:
              spool_exists: >
                {{ states('sensor.spoolman_spool_' ~ bound_spool_id) not in ['unavailable', 'unknown', ''] }}
          - if:
              - condition: template
                value_template: "{{ spool_exists }}"
            then:
              - service: input_text.set_value
                target:
                  entity_id: "input_text.ams_slot_{{ slot_number }}_spool_id"
                data:
                  value: "{{ bound_spool_id | string }}"
              # RESILIENT: Only write if helper exists
              - if:
                  - condition: template
                    value_template: "{{ states('input_text.filament_iq_last_mapping_json') not in ['unavailable', 'unknown', ''] }}"
                then:
                  - service: input_text.set_value
                    target:
                      entity_id: input_text.filament_iq_last_mapping_json
                    data:
                      value: "{{ ('slot=' ~ slot_number ~ ' | spool_id=' ~ bound_spool_id ~ ' | confidence=high | rule=binding_reused') | string }}"
              - stop: "Binding reused"
      # Choose by material + lightest, or fallback to overall-lightest
      - variables:
          mat_lower: "{{ (material | default('PLA') | lower | trim) }}"
          all_spools: >
            {% set ns = namespace(spools=[]) %}
            {% for st in (states.sensor | selectattr('entity_id', 'match', '^sensor\\.spoolman_spool_\\d+$') | list) %}
              {% set mat = (state_attr(st.entity_id, 'filament_material') or '') | string | lower %}
              {% set rem = state_attr(st.entity_id, 'remaining_weight') | float(-1) %}
              {% if rem >= 0 %}
                {% set spool_id = st.entity_id.split('_')[-1] %}
                {% set ns.spools = ns.spools + [{'id': spool_id, 'material': mat, 'remaining': rem}] %}
              {% endif %}
            {% endfor %}
            {{ ns.spools }}
          material_matches: "{{ all_spools | selectattr('material', 'eq', mat_lower) | list }}"
          candidates: "{{ material_matches if material_matches | length > 0 else all_spools }}"
          sorted_candidates: "{{ candidates | sort(attribute='remaining') }}"
          chosen: "{{ sorted_candidates[0] if sorted_candidates | length > 0 else none }}"
          chosen_spool_id: "{{ chosen.id if chosen else 0 }}"
          confidence: "{{ 'medium' if material_matches | length > 0 else 'low' }}"
          rule: "{{ 'material_lightest' if material_matches | length > 0 else 'fallback_overall_lightest' }}"
      - if:
          - condition: template
            value_template: "{{ chosen_spool_id | int > 0 }}"
        then:
          # Assign spool to slot
          - service: input_text.set_value
            target:
              entity_id: "input_text.ams_slot_{{ slot_number }}_spool_id"
            data:
              value: "{{ chosen_spool_id | string }}"
          # Update binding JSON (persist for next time) - RESILIENT: Only if helper exists
          - if:
              - condition: template
                value_template: "{{ binding_helper_exists }}"
            then:
              - variables:
                  updated_binding: "{{ binding_dict | combine({slot_str: chosen_spool_id | int}) }}"
                  # RESILIENT: Ensure JSON string doesn't exceed max (1024)
                  binding_json_str: "{{ (updated_binding | tojson)[:1020] | string }}"
              - service: input_text.set_value
                target:
                  entity_id: input_text.filament_iq_slot_to_spool_binding_json
                data:
                  value: "{{ binding_json_str }}"
          # Log mapping result - RESILIENT: Only if helper exists
          - if:
              - condition: template
                value_template: "{{ states('input_text.filament_iq_last_mapping_json') not in ['unavailable', 'unknown', ''] }}"
            then:
              - variables:
                  # RESILIENT: Ensure log string doesn't exceed max (2048)
                  log_str: "{{ ('slot=' ~ slot_number ~ ' | mat=' ~ mat_lower ~ ' | spool_id=' ~ chosen_spool_id ~ ' | remaining=' ~ chosen.remaining ~ 'g | confidence=' ~ confidence ~ ' | rule=' ~ rule ~ ' | candidates=' ~ candidates | length)[:2044] | string }}"
              - service: input_text.set_value
                target:
                  entity_id: input_text.filament_iq_last_mapping_json
                data:
                  value: "{{ log_str }}"
        else:
          # No spools available (should never happen)
          - if:
              - condition: template
                value_template: "{{ states('input_text.filament_iq_last_mapping_json') not in ['unavailable', 'unknown', ''] }}"
            then:
              - service: input_text.set_value
                target:
                  entity_id: input_text.filament_iq_last_mapping_json
                data:
                  value: "{{ ('slot=' ~ slot_number ~ ' | ERROR | no_spools_available') | string }}"
  
  # E2E VALIDATION: Test scenarios for V1 opinionated auto-mapping
  test_scenario_1_single_slot:
    alias: "Test Scenario 1: Single Slot Print (35g)"
    description: "Clear state, seed slot 1 (350g→315g), trigger finish, verify decrement"
    sequence:
      # Clear all start/end helpers
      - repeat:
          count: 6
          sequence:
            - service: input_number.set_value
              target:
                entity_id: "input_number.p1s_start_slot_{{ repeat.index }}_g"
              data:
                value: 0
            - service: input_number.set_value
              target:
                entity_id: "input_number.p1s_end_slot_{{ repeat.index }}_g"
              data:
                value: 0
      # Seed slot 1
      - service: input_number.set_value
        target:
          entity_id: input_number.filament_iq_start_slot_1_g
        data:
          value: 350
      - service: input_number.set_value
        target:
          entity_id: input_number.filament_iq_end_slot_1_g
        data:
          value: 315
      # Trigger finish
      - service: input_boolean.turn_off
        target:
          entity_id: input_boolean.filament_iq_debug_finish_trigger
      - delay: "00:00:01"
      - service: input_boolean.turn_on
        target:
          entity_id: input_boolean.filament_iq_debug_finish_trigger
  
  test_scenario_4_multi_slot:
    alias: "Test Scenario 4: Multi-Slot Print"
    description: "Seed slot 1 (300g→270g) + slot 2 (200g→165g), verify both processed"
    sequence:
      # Clear all
      - repeat:
          count: 6
          sequence:
            - service: input_number.set_value
              target:
                entity_id: "input_number.p1s_start_slot_{{ repeat.index }}_g"
              data:
                value: 0
            - service: input_number.set_value
              target:
                entity_id: "input_number.p1s_end_slot_{{ repeat.index }}_g"
              data:
                value: 0
      # Seed slot 1
      - service: input_number.set_value
        target:
          entity_id: input_number.filament_iq_start_slot_1_g
        data:
          value: 300
      - service: input_number.set_value
        target:
          entity_id: input_number.filament_iq_end_slot_1_g
        data:
          value: 270
      # Seed slot 2
      - service: input_number.set_value
        target:
          entity_id: input_number.filament_iq_start_slot_2_g
        data:
          value: 200
      - service: input_number.set_value
        target:
          entity_id: input_number.filament_iq_end_slot_2_g
        data:
          value: 165
      # Trigger
      - service: input_boolean.turn_off
        target:
          entity_id: input_boolean.filament_iq_debug_finish_trigger
      - delay: "00:00:01"
      - service: input_boolean.turn_on
        target:
          entity_id: input_boolean.filament_iq_debug_finish_trigger
  
  test_clear_binding:
    alias: "Test: Clear Binding JSON"
    description: "Reset binding JSON to {} for determinism tests"
    sequence:
      - service: input_text.set_value
        target:
          entity_id: input_text.filament_iq_slot_to_spool_binding_json
        data:
          value: "{}"
  
  # INFRASTRUCTURE VALIDATION: Verify persistence helpers exist and are writable
  p1s_validate_persistence_infrastructure:
    alias: "P1S Validate Persistence Infrastructure"
    description: "Confirms binding + mapping helpers exist and are writable. Returns PASS/FAIL."
    sequence:
      - variables:
          binding_exists: "{{ states('input_text.filament_iq_slot_to_spool_binding_json') not in ['unavailable', 'unknown'] }}"
          mapping_exists: "{{ states('input_text.filament_iq_last_mapping_json') not in ['unavailable', 'unknown'] }}"
          binding_state_before: "{{ states('input_text.filament_iq_slot_to_spool_binding_json') | default('', true) | string }}"
      # Test 1: Check existence
      - if:
          - condition: template
            value_template: "{{ not binding_exists or not mapping_exists }}"
        then:
          - service: persistent_notification.create
            data:
              title: "P1S Infrastructure Validation: FAIL"
              message: >
                Binding helper exists: {{ binding_exists }}
                Mapping helper exists: {{ mapping_exists }}
                
                ACTION REQUIRED: Create missing helpers via HA UI:
                1. Settings → Devices & Services → Helpers
                2. Create Text helpers with exact entity IDs:
                   - input_text.filament_iq_slot_to_spool_binding_json (max: 1024)
                   - input_text.filament_iq_last_mapping_json (max: 2048)
          - stop: "FAIL: Helpers missing"
      # Test 2: Attempt safe write/restore (doesn't alter production data long-term)
      - service: input_text.set_value
        target:
          entity_id: input_text.filament_iq_slot_to_spool_binding_json
        data:
          value: "{{ ('{}') | string }}"
      - delay: "00:00:01"
      - variables:
          write_test: "{{ states('input_text.filament_iq_slot_to_spool_binding_json') | string }}"
      # Restore original value (if unavailable/unknown, restore '{}')
      - service: input_text.set_value
        target:
          entity_id: input_text.filament_iq_slot_to_spool_binding_json
        data:
          value: "{{ (binding_state_before if binding_state_before not in ['', 'unavailable', 'unknown'] else '{}') | string }}"
      # Test 3: Log result
      - service: input_text.set_value
        target:
          entity_id: input_text.filament_iq_last_mapping_json
        data:
          value: "{{ ('validation=PASS | binding_writable=true | mapping_writable=true | timestamp=' ~ now().isoformat()) | string }}"
      - service: persistent_notification.create
        data:
          title: "P1S Infrastructure Validation: PASS"
          message: >
            ✓ Binding helper exists and is writable
            ✓ Mapping helper exists and is writable
            
            Infrastructure is ready for V1 opinionated auto-mapping.
  
  # DEBUG: Simulate finish path without a real print. Requires filament_debug_mode ON for checkpoints.
  # Seeds start/end input_numbers (NO JSON), fires finish automation. Verify checkpoints reach COMPLETE.
  # Spoolman decrement only runs if ams_slot_1_spool_id/ams_slot_2_spool_id are set and > 0.
  p1s_debug_force_finish_path:
    alias: P1S Debug – force finish path (no print)
    sequence:
      # Set start values
      - service: input_number.set_value
        target:
          entity_id: input_number.filament_iq_start_slot_1_g
        data:
          value: 100
      - service: input_number.set_value
        target:
          entity_id: input_number.filament_iq_start_slot_2_g
        data:
          value: 200
      # Set end values
      - service: input_number.set_value
        target:
          entity_id: input_number.filament_iq_end_slot_1_g
        data:
          value: 90
      - service: input_number.set_value
        target:
          entity_id: input_number.filament_iq_end_slot_2_g
        data:
          value: 150
      # Trigger finish automation
      - service: input_boolean.turn_off
        target:
          entity_id: input_boolean.filament_iq_debug_finish_trigger
      - delay: "00:00:01"
      - service: input_boolean.turn_on
        target:
          entity_id: input_boolean.filament_iq_debug_finish_trigger
  
  # TODO: Replace YOUR_SPOOLMAN_ENTRY_ID with your Spoolman config entry ID (Settings → Devices & Services → Spoolman → Configure)
  reload_spoolman_integration:
    alias: Reload Spoolman integration
    sequence:
      - action: homeassistant.reload_config_entry
        data:
          entry_id: "YOUR_SPOOLMAN_ENTRY_ID"
  
  # Add filament to Spoolman from test dashboard form (uses spoolman_new_filament_* helpers). Then reload integration.
  # If spoolman_base_url is empty, request goes to localhost:8080 and the filament won't appear in your Spoolman.
  spoolman_add_filament:
    alias: Add filament to Spoolman
    sequence:
      - action: rest_command.ams_spoolman_create_filament
      - action: script.reload_spoolman_integration
      - action: notify.persistent_notification
        data:
          message: "Filament created and Spoolman reloaded."
          title: Filament added to Spoolman
  
  # Add spool to Spoolman from dashboard (uses spoolman_new_spool_* helpers).
  spoolman_add_spool:
    alias: Add spool to Spoolman
    sequence:
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ (states('input_select.spoolman_new_spool_filament') or '') | trim != '' and ' - ' in (states('input_select.spoolman_new_spool_filament') or '') }}"
            sequence:
              - variables:
                  qty: "{{ states('input_number.spoolman_new_spool_quantity') | int(1) }}"
              - repeat:
                  count: "{{ qty }}"
                  sequence:
                    - action: rest_command.ams_spoolman_create_spool
              - action: script.reload_spoolman_integration
              - action: browser_mod.notification
                data:
                  message: "✅ Spool added to Spoolman"
  
  # Manual entrypoint for AMS reconciliation (fires AMS_RECONCILE_ALL event for AppDaemon).
  reconcile_all_ams_slots:
    alias: Reconcile AMS Slots
    description: "Manual entrypoint for AMS reconciliation (fires AMS_RECONCILE_ALL event)"
    sequence:
      - event: AMS_RECONCILE_ALL
        event_data:
          status_only: false
          reason: "manual_button"
  
  # Optional manual refresh: re-apply dropdown from template sensor options only (no Spoolman reload).
  refresh_ams_spool_list:
    alias: Refresh AMS spool list (Assign from warehouse)
    sequence:
      - action: input_select.set_options
        target:
          entity_id: input_select.ams_assign_source_spool
        data:
          options: "{{ ['— Select spool —'] + (state_attr('sensor.ams_spool_list_options', 'options') or []) }}"
  
  # Force Spoolman filaments fetch and repopulate "Add spool" filament dropdown. Use if dropdown is empty (wrong URL or sensor not yet updated).
  refresh_filament_dropdown:
    alias: Refresh filament list (Add spool)
    sequence:
      - action: homeassistant.update_entity
        target:
          entity_id:
            - sensor.spoolman_filaments_api
            - sensor.spoolman_vendors_api
            - sensor.spoolman_spools_api
      - delay:
          seconds: 2
      - action: input_select.set_options
        target:
          entity_id: input_select.spoolman_new_spool_filament
        data:
          options: "{{ ['— Select filament —'] + (state_attr('sensor.ams_filament_list_options', 'options') or []) }}"
  
  # Assign the currently selected warehouse spool to a slot (sets input_text.ams_slot_N_spool_id).
  # No-op if no spool selected (source ID 0).
  ams_assign_to_slot_1:
    alias: Assign selected spool to Slot 1
    sequence:
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ states('input_number.ams_assign_source_spool_id') | int > 0 }}"
            sequence:
              - action: input_text.set_value
                target:
                  entity_id: input_text.ams_slot_1_spool_id
                data:
                  value: "{{ states('input_number.ams_assign_source_spool_id') | int }}"
  ams_assign_to_slot_2:
    alias: Assign selected spool to Slot 2
    sequence:
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ states('input_number.ams_assign_source_spool_id') | int > 0 }}"
            sequence:
              - action: input_text.set_value
                target:
                  entity_id: input_text.ams_slot_2_spool_id
                data:
                  value: "{{ states('input_number.ams_assign_source_spool_id') | int }}"
  ams_assign_to_slot_3:
    alias: Assign selected spool to Slot 3
    sequence:
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ states('input_number.ams_assign_source_spool_id') | int > 0 }}"
            sequence:
              - action: input_text.set_value
                target:
                  entity_id: input_text.ams_slot_3_spool_id
                data:
                  value: "{{ states('input_number.ams_assign_source_spool_id') | int }}"
  ams_assign_to_slot_4:
    alias: Assign selected spool to Slot 4
    sequence:
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ states('input_number.ams_assign_source_spool_id') | int > 0 }}"
            sequence:
              - action: input_text.set_value
                target:
                  entity_id: input_text.ams_slot_4_spool_id
                data:
                  value: "{{ states('input_number.ams_assign_source_spool_id') | int }}"
  ams_assign_to_slot_5:
    alias: Assign selected spool to Slot 5 (AMS2 HT 1)
    sequence:
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ states('input_number.ams_assign_source_spool_id') | int > 0 }}"
            sequence:
              - action: input_text.set_value
                target:
                  entity_id: input_text.ams_slot_5_spool_id
