# COMPLETE REWRITE - lines 722-966 in automations.yaml
# Replace p1s_remaining_snapshot_on_finish automation with this JSON-free version

- id: p1s_remaining_snapshot_on_finish
  alias: P1S – snapshot remaining on print finish
  description: Record tray remaining_filament at print finish and notify with start→end delta (NO JSON PARSING)
  trigger:
    - platform: state
      entity_id: sensor.p1s_01p00c5a3101668_print_status
      from:
        - running
        - printing
        - pause
        - paused
    - platform: state
      entity_id: input_boolean.p1s_debug_finish_trigger
      to: "on"
  condition: []
  variables:
    trigger_state: "{{ 'debug' if trigger.entity_id == 'input_boolean.p1s_debug_finish_trigger' else (trigger.to_state.state | default('finish')) }}"
    task_name: "{{ states('sensor.p1s_01p00c5a3101668_task_name') }}"
    is_failed: "{{ trigger_state in ['failed', 'error', 'canceled'] }}"
    should_decrement: "{{ not is_failed or states('input_boolean.p1s_decrement_on_failed') == 'on' }}"
  action:
    # FIRST ACTION: Unconditional checkpoint (proves automation runs)
    - service: input_text.set_value
      target:
        entity_id: input_text.p1s_finish_automation_checkpoint
      data:
        value: "ENTERED_FIRST__BUILD_JSONFREE"
    # Reset debug trigger early so it can fire again
    - choose:
        - conditions:
            - condition: template
              value_template: "{{ trigger.entity_id == 'input_boolean.p1s_debug_finish_trigger' }}"
          sequence:
            - service: input_boolean.turn_off
              target:
                entity_id: input_boolean.p1s_debug_finish_trigger
    # Clear print mutex (always, even on early exit)
    - service: input_boolean.turn_off
      target:
        entity_id: input_boolean.p1s_print_active
    # Check if ANY slot has start data
    - variables:
        has_any_start: >
          {{ states('input_number.p1s_start_slot_1_g')|int + 
             states('input_number.p1s_start_slot_2_g')|int +
             states('input_number.p1s_start_slot_3_g')|int +
             states('input_number.p1s_start_slot_4_g')|int +
             states('input_number.p1s_start_slot_5_g')|int +
             states('input_number.p1s_start_slot_6_g')|int > 0 }}
    - if:
        - condition: template
          value_template: "{{ not has_any_start }}"
      then:
        - service: notify.persistent_notification
          data:
            title: "P1S Filament Tracking: Start Snapshot Empty"
            message: "Print finished but no start snapshot was recorded. Filament NOT decremented."
        - service: input_text.set_value
          target:
            entity_id: input_text.p1s_finish_automation_checkpoint
          data:
            value: "no_start_data"
        - stop: "No start data"
    # Process each slot
    - service: input_text.set_value
      target:
        entity_id: input_text.p1s_finish_automation_checkpoint
      data:
        value: "processing_slots"
    - repeat:
        count: 6
        sequence:
          - variables:
              slot_num: "{{ repeat.index }}"
              start_g: "{{ states('input_number.p1s_start_slot_' ~ repeat.index ~ '_g') | int(0) }}"
              spool_id: "{{ states('input_text.ams_slot_' ~ repeat.index ~ '_spool_id') | int(0) }}"
          - if:
              - condition: template
                value_template: "{{ start_g > 0 }}"
            then:
              # Compute end value (fuel gauge > spoolman > -1)
              - variables:
                  fg: "{{ states('sensor.p1s_tray_' ~ repeat.index ~ '_fuel_gauge_remaining') | float(-1) }}"
                  ams: "{{ states('sensor.ams_slot_' ~ repeat.index ~ '_remaining_g') | float(-1) }}"
                  eff: "{{ fg if fg > 0 else (ams if ams > 0 else -1) }}"
                  end_g_raw: "{{ [0, eff] | max | int }}"
              - service: input_number.set_value
                target:
                  entity_id: "input_number.p1s_end_slot_{{ repeat.index }}_g"
                data:
                  value: "{{ end_g_raw }}"
              - variables:
                  end_g: "{{ states('input_number.p1s_end_slot_' ~ repeat.index ~ '_g') | int(0) }}"
                  used_g: "{{ [0, start_g - end_g] | max }}"
              # Reconcile check
              - if:
                  - condition: template
                    value_template: "{{ eff < 0 }}"
                then:
                  - service: input_boolean.turn_on
                    target:
                      entity_id: input_boolean.p1s_needs_reconcile
              # Decrement if conditions met
              - if:
                  - condition: template
                    value_template: "{{ should_decrement and spool_id > 0 and used_g > 0 }}"
                then:
                  - service: input_text.set_value
                    target:
                      entity_id: input_text.p1s_finish_automation_checkpoint
                    data:
                      value: "slot{{ repeat.index }}_decrement_{{ used_g }}g"
                  - service: spoolman.use_spool_filament
                    data:
                      id: "{{ spool_id }}"
                      use_weight: "{{ used_g }}"
    # Reload Spoolman
    - service: script.reload_spoolman_integration
    - service: input_text.set_value
      target:
        entity_id: input_text.p1s_finish_automation_checkpoint
      data:
        value: "reload_done"
    # Build notification
    - variables:
        message_lines: >
          {% set job_label = (task_name | replace('.gcode.3mf', '') | replace('.3mf', '') | trim) or task_name or '—' %}
          Print: {{ job_label }}
          Status: {{ trigger_state }}
          
          {% for i in range(1, 7) %}
          {% set start = states('input_number.p1s_start_slot_' ~ i ~ '_g')|int(0) %}
          {% if start > 0 %}
          {% set end = states('input_number.p1s_end_slot_' ~ i ~ '_g')|int(0) %}
          {% set used = [0, start - end]|max %}
          Slot {{ i }}: {{ start }}g → {{ end }}g (used ~{{ used }}g)
          {% endif %}
          {% endfor %}
    - service: notify.persistent_notification
      data:
        title: "P1S Filament Usage ({{ trigger_state }})"
        message: "{{ message_lines }}"
    - service: input_text.set_value
      target:
        entity_id: input_text.p1s_finish_automation_checkpoint
      data:
        value: "complete"
  mode: single
