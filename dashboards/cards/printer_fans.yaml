          action: none
        double_tap_action:
          action: none
        card_mod:
          style: |
            ha-card {
              {% if is_state('fan.p1s_01p00c5a3101668_chamber_fan', 'on') %}
              background: rgba(0,188,212,0.08) !important;
              {% else %}
              background: rgba(255,255,255,0.03) !important;
              {% endif %}
              box-shadow: none;
              border: 1px solid rgba(255,255,255,0.06) !important;
