      - name: "AMS Slot 5 – vendor"
        unique_id: ams_slot_5_vendor
        state: >-
          {% set sid = states('input_text.ams_slot_5_spool_id') %}
          {% if sid in ['0', '', 'unknown', 'unavailable'] %}Unknown
          {% else %}{{ state_attr('sensor.spoolman_spool_' ~ sid, 'filament_vendor_name') | default(state_attr('sensor.spoolman_spool_' ~ sid, 'vendor_name')) | default('Unknown') }}
          {% endif %}
      - name: "AMS Slot 5 – color hex"
        unique_id: ams_slot_5_color_hex
        state: >-
          {% set sid = states('input_text.ams_slot_5_spool_id') %}
          {% if sid in ['0', '', 'unknown', 'unavailable'] %}000000
          {% else %}
            {% set c = state_attr('sensor.spoolman_spool_' ~ sid, 'filament_color_hex') | default(state_attr('sensor.spoolman_spool_' ~ sid, 'color_hex')) | default('000000') %}
            {{ c | replace('#', '') | truncate(6, True, '') }}
          {% endif %}
      - name: "AMS Slot 5 – status"
        unique_id: ams_slot_5_status
        state: >-
          {% set reason = states('input_text.ams_slot_5_unbound_reason') %}
          {% set sid = states('input_text.ams_slot_5_spool_id') %}
          {% if reason == 'UNBOUND_TRAY_EMPTY' %}empty
          {% elif reason not in ['', 'unknown', 'unavailable'] %}needs_bind
          {% elif sid not in ['0', '', 'unknown', 'unavailable'] %}ok
          {% else %}unknown
          {% endif %}
        icon: >-
          {% set s = this.state %}
          {% if s == 'ok' %}mdi:check-circle
          {% elif s == 'needs_bind' %}mdi:alert
          {% elif s == 'empty' %}mdi:tray-remove
          {% else %}mdi:help-circle
          {% endif %}
      - name: "AMS Slot 6 – name"
        unique_id: ams_slot_6_name
        state: "{{ state_attr('sensor.spoolman_spool_' ~ states('input_text.ams_slot_6_spool_id'), 'filament_name') | default(state_attr('sensor.spoolman_spool_' ~ states('input_text.ams_slot_6_spool_id'), 'name')) | default('AMS2 HT 2') }}"
      - name: "AMS Slot 6 – remaining (g)"
        unique_id: ams_slot_6_remaining_g
        unit_of_measurement: g
        state: "{{ state_attr('sensor.spoolman_spool_' ~ states('input_text.ams_slot_6_spool_id'), 'remaining_weight') | default(states('sensor.spoolman_spool_' ~ states('input_text.ams_slot_6_spool_id'))) | float(0) | round(0) }}"
      - name: "AMS Slot 6 – material"
        unique_id: ams_slot_6_material
        state: >-
          {% set sid = states('input_text.ams_slot_6_spool_id') %}
          {% if sid in ['0', '', 'unknown', 'unavailable'] %}Unknown
          {% else %}{{ state_attr('sensor.spoolman_spool_' ~ sid, 'filament_material') | default('Unknown') }}
          {% endif %}
      - name: "AMS Slot 6 – vendor"
        unique_id: ams_slot_6_vendor
        state: >-
          {% set sid = states('input_text.ams_slot_6_spool_id') %}
          {% if sid in ['0', '', 'unknown', 'unavailable'] %}Unknown
          {% else %}{{ state_attr('sensor.spoolman_spool_' ~ sid, 'filament_vendor_name') | default(state_attr('sensor.spoolman_spool_' ~ sid, 'vendor_name')) | default('Unknown') }}
          {% endif %}
      - name: "AMS Slot 6 – color hex"
        unique_id: ams_slot_6_color_hex
        state: >-
          {% set sid = states('input_text.ams_slot_6_spool_id') %}
          {% if sid in ['0', '', 'unknown', 'unavailable'] %}000000
          {% else %}
            {% set c = state_attr('sensor.spoolman_spool_' ~ sid, 'filament_color_hex') | default(state_attr('sensor.spoolman_spool_' ~ sid, 'color_hex')) | default('000000') %}
            {{ c | replace('#', '') | truncate(6, True, '') }}
          {% endif %}
      - name: "AMS Slot 6 – status"
        unique_id: ams_slot_6_status
        state: >-
          {% set reason = states('input_text.ams_slot_6_unbound_reason') %}
          {% set sid = states('input_text.ams_slot_6_spool_id') %}
          {% if reason == 'UNBOUND_TRAY_EMPTY' %}empty
          {% elif reason not in ['', 'unknown', 'unavailable'] %}needs_bind
          {% elif sid not in ['0', '', 'unknown', 'unavailable'] %}ok
          {% else %}unknown
          {% endif %}
        icon: >-
          {% set s = this.state %}
          {% if s == 'ok' %}mdi:check-circle
          {% elif s == 'needs_bind' %}mdi:alert
          {% elif s == 'empty' %}mdi:tray-remove
          {% else %}mdi:help-circle
          {% endif %}
      # Spool list for dropdown: extract spool ID from entity_id (sensor.spoolman_spool_<digits>).
      # Filter by split('_') length to get only main spool entities, not children. No .append() (unsafe).
      - name: "AMS Spool list – options"
        unique_id: ams_spool_list_options
        state: >
          {% set ns = namespace(seen=[]) %}
          {% for st in (states.sensor | list) %}
            {% if st and st.entity_id %}
              {% set eid = st.entity_id | string %}
              {% if eid is match('sensor\\.spoolman_spool_\\d+$') %}
                {% set sid = eid | regex_replace('sensor\\.spoolman_spool_', '') %}
                {% if sid and sid not in ns.seen %}
                  {% set loc = (state_attr(eid, 'location') or '') | string | trim | lower %}
                  {% if loc not in ['empty', 'new', ''] %}
                    {% set ns.seen = ns.seen + [sid] %}
                  {% endif %}
                {% endif %}
              {% endif %}
            {% endif %}
          {% endfor %}
          {{ ns.seen | length }}
        attributes:
          options: >
            {% set ns = namespace(opts=[], seen=[]) %}
            {% for st in (states.sensor | list) %}
              {% if st and st.entity_id %}
                {% set eid = st.entity_id | string %}
                {% if eid is match('sensor\\.spoolman_spool_\\d+$') %}
                  {% set sid = eid | regex_replace('sensor\\.spoolman_spool_', '') %}
                  {% if sid and sid not in ns.seen %}
                    {% set loc = (state_attr(eid, 'location') or '') | string | trim | lower %}
                    {% if loc not in ['empty', 'new', ''] %}
                      {% set vendor_attr = state_attr(eid, 'vendor') %}
                      {% set v = (state_attr(eid, 'filament_vendor_name') or state_attr(eid, 'vendor_name') or state_attr(eid, 'manufacturer') or (vendor_attr.name | default('') if vendor_attr is mapping else (vendor_attr | string if vendor_attr is string else '')) or '') | string | trim %}
                      {% set n = (state_attr(eid, 'filament_name') or state_attr(eid, 'name') or '') | string | trim %}
                      {% set m = (state_attr(eid, 'filament_material') or state_attr(eid, 'material') or '') | string | trim %}
                      {% set label = ((v + ' – ' if v else '') + (n + ' – ' if n else '') + (m if m else '')) | trim | regex_replace(' – $', '') | trim %}
                      {% set label = label if label else ('Spool ' ~ sid) %}
                      {% set ns.seen = ns.seen + [sid] %}
                      {% set ns.opts = ns.opts + [label ~ ' (' ~ sid ~ ')'] %}
                    {% endif %}
                  {% endif %}
                {% endif %}
              {% endif %}
            {% endfor %}
            {{ ns.opts | sort }}
      # Process Spoolman filaments API raw data into formatted list (stored in attributes to avoid 255 char limit)
      - name: "Spoolman filaments processed"
        unique_id: spoolman_filaments_processed
        state: >
          {% set api_data = state_attr('sensor.spoolman_filaments_api', '$') %}
          {% if api_data is iterable and api_data is not string %}
            {{ api_data | length }}
          {% else %}
            {{ this.state if this.state is defined else 0 }}
          {% endif %}
        attributes:
          filament_list: >
            {% set api_data = state_attr('sensor.spoolman_filaments_api', '$') %}
            {% if api_data is iterable and api_data is not string %}
              {% set ns = namespace(parts=[]) %}
              {% for f in api_data %}
                {% set v = (f.vendor.name | default('')) if (f.vendor is defined and f.vendor is mapping) else '' %}
                {% set mat = (f.material | default('')) | string | trim %}
                {% set n = (f.name | default('')) | replace('|', ' ') | trim %}
                {% set bits = [v, mat, n] | reject('eq', '') | list %}
                {% set label = (bits | join(' – ')) or ('Filament ' ~ (f.id | string)) %}
                {% set ns.parts = ns.parts + [(f.id | string) ~ ' - ' ~ label] %}
              {% endfor %}
              {{ ns.parts }}
            {% else %}
              {{ state_attr('sensor.spoolman_filaments_processed', 'filament_list') or [] }}
            {% endif %}
      # Filament list for "Add spool" dropdown: from processed list, filtered to show only filaments WITHOUT spools
      - name: "AMS Filament list – options"
        unique_id: ams_filament_list_options
        state: >
          {% set all_parts = state_attr('sensor.spoolman_filaments_processed', 'filament_list') or [] %}
          {{ all_parts | length }}
        attributes:
          options: >
            {% set all_parts = state_attr('sensor.spoolman_filaments_processed', 'filament_list') or [] %}
            {% if all_parts | length > 0 %}
              {% set used_fids_raw = states('sensor.spoolman_spools_api') | default('') %}
              {% if used_fids_raw not in ['unknown', 'unavailable', ''] and used_fids_raw != '' %}
                {% set used_list = used_fids_raw.split(',') | map('trim') | list if ',' in used_fids_raw else [used_fids_raw | trim] %}
                {% set ns = namespace(filtered=[]) %}
                {% for part in all_parts %}
                  {% if ' - ' in part %}
                    {% set fid = part.split(' - ')[0] | trim %}
                    {% if fid not in used_list %}
                      {% set ns.filtered = ns.filtered + [part] %}
                    {% endif %}
                  {% endif %}
                {% endfor %}
                {{ ns.filtered | sort }}
              {% else %}
                {{ all_parts | sort }}
              {% endif %}
            {% else %}
              {{ [] }}
            {% endif %}
      # Vendor list for "Add filament" dropdown: from Spoolman API
      - name: "AMS Vendor list – options"
        unique_id: ams_vendor_list_options
        state: >
          {% set raw = states('sensor.spoolman_vendors_api') | default('') %}
          {% if raw is string and raw not in ['unknown', 'unavailable', ''] %}
            {% if '|||' in raw %}
              {{ (raw.split('|||') | map('trim') | reject('eq', '') | list) | length }}
            {% elif ' - ' in raw %}
              {{ 1 }}
            {% else %}
              {{ 0 }}
            {% endif %}
          {% else %}
            {{ 0 }}
          {% endif %}
        attributes:
          options: >
            {% set raw = states('sensor.spoolman_vendors_api') | default('') %}
            {% if raw is string and raw not in ['unknown', 'unavailable', ''] %}
              {% if '|||' in raw %}
                {% set parts = (raw.split('|||') | map('trim') | reject('eq', '') | list) %}
                {{ parts | sort }}
              {% elif ' - ' in raw %}
                {{ [raw | trim] }}
              {% else %}
                {{ [] }}
              {% endif %}
            {% else %}
              {{ [] }}
            {% endif %}
      # Temporary debug: spool entities seen, options built. Remove once Slot 1 works.
      - name: "AMS Spool list – debug"
        unique_id: ams_spool_list_options_debug
        state: "{{ (state_attr('sensor.ams_spool_list_options', 'options') or []) | length }}"
        attributes:
          spool_entities_seen: >
            {% set ns = namespace(out=[]) %}
            {% for st in (states.sensor | list) %}
              {% if st and st.entity_id %}
                {% set eid = st.entity_id | string %}
                {% if eid is match('sensor\\.spoolman_spool_\\d+$') %}
                  {% set ns.out = ns.out + [eid] %}
                {% endif %}
              {% endif %}
            {% endfor %}
            {{ ns.out[:30] }}
          options_sample: "{{ (state_attr('sensor.ams_spool_list_options', 'options') or [])[:15] }}"

      # Fuel gauge: computed remaining grams from tray_weight * remain / 100
      - name: "P1S Tray 1 Fuel Gauge Remaining"
        unique_id: p1s_tray_1_fuel_gauge_remaining_g
        unit_of_measurement: "g"
        device_class: weight
        state_class: measurement
        state: >
          {{ [0, (state_attr('sensor.p1s_01p00c5a3101668_ams_1_tray_1', 'tray_weight') | float(0) * state_attr('sensor.p1s_01p00c5a3101668_ams_1_tray_1', 'remain') | float(0) / 100)] | max | round(1) }}

      - name: "P1S Tray 2 Fuel Gauge Remaining"
        unique_id: p1s_tray_2_fuel_gauge_remaining_g
        unit_of_measurement: "g"
        device_class: weight
        state_class: measurement
        state: >
          {{ [0, (state_attr('sensor.p1s_01p00c5a3101668_ams_1_tray_2', 'tray_weight') | float(0) * state_attr('sensor.p1s_01p00c5a3101668_ams_1_tray_2', 'remain') | float(0) / 100)] | max | round(1) }}

      - name: "P1S Tray 3 Fuel Gauge Remaining"
        unique_id: p1s_tray_3_fuel_gauge_remaining_g
        unit_of_measurement: "g"
        device_class: weight
        state_class: measurement
        state: >
          {{ [0, (state_attr('sensor.p1s_01p00c5a3101668_ams_1_tray_3', 'tray_weight') | float(0) * state_attr('sensor.p1s_01p00c5a3101668_ams_1_tray_3', 'remain') | float(0) / 100)] | max | round(1) }}

      - name: "P1S Tray 4 Fuel Gauge Remaining"
        unique_id: p1s_tray_4_fuel_gauge_remaining_g
        unit_of_measurement: "g"
        device_class: weight
        state_class: measurement
        state: >
          {{ [0, (state_attr('sensor.p1s_01p00c5a3101668_ams_1_tray_4', 'tray_weight') | float(0) * state_attr('sensor.p1s_01p00c5a3101668_ams_1_tray_4', 'remain') | float(0) / 100)] | max | round(1) }}

      - name: "P1S Tray 5 Fuel Gauge Remaining"
        unique_id: p1s_tray_5_fuel_gauge_remaining_g
        unit_of_measurement: "g"
        device_class: weight
        state_class: measurement
        state: >
          {{ [0, (state_attr('sensor.p1s_01p00c5a3101668_ams_128_tray_1', 'tray_weight') | float(0) * state_attr('sensor.p1s_01p00c5a3101668_ams_128_tray_1', 'remain') | float(0) / 100)] | max | round(1) }}

      - name: "P1S Tray 6 Fuel Gauge Remaining"
        unique_id: p1s_tray_6_fuel_gauge_remaining_g
        unit_of_measurement: "g"
        device_class: weight
        state_class: measurement
        state: >
          {{ [0, (state_attr('sensor.p1s_01p00c5a3101668_ams_129_tray_1', 'tray_weight') | float(0) * state_attr('sensor.p1s_01p00c5a3101668_ams_129_tray_1', 'remain') | float(0) / 100)] | max | round(1) }}

