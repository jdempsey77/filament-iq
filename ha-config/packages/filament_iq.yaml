                  entity_id: input_text.ams_slot_6_unbound_reason
                data:
                  value: ""
              - action: browser_mod.notification
                data:
                  message: "✅ Slot 6 updated"
        default:
          - action: browser_mod.notification
            data:
              message: "Select a spool from the dropdown first."
  
  spoolman_update_spool_remaining:
    alias: "Spoolman – Update spool"
    description: "PATCHes selected fields for a spool in Spoolman (only toggled-on fields)"
    mode: single
    sequence:
      - variables:
          edit_selection: "{{ states('input_select.spoolman_edit_spool_select') | default('') }}"
          edit_spool_id: >
            {% if '—' in edit_selection or edit_selection == '' %}
              {{ states('input_text.spoolman_edit_spool_id') | trim }}
            {% else %}
              {{ edit_selection.split(' - ')[0] | trim }}
            {% endif %}
          update_weight: "{{ is_state('input_boolean.spoolman_edit_update_weight', 'on') }}"
          update_location: "{{ is_state('input_boolean.spoolman_edit_update_location', 'on') }}"
          edit_weight: "{{ states('input_number.spoolman_edit_remaining_weight') | float(0) }}"
          edit_location: "{{ states('input_text.spoolman_edit_spool_location') | default('') | trim }}"
          payload_json: >
            {% set pd = {} %}
            {% if update_weight %}
              {% set pd = dict(pd, **{'remaining_weight': edit_weight}) %}
            {% endif %}
            {% if update_location %}
              {% set pd = dict(pd, **{'location': edit_location}) %}
            {% endif %}
            {{ pd | tojson }}
      - condition: template
        value_template: >
          {{ edit_spool_id | trim not in ['', '0', 'unknown', 'unavailable'] }}
      - condition: template
        value_template: >
          {{ update_weight or update_location }}
      - service: rest_command.ams_spoolman_patch_spool
        data:
          spool_id: "{{ edit_spool_id }}"
          payload: "{{ payload_json }}"
      - service: persistent_notification.create
        data:
          title: "Spool Updated"
          message: >
            Spool #{{ edit_spool_id }} updated:
            {% if update_weight %} weight={{ edit_weight }}g{% endif %}
            {% if update_location %} location={{ edit_location }}{% endif %}
          notification_id: "spoolman_edit_result"
      - service: input_boolean.turn_off
        target:
          entity_id:
            - input_boolean.spoolman_edit_update_weight
            - input_boolean.spoolman_edit_update_location
      - service: input_select.select_option
        target:
          entity_id: input_select.spoolman_edit_spool_select
        data:
          option: "— Select spool —"
      - service: input_number.set_value
        target:
          entity_id: input_number.spoolman_edit_remaining_weight
        data:
          value: 0
      - service: input_text.set_value
        target:
          entity_id: input_text.spoolman_edit_spool_location
        data:
          value: ""
      - service: input_text.set_value
        target:
          entity_id: input_text.spoolman_edit_spool_id
        data:
          value: ""
      - service: homeassistant.update_entity
        target:
          entity_id: sensor.spoolman_spool_list_data
      - service: script.reconcile_all_ams_slots
        data: {}
