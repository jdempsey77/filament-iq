# ─── Printer Controls: Power, Light, WiFi, Fans, Air Purifier ─────────
# Compact printer control card with tile-style layout.
# Fans are read-only (printer-controlled).
# Power toggle requires confirmation. Air purifier has full control.
# Prerequisites: mushroom cards, card-mod
#
# Color scheme: cyan = on/active, grey = off/inactive (uniform)
# All cards use mushroom-template-card for consistent sizing.
# ──────────────────────────────────────────────────────────────────────
type: vertical-stack
cards:
  # ── Row 1: Power, Chamber Light, WiFi ────────────────────────────
  - type: grid
    columns: 3
    square: false
    cards:
      - type: custom:mushroom-template-card
        entity: switch.officeoutlet01_3dprinter
        primary: Power
        secondary: >-
          {{ 'On' if is_state('switch.officeoutlet01_3dprinter', 'on') else 'Off' }}
        icon: mdi:power
        icon_color: >-
          {{ 'cyan' if is_state('switch.officeoutlet01_3dprinter', 'on') else 'grey' }}
        layout: vertical
        tap_action:
          action: toggle
          confirmation:
            text: Toggle printer power?
        hold_action:
          action: more-info
        card_mod:
          style: |
            ha-card {
              {% if is_state('switch.officeoutlet01_3dprinter', 'on') %}
              background: rgba(0,188,212,0.08) !important;
              {% else %}
              background: rgba(255,255,255,0.03) !important;
              {% endif %}
              box-shadow: none;
              border: 1px solid rgba(255,255,255,0.06) !important;
              border-radius: 10px !important;
            }
            mushroom-shape-icon {
              --shape-color: none !important;
              --icon-size: 24px !important;
            }
            .primary {
              font-size: 12px !important;
              font-weight: 600 !important;
            }
            .secondary {
              font-size: 11px !important;
              color: #9ca3af !important;
            }
      - type: custom:mushroom-template-card
        entity: light.p1s_01p00c5a3101668_chamber_light
        primary: Light
        secondary: >-
          {{ 'On' if is_state('light.p1s_01p00c5a3101668_chamber_light', 'on') else 'Off' }}
        icon: mdi:lightbulb
        icon_color: >-
          {{ 'cyan' if is_state('light.p1s_01p00c5a3101668_chamber_light', 'on') else 'grey' }}
        layout: vertical
        tap_action:
          action: toggle
        hold_action:
          action: more-info
        card_mod:
          style: |
            ha-card {
              {% if is_state('light.p1s_01p00c5a3101668_chamber_light', 'on') %}
              background: rgba(0,188,212,0.08) !important;
              {% else %}
              background: rgba(255,255,255,0.03) !important;
              {% endif %}
              box-shadow: none;
              border: 1px solid rgba(255,255,255,0.06) !important;
              border-radius: 10px !important;
            }
            mushroom-shape-icon {
              --shape-color: none !important;
              --icon-size: 24px !important;
            }
            .primary {
              font-size: 12px !important;
              font-weight: 600 !important;
            }
            .secondary {
              font-size: 11px !important;
              color: #9ca3af !important;
            }
      - type: custom:mushroom-template-card
        primary: WiFi
        secondary: >-
          {% set rssi = states('sensor.p1s_01p00c5a3101668_wi_fi_signal') | int(0) %}
          {% if rssi >= -50 %}Excellent
          {% elif rssi >= -60 %}Good
          {% elif rssi >= -70 %}Fair
          {% elif rssi >= -80 %}Weak
          {% else %}Poor{% endif %}
          · {{ rssi }}dBm
        icon: >-
          {% set rssi = states('sensor.p1s_01p00c5a3101668_wi_fi_signal') | int(0) %}
          {% if rssi >= -50 %}mdi:wifi-strength-4
          {% elif rssi >= -60 %}mdi:wifi-strength-3
          {% elif rssi >= -70 %}mdi:wifi-strength-2
          {% elif rssi >= -80 %}mdi:wifi-strength-1
          {% else %}mdi:wifi-strength-alert-outline{% endif %}
        icon_color: >-
          {% set rssi = states('sensor.p1s_01p00c5a3101668_wi_fi_signal') | int(0) %}
          {{ 'cyan' if rssi >= -70 else 'grey' }}
        layout: vertical
        tap_action:
          action: none
        hold_action:
          action: none
        double_tap_action:
          action: none
        card_mod:
          style: |
            ha-card {
              {% set rssi = states('sensor.p1s_01p00c5a3101668_wi_fi_signal') | int(0) %}
              {% if rssi >= -70 %}
              background: rgba(0,188,212,0.08) !important;
              {% else %}
              background: rgba(255,255,255,0.03) !important;
              {% endif %}
              box-shadow: none;
              border: 1px solid rgba(255,255,255,0.06) !important;
              border-radius: 10px !important;
              pointer-events: none;
            }
            mushroom-shape-icon {
              --shape-color: none !important;
              --icon-size: 24px !important;
            }
            .primary {
              font-size: 12px !important;
              font-weight: 600 !important;
            }
            .secondary {
              font-size: 11px !important;
              color: #9ca3af !important;
            }
  # ── Row 2: Fans (read-only) ─────────────────────────────────────
