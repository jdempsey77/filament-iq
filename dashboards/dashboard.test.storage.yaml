          - type: horizontal-stack
            cards:
              - type: entities
                show_header_toggle: false
                entities:
                  - entity: input_select.spoolman_filter_spool_material
                    name: Material
                  - entity: input_select.spoolman_filter_spool_vendor
                    name: Vendor
                  - entity: input_select.spoolman_filter_spool_location
                    name: Location
              - type: entities
                show_header_toggle: false
                entities:
                  - entity: input_select.spoolman_edit_spool_select
                    name: Select spool
                  - entity: input_boolean.spoolman_edit_update_weight
                    name: Update weight
                  - entity: input_number.spoolman_edit_remaining_weight
                    name: Remaining weight (g)
                  - entity: input_boolean.spoolman_edit_update_location
                    name: Update location
                  - entity: input_text.spoolman_edit_spool_location
                    name: Location
              - type: custom:mushroom-template-card
                primary: Save
                icon: mdi:content-save
                icon_color: green
                layout: horizontal
                tap_action:
                  action: call-service
                  service: script.spoolman_update_spool_remaining
                card_mod:
                  style: |
                    ha-card { --ha-card-padding: 4px; }
                    mushroom-shape-icon { --icon-size: 24px; }
          - type: custom:flex-table-card
            title: ''
            entities:
              include: sensor.spoolman_spool_list_filtered
            strict: true
            sort_by: id
            css:
              table+: 'width: 100%; table-layout: auto;'
              th+: 'white-space: nowrap; padding: 8px 12px; font-size: 0.85em;'
              td+: 'padding: 8px 12px; white-space: nowrap;'
            columns:
              - name: ID
                data: items
                modify: x.id
                align: center
              - name: Color
                data: items
                modify: |-
                  if (x.filament && x.filament.color_hex) {
                    '<div style="width:22px;height:22px;border-radius:50%;background:#' + x.filament.color_hex + ';border:1px solid #555;display:inline-block;vertical-align:middle"></div>'
                  } else { '' }
                align: center
              - name: Filament
                data: items
                modify: 'x.filament ? x.filament.name : '''''
              - name: Vendor
                data: items
                modify: >-
                  (x.filament && x.filament.vendor) ? x.filament.vendor.name :
                  ''
              - name: Material
                data: items
                modify: 'x.filament ? (x.filament.material || '''') : '''''
              - name: Remaining (g)
                data: items
                modify: >-
                  x.remaining_weight != null ? Math.round(x.remaining_weight) :
                  ''
                align: right
              - name: Location
                data: items
                modify: x.location || ''
              - name: Identity
                data: items
                modify: >-
                  var lot = x.lot_nr || '';

                  lot.length > 16 ? (lot.substring(0, 8) + '…' +
                  lot.substring(lot.length - 4)) : lot
          - type: custom:mod-card
            style: |
              ha-card {
                border: 2px solid var(--ha-card-border-color, #444) !important;
                border-radius: 12px !important;
                box-shadow: 0 6px 12px rgba(0, 0, 0, 0.6) !important;
                padding: 12px !important;
                max-width: 500px;
              }
            card:
              type: grid
              columns: 2
              square: false
              cards:
                - type: custom:mushroom-template-card
                  primary: Add Spool
                  icon: mdi:plus-circle
                  icon_color: green
                  layout: horizontal
                  tap_action:
                    action: fire-dom-event
                    browser_mod:
                      service: browser_mod.popup
                      data:
                        title: Add Spool to Spoolman
                        content:
                          type: vertical-stack
                          cards:
                            - type: markdown
                              content: '**Add Spool to Spoolman**'
                            - type: entities
                              entities:
                                - entity: input_select.spoolman_new_spool_filament
                                - entity: input_text.spoolman_new_spool_location
                                - entity: >-
                                    input_number.spoolman_new_spool_remaining_weight
                                - entity: input_number.spoolman_new_spool_quantity
                            - type: grid
                              columns: 2
                              square: false
                              cards:
                                - type: custom:mushroom-template-card
                                  primary: Refresh filament list
                                  icon: mdi:refresh
                                  icon_color: blue
                                  tap_action:
                                    action: call-service
                                    service: script.refresh_filament_dropdown
                                    data: {}
                                - type: custom:mushroom-template-card
                                  primary: Create spool(s)
                                  icon: mdi:plus
                                  icon_color: green
                                  tap_action:
                                    action: call-service
                                    service: script.spoolman_add_spool
                                    data: {}
                  card_mod:
                    style: |
                      ha-card { --ha-card-padding: 4px; }
                      mushroom-shape-icon { --icon-size: 24px; }
                - type: custom:mushroom-template-card
                  primary: Refresh Data
                  icon: mdi:refresh
                  icon_color: cyan
                  layout: horizontal
                  tap_action:
                    action: call-service
                    service: homeassistant.update_entity
                    data:
                      entity_id: sensor.spoolman_spool_list_data
                  card_mod:
                    style: |
                      ha-card { --ha-card-padding: 4px; }
                      mushroom-shape-icon { --icon-size: 24px; }
    type: panel
    subview: true
