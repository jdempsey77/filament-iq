ams_rfid_reconcile:
  # Single writer ownership:
  # - Owns writes for: input_text.ams_slot_{1..6}_spool_id
  #                    input_text.ams_slot_{1..6}_expected_spool_id
  #                    input_text.ams_slot_{1..6}_status
  # - Legacy YAML RFID writers are disabled fail-closed in automations.yaml.
  # Disable app only via this flag.
  enabled: true
  module: filament_iq.ams_rfid_reconcile
  class: AmsRfidReconcile
  spoolman_url: http://192.168.4.124:7912
  printer_serial: "01P00C5A3101668"
  printer_model: "p1s"
  startup_delay_seconds: 8
  debounce_seconds: 3
  safety_poll_seconds: 600
  # strict_mode_reregister: when true, never auto-pick when >1 candidate (same color/filament); require manual spool_id (bambu_rfid_manual_enroll_tag_to_spool).
  strict_mode_reregister: false
  evidence_log_path: /addon_configs/a0d7b954_appdaemon/ams_rfid_reconcile_evidence.log
  debug_logs: false

ams_rfid_guard:
  module: filament_iq.ams_rfid_guard
  class: AmsRfidGuard
  enabled: true
  spoolman_url: http://192.168.4.124:7912
  printer_serial: "01P00C5A3101668"
  printer_model: "p1s"
  scan_interval_seconds: 300
  rfid_managed_patterns:
    - bambu
    - bambu lab
  notify_cooldown_minutes: 360
  dry_run: false
  # dry_run: true   # Set true to log violations without PATCHing
  use_cache_trigger: false
  # missing_ha_spool_uuid_mode: warn_only (default) | quarantine
  missing_ha_spool_uuid_mode: warn_only

# Populates input_select.spoolman_new_spool_filament from Spoolman /api/v1/filament (no trailing slash on base).
spoolman_dropdown_sync:
  module: filament_iq.spoolman_dropdown_sync
  class: SpoolmanDropdownSync
  enabled: true
  spoolman_url: http://192.168.4.124:7912

# Writes filament consumption to Spoolman after each print via P1S_PRINT_USAGE_READY event.
# Reads input_text.ams_slot_{1..6}_spool_id (reconciler-owned, read-only).
ams_print_usage_sync:
  module: filament_iq.ams_print_usage_sync
  class: AmsPrintUsageSync
  enabled: true
  spoolman_url: http://192.168.4.124:7912
  printer_serial: "01P00C5A3101668"
  printer_model: "p1s"
  dry_run: false
  min_consumption_g: 2
  max_consumption_g: 1000
  # 3MF parsing (slicer-exact per-filament weights)
  threemf_enabled: true
  threemf_fetch_method: native  # native (ftplib, single TLS) or curl (legacy subprocess)
  printer_ip: "192.168.4.114"
  printer_ftps_port: 990
  access_code_entity: "input_text.filament_iq_printer_access_code"
  lifecycle_phase1_enabled: true
  lifecycle_phase2_enabled: true
  lifecycle_phase3_enabled: true
  weight_reconcile_enabled: true
  notify_service: mobile_app_jd_pixel_10_pro_xl

filament_weight_tracker:
  module: filament_iq.filament_weight_tracker
  class: FilamentWeightTracker
  spoolman_url: "http://192.168.4.124:7912"
  printer_serial: "01P00C5A3101668"
  printer_model: "p1s"
  report_path: "/config/filament_weight_reports.log"
