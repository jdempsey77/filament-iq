# Paste this entire file into a storage-mode "Test" dashboard in HA:
# Settings → Dashboards → Add dashboard (title: Test) → Open it → ⋮ → Edit dashboard → ⋮ → Raw configuration
# Replace the contents with this file. Save and reload. You can then edit and see config directly in HA.
#
# 3D Printer dashboard with integrated Spoolman management. All spool management, filament tracking,
# and printer controls are on a single page. Click AMS tray cards to open popups for slot management.
#
# If input_number.ams_slot_* cards show "unavailable": ensure configuration.yaml is loaded in HA
# (the repo's configuration.yaml defines input_number.ams_slot_N_gross_weight, _filament_id,
# _tare_override, _extras_weight). Then: Developer Tools → YAML → reload "Input Number" or restart HA.
title: Test
views:
  - title: 3D Printer
    icon: mdi:printer-3d
    path: printer
    type: sections
    max_columns: 3
    sections:
      - type: grid
        cards:
          - type: custom:mod-card
            style: |
              ha-card {
                border: 2px solid var(--ha-card-border-color, #444) !important;
                border-radius: 12px !important;
                box-shadow: 0 6px 12px rgba(0, 0, 0, 0.6) !important;
                padding: 12px !important;
              }
            card:
              type: vertical-stack
              cards:
                - type: custom:mushroom-entity-card
                  entity: switch.officeoutlet01_3dprinter
                  name: Power
                  icon: mdi:power
                  tap_action:
                    action: toggle
                    confirmation:
                      text: Toggle Printer Power?
                  hold_action:
                    action: more-info
                  icon_color: accent
                - type: horizontal-stack
                  cards:
                    - type: custom:mushroom-template-card
                      primary: Reload Spoolman
                      secondary: Refresh integration
                      icon: mdi:refresh
                      icon_color: green
                      tap_action:
                        action: call-service
                        service: script.reload_spoolman_integration
                        data: {}
                    - type: custom:mushroom-template-card
                      primary: Refresh spool list
                      secondary: Update dropdowns
                      icon: mdi:format-list-bulleted
                      icon_color: blue
                      tap_action:
                        action: call-service
                        service: script.refresh_ams_spool_list
                        data: {}
                - type: custom:mushroom-entity-card
                  entity: sensor.p1s_operator_status
                  name: Status
                  icon: mdi:printer-3d
                  icon_color: accent
                - type: conditional
                  conditions:
                    - entity: sensor.p1s_01p00c5a3101668_mqtt_connection_mode
                      state: local
                    - entity: sensor.p1s_operator_status
                      state:
                        - printing_normally
                        - printing_attention_needed
                    - condition: state
                      entity: select.p1s_01p00c5a3101668_printing_speed
                      state_not: unavailable
                  card:
                    type: custom:mushroom-entity-card
                    entity: select.p1s_01p00c5a3101668_printing_speed
                    name: Speed
                    icon: mdi:speedometer
                    icon_color: red
                - type: conditional
                  conditions:
                    - entity: sensor.p1s_01p00c5a3101668_mqtt_connection_mode
                      state: local
                    - entity: sensor.p1s_operator_status
                      state:
                        - printing_normally
                        - printing_attention_needed
                        - paused_user
                        - paused_error
                  card:
                    type: horizontal-stack
                    cards:
                      - type: conditional
                        conditions:
                          - entity: sensor.p1s_operator_status
                            state:
                              - printing_normally
                              - printing_attention_needed
                        card:
                          type: custom:mushroom-entity-card
                          entity: button.p1s_01p00c5a3101668_pause_printing
                          name: Pause
                          icon: mdi:pause
                          tap_action:
                            action: call-service
                            service: button.press
                            service_data:
                              entity_id: button.p1s_01p00c5a3101668_pause_printing
                          icon_color: orange
                      - type: conditional
                        conditions:
                          - entity: sensor.p1s_operator_status
                            state:
                              - paused_user
                              - paused_error
                        card:
                          type: custom:mushroom-entity-card
                          entity: button.p1s_01p00c5a3101668_resume_printing
                          name: Resume
                          icon: mdi:play
                          tap_action:
                            action: call-service
                            service: button.press
                            service_data:
                              entity_id: button.p1s_01p00c5a3101668_resume_printing
                          icon_color: orange
                      - type: custom:mushroom-template-card
                        primary: Cancel
                        icon: mdi:cancel
                        icon_color: red
                        tap_action:
                          action: call-service
                          service: button.press
                          service_data:
                            entity_id: button.p1s_01p00c5a3101668_stop_printing
                        confirmation:
                          text: Cancel Print?
                - type: conditional
                  conditions:
                    - entity: sensor.p1s_operator_status
                      state:
                        - printing_normally
                        - printing_attention_needed
                  card:
                    type: custom:mushroom-entity-card
                    entity: sensor.p1s_01p00c5a3101668_task_name
                    name: Task
                    icon: mdi:clipboard-text
                - type: vertical-stack
                  cards:
                    - type: horizontal-stack
                      cards:
                        - type: custom:mushroom-entity-card
                          entity: sensor.p1s_01p00c5a3101668_print_progress
                          name: Progress
                          icon: mdi:progress-helper
                        - type: custom:mushroom-template-card
                          primary: Layer
                          icon_color: var(--rgb-state-entity)
                          secondary: >-
                            {{states('sensor.p1s_01p00c5a3101668_current_layer')}}
                            /
                            {{states('sensor.p1s_01p00c5a3101668_total_layer_count')}}
                          icon: mdi:layers
                    - type: conditional
                      conditions:
                        - entity: sensor.p1s_operator_status
                          state:
                            - printing_normally
                            - printing_attention_needed
                        - condition: state
                          entity: input_datetime.p1s_print_start_time
                          state_not: unavailable
                        - condition: state
                          entity: input_datetime.p1s_print_end_time
                          state_not: unavailable
                      card:
                        type: custom:timer-bar-card
                        entity: sensor.p1s_01p00c5a3101668_print_status
                        name: Time Remaining
                        mushroom: true
                        active_state:
                          - running
                          - RUNNING
                        start_time:
                          entity: input_datetime.p1s_print_start_time
                        end_time:
                          entity: input_datetime.p1s_print_end_time
                        icon: mdi:timer-sand
                        active_icon: mdi:printer-3d
                        invert: false
                        bar_radius: 6px
                        bar_height: 6px
                        bar_foreground: rgb(var(--rgb-accent-color))
                        bar_background: rgba(var(--rgb-primary-text-color), 0.12)
                        state_color: true
                        card_mod:
                          style: >
                            ha-card {
                              border: none !important;
                              border-radius: 12px !important;
                              box-shadow: 0 6px 12px rgba(0, 0, 0, 0.6) !important;
                              padding: 6px 12px 8px !important;
                            }

                            timer-bar-card {
                              --tbc-name-color: var(--primary-text-color);
                              --tbc-time-color: var(--secondary-text-color);
                            }

                            timer-bar-mushroom-row {
                              min-height: 0 !important;
                            }

                            timer-bar-mushroom-row .info, timer-bar-mushroom-row
                            .time {
                              line-height: 1.2 !important;
                            }
                    - type: horizontal-stack
                      cards:
                        - type: conditional
                          conditions:
                            - condition: state
                              entity: input_datetime.p1s_print_start_time
                              state_not: unavailable
                          card:
                            type: custom:mushroom-entity-card
                            entity: input_datetime.p1s_print_start_time
                            name: Start Time
                            icon: mdi:clock-time-four
                        - type: conditional
                          conditions:
                            - condition: state
                              entity: input_datetime.p1s_print_end_time
                              state_not: unavailable
                          card:
                            type: custom:mushroom-entity-card
                            entity: input_datetime.p1s_print_end_time
                            name: End Time
                            icon: mdi:clock-time-four-outline
                    - type: custom:mushroom-entity-card
                      entity: binary_sensor.p1s_01p00c5a3101668_firmware_update
                      name: Firmware
                      icon: mdi:chip
                    - type: custom:mushroom-entity-card
                      entity: sensor.p1s_01p00c5a3101668_active_tray
                      name: Current Filament
                      icon: mdi:printer-3d-nozzle
                      card_mod:
                        style: |
                          ha-card {
                            --card-mod-icon-color: {{ state_attr('sensor.p1s_01p00c5a3101668_active_tray', 'color') | default('rgb(var(--rgb-state-entity))') }};
                          }
                    - type: custom:mushroom-entity-card
                      entity: sensor.p1s_01p00c5a3101668_total_usage
                      name: Print Hours
                      icon: mdi:clock-outline
          - type: custom:webrtc-camera
            entity: camera.tapo_c111_live_view
            card_mod:
              style: |
                ha-card {
                  border: 2px solid var(--ha-card-border-color, #444) !important;
                  border-radius: 12px !important;
                  box-shadow: 0 6px 12px rgba(0, 0, 0, 0.6) !important;
                }
          - type: conditional
            conditions:
              - entity: switch.officeoutlet01_3dprinter
                state: 'on'
            card:
              show_state: false
              show_name: false
              camera_view: live
              fit_mode: cover
              type: picture-entity
              entity: camera.p1s_01p00c5a3101668_camera
              card_mod:
                style: |
                  ha-card {
                    border: 2px solid var(--ha-card-border-color, #444) !important;
                    border-radius: 12px !important;
                    box-shadow: 0 6px 12px rgba(0, 0, 0, 0.6) !important;
                  }
      - type: grid
        cards:
          - type: picture-elements
            elements:
              - type: conditional
                conditions:
                  - entity: sensor.p1s_01p00c5a3101668_print_status
                    state_not: offline
                elements:
                  - type: custom:config-template-card
                    entities:
                      - sensor.p1s_01p00c5a3101668_wi_fi_signal
                    element:
                      type: state-icon
                      entity: sensor.p1s_01p00c5a3101668_wi_fi_signal
                      icon: >-
                        ${states['sensor.p1s_01p00c5a3101668_wi_fi_signal'].state
                        > -50 ? 'mdi:wifi-strength-4' :
                          states['sensor.p1s_01p00c5a3101668_wi_fi_signal'].state > -60 ?
                        'mdi:wifi-strength-3' :
                          states['sensor.p1s_01p00c5a3101668_wi_fi_signal'].state > -67 ?
                        'mdi:wifi-strength-2' :
                          states['sensor.p1s_01p00c5a3101668_wi_fi_signal'].state > -70 ?
                        'mdi:wifi-strength-1-alert' :
                        'mdi:wifi-strength-outline'}
                    style:
                      left: 67%
                      top: 13.2%
                      font-size: 0.8em
                      color: rgba(0,0,0,0)
                      '--paper-item-icon-color': >-
                        ${states['sensor.p1s_01p00c5a3101668_wi_fi_signal'].state
                        > -50 ? 'green' :
                          states['sensor.p1s_01p00c5a3101668_wi_fi_signal'].state > -60 ?
                        'yellow' :
                          states['sensor.p1s_01p00c5a3101668_wi_fi_signal'].state > -67 ?
                        'orange' :
                          states['sensor.p1s_01p00c5a3101668_wi_fi_signal'].state > -70 ?
                        'red' : 'red'}
                  - type: conditional
                    conditions:
                      - entity: light.p1s_01p00c5a3101668_chamber_light
                        state_not: unavailable
                    elements:
                      - entity: light.p1s_01p00c5a3101668_chamber_light
                        type: state-icon
                        style:
                          top: 46%
                          left: 18%
                          '--mdc-icon-size': 2.6em
                        tap_action:
                          action: toggle
                  - type: conditional
                    conditions:
                      - entity: light.p1s_01p00c5a3101668_chamber_light
                        state: unavailable
                    elements:
                      - type: icon
                        icon: mdi:led-strip
                        style:
                          top: 46%
                          left: 18%
                          '--mdc-icon-size': 2.6em
                        tap_action:
                          action: call-service
                          service: light.toggle
                          service_data:
                            entity_id: light.p1s_01p00c5a3101668_chamber_light
                  - entity: sensor.p1s_01p00c5a3101668_print_status
                    type: state-label
                    style:
                      top: 6.5%
                      left: 23.69%
                      font-size: 1em
                      color: '#FFFFFF'
                  - type: conditional
                    conditions:
                      - entity: sensor.p1s_01p00c5a3101668_print_status
                        state:
                          - running
                          - pause
                    elements:
                      - type: conditional
                        conditions:
                          - entity: image.p1s_01p00c5a3101668_cover_image
                            state_not: unavailable
                        elements:
                          - type: custom:hui-element
                            card_type: picture-entity
                            show_name: false
                            show_state: false
                            entity: image.p1s_01p00c5a3101668_cover_image
                            style:
                              top: 50%
                              left: 50%
                              transform: translate(-45%, -40%) scale(75%, 75%)
                              '--ha-card-border-width': 0px
                              '--ha-card-background': none
                      - entity: sensor.p1s_01p00c5a3101668_print_progress
                        type: state-badge
                        tap_action:
                          action: more-info
                        style:
                          top: 18.5%
                          left: 81%
                          font-size: 1em
                          color: rgba(0,0,0,0)
                          '--label-badge-red': '#11739D'
                  - type: conditional
                    conditions:
                      - entity: sensor.p1s_01p00c5a3101668_chamber_temperature
                        state_not:
                          - unavailable
                          - unknown
                    elements:
                      - type: custom:config-template-card
                        entities:
                          - sensor.p1s_01p00c5a3101668_chamber_temperature
                        element:
                          type: state-label
                          entity: sensor.p1s_01p00c5a3101668_chamber_temperature
                          label: |-
                            [[[
                              const temp_f = parseFloat(entity.state) || 0;
                              const temp_c = Math.round((temp_f - 32) * 5/9);
                              return temp_c + '°C';
                            ]]]
                          style:
                            font-size: 0.8em
                            top: 31%
                            left: 19%
                            color: '#FFFFFF'
                            background-color: rgba(0,0,0,0.5)
                            padding: 2px 6px
                            border-radius: 4px
            card_mod:
              style: |
                ha-card {
                  box-shadow: none !important;
                  background: none !important;
                  border: none !important;
                }
            image: /local/media/bambuprinter/on_p1s.png
            entity: light.p1s_01p00c5a3101668_chamber_light
            state_image:
              unavailable: /local/media/bambuprinter/off_p1s.png
              'on': /local/media/bambuprinter/on_p1s.png
              'off': /local/media/bambuprinter/off_p1s.png
          - type: custom:mod-card
            style: |
              ha-card {
                border: 2px solid var(--ha-card-border-color, #444) !important;
                border-radius: 12px !important;
                box-shadow: 0 6px 12px rgba(0, 0, 0, 0.6) !important;
                padding: 12px !important;
              }
            card:
              type: vertical-stack
              cards:
                - type: custom:mushroom-entity-card
                  entity: sensor.p1s_01p00c5a3101668_ams_1_tray_1
                  name: AMS Pro
                  icon: mdi:package-variant
                  icon_color: var(--rgb-state-entity)
                  tap_action:
                    action: more-info
                - type: grid
                  columns: 2
                  square: false
                  cards:
                    - type: conditional
                      conditions:
                        - condition: state
                          entity: sensor.p1s_01p00c5a3101668_ams_1_tray_1
                          state: Empty
                      card:
                        type: custom:mushroom-template-card
                        primary: Tray 1
                        secondary: Empty
                        icon: mdi:numeric-1-circle-outline
                        icon_color: grey
                        tap_action:
                          action: fire-dom-event
                          browser_mod:
                            service: browser_mod.popup
                            data:
                              title: Manage AMS Slot 1
                              content:
                                type: vertical-stack
                                cards:
                                  - type: markdown
                                    content: |
                                      **Current Tray:** {{ states('sensor.p1s_01p00c5a3101668_ams_1_tray_1') }}  
                                      **Location:** AMS1_Slot1
                                  - type: entities
                                    entities:
                                      - entity: input_select.ams_slot_1_select_spool
                                        name: Select Spool
                                      - entity: input_select.ams_slot_1_spool_type
                                        name: Spool Type (Tare)
                                      - entity: input_number.ams_slot_1_filament_id
                                        name: Spoolman Filament ID
                                      - entity: input_number.ams_slot_1_gross_weight
                                        name: Scale Weight (g)
                                  - type: custom:mushroom-template-card
                                    primary: Assign & Update
                                    secondary: Write to Spoolman
                                    icon: mdi:database-arrow-up
                                    icon_color: green
                                    tap_action:
                                      action: call-service
                                      service: script.ams_slot_1_assign_and_update
                                      data: {}
                        card_mod:
                          style: |
                            ha-card { opacity: 0.8; }
                    - type: conditional
                      conditions:
                        - condition: state
                          entity: sensor.p1s_01p00c5a3101668_ams_1_tray_1
                          state_not: Empty
                      card:
                        type: custom:mushroom-template-card
                        primary: >-
                          {{ states('sensor.p1s_01p00c5a3101668_ams_1_tray_1')
                          }}
                        secondary: >-
                          {{ states('sensor.ams_slot_1_remaining_g') }} g
                          remaining
                        icon: mdi:numeric-1-circle
                        icon_color: var(--rgb-state-entity)
                        tap_action:
                          action: fire-dom-event
                          browser_mod:
                            service: browser_mod.popup
                            data:
                              title: Manage AMS Slot 1
                              content:
                                type: vertical-stack
                                cards:
                                  - type: markdown
                                    content: |
                                      **Current Tray:** {{ states('sensor.p1s_01p00c5a3101668_ams_1_tray_1') }}  
                                      **Location:** AMS1_Slot1
                                  - type: entities
                                    entities:
                                      - entity: input_select.ams_slot_1_select_spool
                                        name: Select Spool
                                      - entity: input_select.ams_slot_1_spool_type
                                        name: Spool Type (Tare)
                                      - entity: input_number.ams_slot_1_filament_id
                                        name: Spoolman Filament ID
                                      - entity: input_number.ams_slot_1_gross_weight
                                        name: Scale Weight (g)
                                  - type: custom:mushroom-template-card
                                    primary: Assign & Update
                                    secondary: Write to Spoolman
                                    icon: mdi:database-arrow-up
                                    icon_color: green
                                    tap_action:
                                      action: call-service
                                      service: script.ams_slot_1_assign_and_update
                                      data: {}
                        card_mod:
                          style: >
                            {% set c =
                            state_attr('sensor.p1s_01p00c5a3101668_ams_1_tray_1',
                            'color') %}

                            ha-card {
                              --card-mod-icon-color: {{ c | default('rgb(var(--rgb-state-entity))') }};
                              {% if state_attr('sensor.p1s_01p00c5a3101668_ams_1_tray_1', 'active') %}
                              font-weight: bold;
                              border: 2px solid var(--primary-color);
                              background: rgba(var(--rgb-primary-color), 0.15);
                              {% endif %}
                            }
                    - type: conditional
                      conditions:
                        - condition: state
                          entity: sensor.p1s_01p00c5a3101668_ams_1_tray_2
                          state: Empty
                      card:
                        type: custom:mushroom-template-card
                        primary: Tray 2
                        secondary: Empty
                        icon: mdi:numeric-2-circle-outline
                        icon_color: grey
                        tap_action:
                          action: fire-dom-event
                          browser_mod:
                            service: browser_mod.popup
                            data:
                              title: Manage AMS Slot 2
                              content:
                                type: vertical-stack
                                cards:
                                  - type: markdown
                                    content: |
                                      **Current Tray:** {{ states('sensor.p1s_01p00c5a3101668_ams_1_tray_2') }}  
                                      **Location:** AMS1_Slot2
                                  - type: entities
                                    entities:
                                      - entity: input_select.ams_slot_2_select_spool
                                        name: Select Spool
                                      - entity: input_select.ams_slot_2_spool_type
                                        name: Spool Type (Tare)
                                      - entity: input_number.ams_slot_2_filament_id
                                        name: Spoolman Filament ID
                                      - entity: input_number.ams_slot_2_gross_weight
                                        name: Scale Weight (g)
                                  - type: custom:mushroom-template-card
                                    primary: Assign & Update
                                    secondary: Write to Spoolman
                                    icon: mdi:database-arrow-up
                                    icon_color: green
                                    tap_action:
                                      action: call-service
                                      service: script.ams_slot_2_assign_and_update
                                      data: {}
                        card_mod:
                          style: |
                            ha-card { opacity: 0.8; }
                    - type: conditional
                      conditions:
                        - condition: state
                          entity: sensor.p1s_01p00c5a3101668_ams_1_tray_2
                          state_not: Empty
                      card:
                        type: custom:mushroom-template-card
                        primary: >-
                          {{ states('sensor.p1s_01p00c5a3101668_ams_1_tray_2')
                          }}
                        secondary: >-
                          {{ states('sensor.ams_slot_2_remaining_g') }} g
                          remaining
                        icon: mdi:numeric-2-circle
                        icon_color: var(--rgb-state-entity)
                        tap_action:
                          action: fire-dom-event
                          browser_mod:
                            service: browser_mod.popup
                            data:
                              title: Manage AMS Slot 2
                              content:
                                type: vertical-stack
                                cards:
                                  - type: markdown
                                    content: |
                                      **Current Tray:** {{ states('sensor.p1s_01p00c5a3101668_ams_1_tray_2') }}  
                                      **Location:** AMS1_Slot2
                                  - type: entities
                                    entities:
                                      - entity: input_select.ams_slot_2_select_spool
                                        name: Select Spool
                                      - entity: input_select.ams_slot_2_spool_type
                                        name: Spool Type (Tare)
                                      - entity: input_number.ams_slot_2_filament_id
                                        name: Spoolman Filament ID
                                      - entity: input_number.ams_slot_2_gross_weight
                                        name: Scale Weight (g)
                                  - type: custom:mushroom-template-card
                                    primary: Assign & Update
                                    secondary: Write to Spoolman
                                    icon: mdi:database-arrow-up
                                    icon_color: green
                                    tap_action:
                                      action: call-service
                                      service: script.ams_slot_2_assign_and_update
                                      data: {}
                        card_mod:
                          style: >
                            {% set c =
                            state_attr('sensor.p1s_01p00c5a3101668_ams_1_tray_2',
                            'color') %}

                            ha-card {
                              --card-mod-icon-color: {{ c | default('rgb(var(--rgb-state-entity))') }};
                              {% if state_attr('sensor.p1s_01p00c5a3101668_ams_1_tray_2', 'active') %}
                              font-weight: bold;
                              border: 2px solid var(--primary-color);
                              background: rgba(var(--rgb-primary-color), 0.15);
                              {% endif %}
                            }
                    - type: conditional
                      conditions:
                        - condition: state
                          entity: sensor.p1s_01p00c5a3101668_ams_1_tray_3
                          state: Empty
                      card:
                        type: custom:mushroom-template-card
                        primary: Tray 3
                        secondary: Empty
                        icon: mdi:numeric-3-circle-outline
                        icon_color: grey
                        tap_action:
                          action: fire-dom-event
                          browser_mod:
                            service: browser_mod.popup
                            data:
                              title: Manage AMS Slot 3
                              content:
                                type: vertical-stack
                                cards:
