          {% else %}Up to date{% endif %}
        icon: >-
          {% if is_state('binary_sensor.p1s_01p00c5a3101668_firmware_update', 'on') %}mdi:cellphone-arrow-down
          {% else %}mdi:check-circle-outline{% endif %}
