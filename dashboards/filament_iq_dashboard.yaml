      # ═══════════════════════════════════════════════════════════════
      # SECTION 2: Summary Stats + Reconcile
      # ═══════════════════════════════════════════════════════════════
      - type: grid
        cards:
          - type: grid
            columns: 4
            square: false
            cards:
              # ── Bound Slots ──
              - type: custom:mushroom-template-card
                primary: Bound
                secondary: >-
                  {% set ns = namespace(count=0) %}
                  {% for i in [1,2,3,4,5,6] %}
                    {% if states('sensor.ams_slot_' ~ i ~ '_status') == 'ok' %}
                      {% set ns.count = ns.count + 1 %}
                    {% endif %}
                  {% endfor %}
                  {{ ns.count }} / 6
                icon: mdi:check-circle
                icon_color: green
                layout: vertical
                tap_action:
                  action: none
                card_mod:
                  style: |
                    ha-card {
                      background: rgba(255,255,255,0.03) !important;
                      box-shadow: none;
                      border: 1px solid rgba(255,255,255,0.06) !important;
                      border-radius: 10px !important;
                    }
                    mushroom-shape-icon {
                      --shape-color: none !important;
                      --icon-size: 24px !important;
                    }
                    .primary { font-size: 12px !important; font-weight: 600 !important; }
                    .secondary { font-size: 11px !important; color: #9ca3af !important; }
              # ── Empty Slots ──
              - type: custom:mushroom-template-card
                primary: Empty
                secondary: >-
                  {% set ns = namespace(count=0) %}
                  {% for i in [1,2,3,4,5,6] %}
                    {% if states('sensor.ams_slot_' ~ i ~ '_status') == 'empty' %}
                      {% set ns.count = ns.count + 1 %}
                    {% endif %}
                  {% endfor %}
                  {{ ns.count }} / 6
                icon: mdi:tray-remove
                icon_color: grey
                layout: vertical
                tap_action:
                  action: none
                card_mod:
                  style: |
                    ha-card {
                      background: rgba(255,255,255,0.03) !important;
                      box-shadow: none;
                      border: 1px solid rgba(255,255,255,0.06) !important;
                      border-radius: 10px !important;
                    }
                    mushroom-shape-icon {
                      --shape-color: none !important;
                      --icon-size: 24px !important;
                    }
                    .primary { font-size: 12px !important; font-weight: 600 !important; }
                    .secondary { font-size: 11px !important; color: #9ca3af !important; }
              # ── Total Filament ──
              - type: custom:mushroom-template-card
                primary: Filament
                secondary: >-
                  {% set ns = namespace(total=0) %}
                  {% for i in [1,2,3,4,5,6] %}
                    {% set g = states('sensor.ams_slot_' ~ i ~ '_remaining_g') %}
                    {% if g not in ['unknown', 'unavailable', '', none] %}
                      {% set ns.total = ns.total + g | float(0) %}
                    {% endif %}
                  {% endfor %}
                  {{ ns.total | round(0) | int }}g
                icon: mdi:weight-gram
                icon_color: cyan
                layout: vertical
                tap_action:
                  action: none
                card_mod:
                  style: |
                    ha-card {
                      background: rgba(255,255,255,0.03) !important;
                      box-shadow: none;
                      border: 1px solid rgba(255,255,255,0.06) !important;
                      border-radius: 10px !important;
                    }
                    mushroom-shape-icon {
                      --shape-color: none !important;
                      --icon-size: 24px !important;
                    }
                    .primary { font-size: 12px !important; font-weight: 600 !important; }
                    .secondary { font-size: 11px !important; color: #9ca3af !important; }
              # ── Alerts ──
              - type: custom:mushroom-template-card
                primary: Alerts
                secondary: >-
                  {% set ns = namespace(count=0) %}
                  {% for i in [1,2,3,4,5,6] %}
                    {% if states('sensor.ams_slot_' ~ i ~ '_status') == 'needs_bind' %}
                      {% set ns.count = ns.count + 1 %}
                    {% endif %}
                  {% endfor %}
                  {% if ns.count > 0 %}{{ ns.count }} unbound
                  {% else %}All clear
                  {% endif %}
                icon: >-
                  {% set ns = namespace(count=0) %}
                  {% for i in [1,2,3,4,5,6] %}
                    {% if states('sensor.ams_slot_' ~ i ~ '_status') == 'needs_bind' %}
                      {% set ns.count = ns.count + 1 %}
                    {% endif %}
                  {% endfor %}
                  {% if ns.count > 0 %}mdi:alert-circle{% else %}mdi:shield-check{% endif %}
                icon_color: >-
                  {% set ns = namespace(count=0) %}
                  {% for i in [1,2,3,4,5,6] %}
                    {% if states('sensor.ams_slot_' ~ i ~ '_status') == 'needs_bind' %}
                      {% set ns.count = ns.count + 1 %}
                    {% endif %}
                  {% endfor %}
                  {% if ns.count > 0 %}red{% else %}green{% endif %}
                layout: vertical
                tap_action:
                  action: more-info
                  entity: input_text.filament_iq_reconciler_status
                card_mod:
                  style: |
                    ha-card {
                      {% set ns = namespace(count=0) %}
                      {% for i in [1,2,3,4,5,6] %}
                        {% if states('sensor.ams_slot_' ~ i ~ '_status') == 'needs_bind' %}
                          {% set ns.count = ns.count + 1 %}
                        {% endif %}
                      {% endfor %}
                      {% if ns.count > 0 %}
                      background: rgba(244,67,54,0.08) !important;
                      {% else %}
                      background: rgba(255,255,255,0.03) !important;
                      {% endif %}
                      box-shadow: none;
                      border: 1px solid rgba(255,255,255,0.06) !important;
                      border-radius: 10px !important;
                    }
                    mushroom-shape-icon {
                      --shape-color: none !important;
                      --icon-size: 24px !important;
                    }
                    .primary { font-size: 12px !important; font-weight: 600 !important; }
                    .secondary { font-size: 11px !important; color: #9ca3af !important; }
          # ── Reconcile Button ──
          - type: custom:mushroom-template-card
            primary: Reconcile All Slots
            icon: mdi:sync
            icon_color: blue
            tap_action:
              action: call-service
              service: script.turn_on
              target:
                entity_id: script.reconcile_all_ams_slots
            card_mod:
              style: |
                ha-card {
                  background: rgba(255,255,255,0.03) !important;
                  box-shadow: none;
                  border: 1px solid rgba(255,255,255,0.06) !important;
                  border-radius: 10px !important;
                }
                mushroom-shape-icon {
                  --shape-color: none !important;
                  --icon-size: 24px !important;
                }
                .primary { font-size: 12px !important; font-weight: 600 !important; }
          # ── Navigation ──
          - type: grid
            columns: 2
            square: false
            cards:
              - type: custom:mushroom-template-card
                primary: Spool Inventory
                icon: mdi:printer-3d-nozzle
                icon_color: cyan
                layout: vertical
                tap_action:
                  action: navigate
                  navigation_path: /filament-iq/spools
                card_mod:
                  style: |
                    ha-card {
                      background: rgba(0,188,212,0.08) !important;
                      box-shadow: none;
                      border: 1px solid rgba(255,255,255,0.06) !important;
                      border-radius: 10px !important;
                    }
                    mushroom-shape-icon {
                      --shape-color: none !important;
                      --icon-size: 24px !important;
                    }
                    .primary { font-size: 12px !important; font-weight: 600 !important; }
              - type: custom:mushroom-template-card
