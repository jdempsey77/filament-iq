# Required HA helpers (input_text). Validated by scripts/preflight_helpers.sh.
# Must stay in sync with the input_text: section of configuration.yaml.
required_helpers:
  # AMS slot core (6 slots × spool_id, expected_spool_id, status)
  - input_text.ams_slot_1_spool_id
  - input_text.ams_slot_1_expected_spool_id
  - input_text.ams_slot_1_status
  - input_text.ams_slot_2_spool_id
  - input_text.ams_slot_2_expected_spool_id
  - input_text.ams_slot_2_status
  - input_text.ams_slot_3_spool_id
  - input_text.ams_slot_3_expected_spool_id
  - input_text.ams_slot_3_status
  - input_text.ams_slot_4_spool_id
  - input_text.ams_slot_4_expected_spool_id
  - input_text.ams_slot_4_status
  - input_text.ams_slot_5_spool_id
  - input_text.ams_slot_5_expected_spool_id
  - input_text.ams_slot_5_status
  - input_text.ams_slot_6_spool_id
  - input_text.ams_slot_6_expected_spool_id
  - input_text.ams_slot_6_status
  # AMS slot tray signatures (6 slots)
